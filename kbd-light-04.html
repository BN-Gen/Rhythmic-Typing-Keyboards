<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythmic Typing Keyboard</title>
    <style>
        /* CSS Reset & Basics */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9fafa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        h2 {
            font-size: 16px;
            font-weight: normal;
            color: #666;
        }

        /* Controls: Start, Volume, Mute */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            padding: 15px 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #start-btn {
            padding: 10px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #start-btn:hover {
            background-color: #45a049;
        }

        #start-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        /* Target Sequence Line */
        .target-line-container {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            position: relative;
        }

        .target-sequence {
            display: flex;
            gap: 20px;
            font-size: 36px;
            font-weight: bold;
            color: #444;
        }

        .target-item {
            position: relative;
            padding: 10px 15px;
            border-bottom: 4px solid transparent;
            transition: all 0.1s;
            text-align: center;
            min-width: 50px;
        }

        .target-item.current {
            border-bottom-color: #333;
            color: #000;
        }

        .target-item.space-label {
            font-size: 24px;
            line-height: 40px;
        }

        /* Animations for Target Clearing */
        .effect-burst {
            animation: burstFade 0.4s forwards ease-out;
        }

        @keyframes burstFade {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            50% { transform: scale(1.5); filter: blur(1px); }
            100% { transform: scale(2); opacity: 0; filter: blur(3px); }
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff5722;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 0.5s forwards ease-out;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.5); }
        }

        .effect-flyUp {
            animation: flyUpFade 0.5s forwards ease-out;
        }

        @keyframes flyUpFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
        }

        .effect-spinPop {
            animation: spinPopFade 0.5s forwards ease-in-out;
        }

        @keyframes spinPopFade {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            40% { transform: scale(1.6) rotate(15deg); opacity: 1; }
            100% { transform: scale(0.2) rotate(45deg); opacity: 0; }
        }

        /* Keyboard Layout */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            background: #eef0f2;
            padding: 20px;
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            opacity: 0.5; /* Dimmed initially */
            pointer-events: none; /* Physical keyboard only */
            transition: opacity 0.3s;
        }

        .keyboard.active {
            opacity: 1;
        }

        .row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .key {
            width: 50px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            background: #fff;
            border-radius: 8px;
            border-bottom: 4px solid rgba(0,0,0,0.15);
            transition: transform 0.1s, background-color 0.1s, box-shadow 0.1s;
        }

        .key-space {
            width: 350px;
            height: 55px;
            font-size: 16px;
        }

        /* Key Highlights on Press */
        .key.active-press {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-top: 4px; /* compensate for movement */
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            filter: brightness(1.1);
        }

        /* Finger Color Coding */
        .left-pinky { background-color: #ffb3ba; }
        .left-ring { background-color: #ffdfba; }
        .left-middle { background-color: #ffffba; }
        .left-index { background-color: #baffc9; }
        .right-index { background-color: #bae1ff; }
        .right-middle { background-color: #d4a5ff; }
        .right-ring { background-color: #ffd1dc; }
        .right-pinky { background-color: #a2e4b8; }
        .thumbs { background-color: #e0e0e0; }

    </style>
</head>
<body>

    <header>
        <h1>Rhythmic Typing Keyboard</h1>
        <h2>Design for Basic Initial Keyboard Functioning</h2>
    </header>

    <div class="controls">
        <button id="start-btn">Start</button>
        
        <div class="volume-control">
            <label for="volume">Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8">
        </div>
        
        <div class="volume-control">
            <input type="checkbox" id="mute">
            <label for="mute">Mute</label>
        </div>
    </div>

    <div class="target-line-container">
        <div class="target-sequence" id="sequence-container">
            <!-- Targets will be injected here via JS -->
        </div>
    </div>

    <div class="keyboard" id="visual-keyboard">
        <!-- Top Row -->
        <div class="row">
            <div class="key left-pinky" id="key-Q">Q</div>
            <div class="key left-ring" id="key-W">W</div>
            <div class="key left-middle" id="key-E">E</div>
            <div class="key left-index" id="key-R">R</div>
            <div class="key left-index" id="key-T">T</div>
            <div class="key right-index" id="key-Y">Y</div>
            <div class="key right-index" id="key-U">U</div>
            <div class="key right-middle" id="key-I">I</div>
            <div class="key right-ring" id="key-O">O</div>
            <div class="key right-pinky" id="key-P">P</div>
        </div>
        <!-- Middle Row -->
        <div class="row">
            <div class="key left-pinky" id="key-A">A</div>
            <div class="key left-ring" id="key-S">S</div>
            <div class="key left-middle" id="key-D">D</div>
            <div class="key left-index" id="key-F">F</div>
            <div class="key left-index" id="key-G">G</div>
            <div class="key right-index" id="key-H">H</div>
            <div class="key right-index" id="key-J">J</div>
            <div class="key right-middle" id="key-K">K</div>
            <div class="key right-ring" id="key-L">L</div>
        </div>
        <!-- Bottom Row -->
        <div class="row">
            <div class="key left-pinky" id="key-Z">Z</div>
            <div class="key left-ring" id="key-X">X</div>
            <div class="key left-middle" id="key-C">C</div>
            <div class="key left-index" id="key-V">V</div>
            <div class="key left-index" id="key-B">B</div>
            <div class="key right-index" id="key-N">N</div>
            <div class="key right-index" id="key-M">M</div>
        </div>
        <!-- Spacebar Row -->
        <div class="row">
            <div class="key key-space thumbs" id="key-SPACE">SPACE</div>
        </div>
    </div>

    <script>
        // Data Configuration
        const SOUND_SETS = [
            {
                F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/KICK1.mp3",
                G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/SNARE2.mp3",
                SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Splash%2012%203.mp3"
            },
            {
                F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Electro%20kick%2001.mp3",
                G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/FM%20snare.mp3",
                SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Chime%20percussion_BLASTWAVEFX_30615.mp3"
            },
            {
                F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Fuzz%20Kick.mp3",
                G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Smack%20Snare.mp3",
                SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Maxi%20clap.mp3"
            }
        ];

        const EFFECTS = ["burst", "flyUp", "spinPop"];
        const PATTERN = ["F", "G", "F", "G", "F", "G", "F", "SPACE"];

        // State Variables
        let isStarted = false;
        let setIndex = 0;
        let currentBeatIndex = 0;
        let preloadedAudio = {};

        // DOM Elements
        const startBtn = document.getElementById('start-btn');
        const volumeInput = document.getElementById('volume');
        const muteInput = document.getElementById('mute');
        const sequenceContainer = document.getElementById('sequence-container');
        const visualKeyboard = document.getElementById('visual-keyboard');

        // Render the sequence line at the top
        function renderSequence() {
            sequenceContainer.innerHTML = '';
            PATTERN.forEach((key, index) => {
                const el = document.createElement('div');
                el.className = 'target-item';
                if (key === 'SPACE') {
                    el.innerText = 'SPACE';
                    el.classList.add('space-label');
                } else {
                    el.innerText = key;
                }
                
                if (index === currentBeatIndex) {
                    el.classList.add('current');
                }
                
                el.id = `target-${index}`;
                sequenceContainer.appendChild(el);
            });
        }

        // Preload Audio Objects
        function preloadAllAudio() {
            SOUND_SETS.forEach((set, i) => {
                preloadedAudio[i] = {};
                for (const key in set) {
                    const audioObj = new Audio(set[key]);
                    audioObj.load();
                    preloadedAudio[i][key] = audioObj;
                }
            });
        }

        // Play Sound function
        function playSound(keyStr) {
            if (muteInput.checked) return;
            
            const currentSetMod = setIndex % SOUND_SETS.length;
            const audioTemplate = preloadedAudio[currentSetMod][keyStr];
            
            if (audioTemplate) {
                // Clone the node to allow overlapping rapid plays without waiting
                const soundClone = audioTemplate.cloneNode();
                soundClone.volume = volumeInput.value;
                soundClone.play().catch(e => console.log('Audio playback blocked until interaction', e));
            }
        }

        // Particle generator for "burst" effect
        function createBurstParticles(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            const containerRect = sequenceContainer.getBoundingClientRect();
            
            const centerX = rect.left - containerRect.left + rect.width / 2;
            const centerY = rect.top - containerRect.top + rect.height / 2;

            const numParticles = 6;
            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Calculate random outward trajectory
                const angle = (i * (360 / numParticles)) * (Math.PI / 180);
                const distance = 40 + Math.random() * 20;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = `${centerX - 4}px`;
                particle.style.top = `${centerY - 4}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                sequenceContainer.appendChild(particle);
                
                // Cleanup particle
                setTimeout(() => {
                    if(particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 500);
            }
        }

        // Apply visual effect to target
        function applyVisualEffect(element) {
            const effectIndex = setIndex % EFFECTS.length;
            const effectName = EFFECTS[effectIndex];

            element.classList.remove('current');

            if (effectName === "burst") {
                element.classList.add('effect-burst');
                createBurstParticles(element);
            } else if (effectName === "flyUp") {
                element.classList.add('effect-flyUp');
            } else if (effectName === "spinPop") {
                element.classList.add('effect-spinPop');
            }
        }

        // Highlight Keyboard Key briefly
        function highlightKey(keyStr) {
            const keyEl = document.getElementById(`key-${keyStr}`);
            if (keyEl) {
                keyEl.classList.add('active-press');
                setTimeout(() => {
                    keyEl.classList.remove('active-press');
                }, 150);
            }
        }

        // Handle physical keyboard input
        function handleKeyDown(e) {
            if (!isStarted) return;
            
            // Prevent scrolling on Space
            if (e.code === 'Space') {
                e.preventDefault();
            }

            // Ignore auto-repeating keys if held down
            if (e.repeat) return;

            let pressedKey = e.key.toUpperCase();
            if (e.code === 'Space') {
                pressedKey = 'SPACE';
            }

            const expectedTarget = PATTERN[currentBeatIndex];

            if (pressedKey === expectedTarget) {
                // Correct key pressed
                const targetElement = document.getElementById(`target-${currentBeatIndex}`);
                
                playSound(expectedTarget);
                highlightKey(expectedTarget);
                applyVisualEffect(targetElement);

                // Advance to next beat
                currentBeatIndex++;

                if (currentBeatIndex >= PATTERN.length) {
                    // Reached the end of the 8-beat set
                    setIndex++;
                    currentBeatIndex = 0;
                    
                    // Small delay to let the final animation start before resetting the line visually
                    setTimeout(() => {
                        renderSequence();
                    }, 10); 
                } else {
                    // Highlight the new current target
                    document.getElementById(`target-${currentBeatIndex}`).classList.add('current');
                }
            }
            // Wrong key: do absolutely nothing (per prompt requirements)
        }

        // Setup Event Listeners
        startBtn.addEventListener('click', () => {
            isStarted = true;
            startBtn.innerText = 'Started';
            startBtn.disabled = true;
            visualKeyboard.classList.add('active');
            
            preloadAllAudio();
            renderSequence();
        });

        document.addEventListener('keydown', handleKeyDown);

        // Initial empty render setup to show the pattern immediately (inactive)
        renderSequence();

    </script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
</html>
