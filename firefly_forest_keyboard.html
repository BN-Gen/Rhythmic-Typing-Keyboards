<body>

  </section>
</main>
<script>
(function(){

const rows=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Z","X","C","V","B","N","M"]];
const themes={
  grove:{name:"Moonlit Grove",short:"Soft green lights, pop bubbles keyboard, and calm moon glow.",colors:["#7dffbd","#baf7df","#d9ff8c","#7ef7ff","#f6fff3"],effect:"grove",wave:"soft"},
  glow:{name:"Firefly Glow",short:"Warm golden sparks letters and bright trails keyboards.",colors:["#ffe26e","#ffbb4a","#fff2a5","#ff8ed8","#f97316"],effect:"glow",wave:"bright"},

  mushroom:{name:"Mushroom Stars",short:"Bouncy glowing mushrooms, star dust, and pink-purple pops.",colors:["#ff8ed8","#ffe26e","#7dffbd","#caa7ff","#ffb3ed"],effect:"mushroom",wave:"play"},

};
const app=document.getElementById("app"),ambient=document.getElementById("ambient"),effects=document.getElementById("effects"),menu=document.getElementById("menuScreen"),keys=document.getElementById("keysScreen"),keyboard=document.getElementById("keyboard"),start=document.getElementById("start"),back=document.getElementById("back"),themePill=document.getElementById("themePill"),menuDesc=document.getElementById("menuDesc"),themeOptions=document.getElementById("themeOptions");
let theme="grove",active="menu",audio=null,keyMap=new Map(),last=0;

function buildMenu(){themeOptions.innerHTML="";Object.entries(themes).forEach(([id,t],i)=>{const b=document.createElement("button");b.type="button";b.className="theme-option"+(i===0?" selected":"");b.dataset.theme=id;b.setAttribute("aria-pressed",i===0?"true":"false");b.innerHTML="<strong>"+t.name+"</strong><span>"+t.short+"</span>";b.addEventListener("click",()=>{setTheme(id);ensureAudio();tone(420+i*42,.12,"sine",.03)});themeOptions.appendChild(b)})}

function setupAmbient(){ambient.innerHTML="";const count=theme==="glow"?24:theme==="rain"?28:theme==="moss"||theme==="creek"?18:16;for(let i=0;i<count;i++){const s=document.createElement("span");s.className=(i%5===0&&theme!=="glow")?"alt":"";s.style.setProperty("--x",rand(3,95)+"%");s.style.setProperty("--y",rand(7,82)+"%");s.style.setProperty("--s",rand(4,theme==="glow"?12:14)+"px");s.style.setProperty("--t",rand(5.5,10.5)+"s");s.style.setProperty("--delay",rand(-9,0)+"s");s.style.setProperty("--r",theme==="moss"?"22% 78% 38% 62%":"999px");ambient.appendChild(s)}}
function buildKeyboard(){const rowEls=[...keyboard.querySelectorAll(".row")];keyMap=new Map();rows.forEach((letters,ri)=>{rowEls[ri].innerHTML="";letters.forEach((letter,i)=>{const btn=document.createElement("button");btn.type="button";btn.className="key";btn.textContent=letter;btn.dataset.key=letter;btn.setAttribute("aria-label","Letter "+letter);btn.style.setProperty("--glow",pal(letter.charCodeAt(0)+i));btn.addEventListener("pointerdown",e=>{e.preventDefault();triggerLetter(letter,btn)});rowEls[ri].appendChild(btn);keyMap.set(letter,btn)})});rowEls[3].innerHTML="";const space=document.createElement("button");space.type="button";space.className="key space";space.textContent="Space";space.dataset.key=" ";space.setAttribute("aria-label","Space bar");space.addEventListener("pointerdown",e=>{e.preventDefault();triggerSpace(space)});rowEls[3].appendChild(space);keyMap.set(" ",space)}

function many(cls,n,p,opts){for(let i=0;i<n;i++){add(cls,p.x+rand(opts.spread?-opts.spread:0,opts.spread||0),p.y+rand(opts.spread?-opts.spread:0,opts.spread||0),{"--s":rand(opts.s1,opts.s2)+"px","--col":pal(i+opts.shift),"--dx":rand(opts.dx1,opts.dx2)+"px","--dy":rand(opts.dy1,opts.dy2)+"px","--life":rand(opts.l1,opts.l2)+"ms","--spin":rand(-360,360)+"deg","--end":rand(.12,1.15)},opts.life||1500)}}

function trails(n,p,big){for(let i=0;i<n;i++)add("trail",p.x+rand(-8,8),p.y+rand(-6,6),{"--w":rand(big?120:70,big?380:170)+"px","--col":pal(i+1),"--rot":rand(-38,38)+"deg","--dx":rand(-130,130)+"px","--dy":rand(big?-95:-45,big?95:55)+"px"},980)}
function beams(n,p,big){for(let i=0;i<n;i++)add("beam",p.x,p.y,{"--w":rand(big?160:90,big?420:190)+"px","--h":rand(6,12)+"px","--col":pal(i+2),"--rot":rand(-70,70)+"deg","--dx":rand(-150,150)+"px","--dy":rand(-100,100)+"px"},1100)}
function effectsFor(code,p,big=false){const eff=themes[theme].effect;if(big)add("aurora",50,50,{},1300);if(eff==="grove"){many("bubble",big?44:9+(code%5),p,{s1:8,s2:big?38:22,dx1:-85,dx2:85,dy1:big?-260:-135,dy2:big?-70:-34,l1:780,l2:1450,shift:0,spread:8});rings(big?7:2,p,big);many("leaf",big?22:4,p,{s1:8,s2:18,dx1:-175,dx2:175,dy1:-145,dy2:105,l1:700,l2:1300,shift:1,spread:0})}else if(eff==="glow"){many("spark",big?78:16+(code%7),p,{s1:4,s2:big?16:11,dx1:-225,dx2:225,dy1:big?-185:-115,dy2:big?165:95,l1:520,l2:1200,shift:0,spread:0});trails(big?24:4,p,big)}else if(eff==="moss"){many("shard",big?56:12+(code%6),p,{s1:8,s2:big?30:20,dx1:-175,dx2:175,dy1:big?-185:-120,dy2:big?150:90,l1:650,l2:1350,shift:0,spread:0});many("spark",big?34:7,p,{s1:4,s2:10,dx1:-120,dx2:120,dy1:-130,dy2:110,l1:750,l2:1500,shift:2,spread:18});rings(big?6:2,p,big)}else if(eff==="lantern"){many("spark",big?48:10,p,{s1:8,s2:big?24:18,dx1:-120,dx2:120,dy1:big?-210:-120,dy2:big?-30:-20,l1:900,l2:1650,shift:0,spread:18});trails(big?15:3,p,big);beams(big?5:1,p,big)}else if(eff==="creek"){many("drop",big?60:14,p,{s1:7,s2:big?22:16,dx1:-85,dx2:85,dy1:90,dy2:big?250:170,l1:620,l2:1200,shift:1,spread:24});rings(big?10:3,p,big);many("shard",big?24:5,p,{s1:7,s2:18,dx1:-130,dx2:130,dy1:-120,dy2:60,l1:700,l2:1300,shift:3,spread:0})}else if(eff==="mushroom"){many("mush",big?42:8,p,{s1:18,s2:big?48:32,dx1:-150,dx2:150,dy1:big?-180:-120,dy2:big?80:40,l1:650,l2:1250,shift:0,spread:8});many("spark",big?46:10,p,{s1:4,s2:11,dx1:-170,dx2:170,dy1:-140,dy2:120,l1:600,l2:1300,shift:2,spread:0});rings(big?5:1,p,big)}else if(eff==="owl"){many("feather",big?44:9,p,{s1:8,s2:big?28:20,dx1:-180,dx2:180,dy1:big?-210:-150,dy2:big?130:80,l1:850,l2:1700,shift:0,spread:10});rings(big?9:3,p,big);beams(big?4:1,p,big)}else{many("drop",big?82:18,p,{s1:6,s2:big?20:14,dx1:-70,dx2:70,dy1:130,dy2:big?300:190,l1:520,l2:1100,shift:0,spread:35});many("spark",big?28:6,p,{s1:4,s2:9,dx1:-120,dx2:120,dy1:-90,dy2:100,l1:700,l2:1300,shift:2,spread:12});beams(big?8:2,p,big)}}
function mark(btn){if(!btn)return;btn.classList.add("pressed");setTimeout(()=>btn.classList.remove("pressed"),150)}
function triggerLetter(letter,btn){if(active!=="keys")return;const code=letter.charCodeAt(0)-65,p=posFromButton(btn||keyMap.get(letter));mark(btn||keyMap.get(letter));soundLetter(letter);letterPop(letter,code,p);effectsFor(code,p,false)}
function triggerSpace(btn){if(active!=="keys")return;const p={x:50,y:50};mark(btn||keyMap.get(" "));soundSpace();effectsFor(11,p,true)}
window.addEventListener("keydown",e=>{if(active!=="keys"||e.repeat)return;const now=Date.now();if(now-last<18)return;last=now;if(e.key===" "){e.preventDefault();triggerSpace(keyMap.get(" "));return}const k=e.key.toUpperCase();if(/^[A-Z]$/.test(k)){e.preventDefault();triggerLetter(k,keyMap.get(k))}},{passive:false});
start.addEventListener("click",()=>{ensureAudio();show("keys");setTimeout(()=>triggerSpace(keyMap.get(" ")),60);tone(392,.16,"triangle",.035);tone(588,.18,"sine",.028,.06)});back.addEventListener("click",()=>{ensureAudio();show("menu");tone(262,.12,"triangle",.032)});
buildMenu();buildKeyboard();setTheme("grove");setupAmbient();
})();
