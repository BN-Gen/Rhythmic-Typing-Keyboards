<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Underwater Glow Keyboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    :root {
      --deep0: #03111f;
      --deep1: #063451;
      --deep2: #087b94;
      --glowA: #55f3ff;
      --glowB: #aa7dff;
      --glowC: #7dffd6;
      --glowD: #fff3ae;
      --coral: #ff77b7;
      --reef: #45ffba;
      --ink: #f4fdff;
      --muted: rgba(230, 255, 255, .78);
      --glass: rgba(7, 44, 68, .66);
      --glass2: rgba(255, 255, 255, .12);
      --shadow: rgba(0, 13, 27, .62);
      --keyTop: rgba(96, 241, 255, .42);
      --keyBottom: rgba(13, 80, 113, .78);
      --keyEdge: rgba(191, 255, 255, .72);
      --keyGlow: rgba(85, 243, 255, .42);
      --panelBorder: rgba(167, 249, 255, .42);
      --stageFilter: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep0);
      color: var(--ink);
      font-family: ui-rounded, "Trebuchet MS", "Arial Rounded MT Bold", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button { font: inherit; color: inherit; }

    body[data-theme="coral"] {
      --deep0: #041827;
      --deep1: #075471;
      --deep2: #0b9ab0;
      --glowA: #62f6ff;
      --glowB: #ff8ed4;
      --glowC: #69ffc6;
      --glowD: #fff0a8;
      --coral: #ff6dac;
      --reef: #42f59c;
      --keyTop: rgba(94, 245, 255, .48);
      --keyBottom: rgba(13, 98, 123, .82);
    }

    body[data-theme="jellyfish"] {
      --deep0: #070b2a;
      --deep1: #10245c;
      --deep2: #2268a4;
      --glowA: #78f7ff;
      --glowB: #d895ff;
      --glowC: #94ffed;
      --glowD: #ffeaa8;
      --coral: #ce8bff;
      --reef: #62e7ff;
      --keyTop: rgba(152, 169, 255, .42);
      --keyBottom: rgba(24, 45, 114, .82);
    }

    body[data-theme="deep"] {
      --deep0: #010713;
      --deep1: #041d3d;
      --deep2: #073d63;
      --glowA: #31dfff;
      --glowB: #6f75ff;
      --glowC: #2affcd;
      --glowD: #d9fff8;
      --coral: #54a4ff;
      --reef: #37ffc8;
      --keyTop: rgba(49, 223, 255, .35);
      --keyBottom: rgba(5, 29, 62, .90);
    }

    body[data-theme="lagoon"] {
      --deep0: #052336;
      --deep1: #0b7793;
      --deep2: #19b8c7;
      --glowA: #b6fff7;
      --glowB: #ffbbe1;
      --glowC: #7effd1;
      --glowD: #fff7c2;
      --coral: #ffa1c9;
      --reef: #78ffc8;
      --keyTop: rgba(182, 255, 247, .52);
      --keyBottom: rgba(7, 116, 137, .78);
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 119, 183, .22), transparent 24%),
        radial-gradient(circle at 82% 20%, rgba(85, 243, 255, .22), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(125, 255, 214, .16), transparent 34%),
        linear-gradient(180deg, var(--deep2) 0%, var(--deep1) 38%, var(--deep0) 100%);
      filter: var(--stageFilter);
      transition: background 420ms ease;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -18% -10% 0;
      pointer-events: none;
      background:
        linear-gradient(112deg, transparent 0 18%, rgba(230, 255, 255, .19) 21%, transparent 31%),
        linear-gradient(96deg, transparent 0 52%, rgba(230, 255, 255, .12) 57%, transparent 67%),
        linear-gradient(82deg, transparent 0 71%, rgba(230, 255, 255, .10) 75%, transparent 84%);
      opacity: .92;
      transform-origin: top center;
      animation: lightDrift 8s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 120%, transparent 0 50%, rgba(0, 8, 20, .58) 100%),
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 16%, transparent 75%, rgba(0,0,0,.36));
    }

    @keyframes lightDrift {
      from { transform: translateX(-2%) skewX(-4deg); opacity: .72; }
      to { transform: translateX(3%) skewX(5deg); opacity: 1; }
    }

    .waveLayer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: .38;
      background:
        repeating-radial-gradient(ellipse at 45% -8%, rgba(255,255,255,.14) 0 2px, transparent 3px 32px),
        linear-gradient(180deg, rgba(255,255,255,.09), transparent 22%);
      animation: waveFloat 7s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes waveFloat {
      from { transform: translateY(-12px) scaleX(1.02); }
      to { transform: translateY(12px) scaleX(.98); }
    }

    .seaFloor {
      position: fixed;
      left: -4vw;
      right: -4vw;
      bottom: -14px;
      height: min(24vh, 210px);
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 18% 100%, rgba(255, 119, 183, .42), transparent 28%),
        radial-gradient(ellipse at 70% 100%, rgba(125, 255, 214, .30), transparent 26%),
        linear-gradient(180deg, transparent, rgba(0, 9, 18, .60) 44%, rgba(0, 5, 12, .94));
    }

    .coral {
      position: absolute;
      bottom: 16px;
      width: 110px;
      height: 118px;
      opacity: .90;
      filter: drop-shadow(0 0 18px rgba(255, 119, 183, .26));
    }
    .coral::before, .coral::after, .coral i, .coral b {
      content: "";
      position: absolute;
      bottom: 0;
      width: 17px;
      border-radius: 999px 999px 12px 12px;
      background: linear-gradient(180deg, var(--coral), rgba(255,255,255,.15));
      transform-origin: bottom center;
      box-shadow: 0 0 16px rgba(255, 119, 183, .32);
    }
    .coral::before { left: 50px; height: 112px; }
    .coral::after { left: 31px; height: 76px; transform: rotate(-32deg); }
    .coral i { left: 72px; height: 86px; transform: rotate(28deg); }
    .coral b { left: 14px; height: 52px; transform: rotate(-18deg); background: linear-gradient(180deg, var(--reef), rgba(255,255,255,.12)); }
    .coral.left { left: 3vw; }
    .coral.right { right: 5vw; transform: scaleX(-1); }

    .bubbleField {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }
    .ambientBubble {
      position: absolute;
      bottom: -50px;
      border-radius: 50%;
      border: 1.7px solid rgba(213, 255, 255, .56);
      background: radial-gradient(circle at 32% 25%, rgba(255,255,255,.75) 0 7%, rgba(255,255,255,.10) 20%, rgba(85, 243, 255, .06) 70%);
      box-shadow: inset 0 0 12px rgba(255,255,255,.18), 0 0 13px rgba(85,243,255,.18);
      animation: ambientRise var(--dur, 12s) linear infinite;
      animation-delay: var(--delay, 0s);
      opacity: var(--op, .5);
    }
    @keyframes ambientRise {
      from { transform: translate3d(0, 0, 0) scale(.55); }
      to { transform: translate3d(var(--drift, 20px), -116vh, 0) scale(1.15); }
    }

    .page {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 10;
      pointer-events: auto;
    }
    .page.active { display: block; }

    #menuPage {
      overflow-y: auto;
      padding: clamp(14px, 2vw, 28px);
    }
    #menuPage::-webkit-scrollbar { width: 0; }

    .menuShell {
      width: min(1180px, 96vw);
      min-height: 100%;
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: clamp(14px, 2vw, 22px);
      padding: 16px 0 28px;
    }

    .heroPanel {
      position: relative;
      min-height: clamp(260px, 38vh, 440px);
      overflow: hidden;
      border-radius: clamp(28px, 4vw, 52px);
      border: 2px solid var(--panelBorder);
      background:
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.18), transparent 22%),
        radial-gradient(circle at 78% 36%, rgba(255,119,183,.18), transparent 25%),
        linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.045)),
        rgba(5, 32, 54, .62);
      box-shadow:
        0 26px 90px rgba(0,0,0,.45),
        0 0 54px rgba(85,243,255,.18),
        inset 0 1px 0 rgba(255,255,255,.22);
      backdrop-filter: blur(15px);
      padding: clamp(22px, 4vw, 54px);
    }

    .heroPanel::before {
      content: "";
      position: absolute;
      inset: auto -12% -70px -12%;
      height: 200px;
      opacity: .75;
      background:
        radial-gradient(ellipse at 20% 68%, rgba(255, 119, 183, .60), transparent 20%),
        radial-gradient(ellipse at 80% 67%, rgba(125, 255, 214, .45), transparent 22%),
        linear-gradient(90deg, transparent, rgba(85,243,255,.44), rgba(170,125,255,.34), rgba(255,119,183,.38), transparent);
      clip-path: polygon(0 78%, 4% 55%, 8% 72%, 12% 26%, 18% 70%, 24% 38%, 29% 78%, 34% 24%, 40% 70%, 46% 46%, 52% 82%, 57% 28%, 63% 74%, 69% 44%, 76% 76%, 82% 31%, 89% 74%, 94% 54%, 100% 82%, 100% 100%, 0 100%);
      filter: drop-shadow(0 0 22px var(--glowA));
      animation: reefGlow 2.8s ease-in-out infinite alternate;
    }
    @keyframes reefGlow {
      from { transform: translateX(-2%) scaleY(.92); opacity: .52; }
      to { transform: translateX(2%) scaleY(1.08); opacity: .82; }
    }

    .heroPanel::after {
      content: "";
      position: absolute;
      right: clamp(14px, 4vw, 58px);
      top: clamp(24px, 5vw, 80px);
      width: clamp(118px, 17vw, 225px);
      height: clamp(118px, 17vw, 225px);
      border-radius: 52% 48% 60% 40%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.74) 0 7%, transparent 8%),
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.16), transparent 34%),
        linear-gradient(145deg, rgba(170,125,255,.45), rgba(85,243,255,.14));
      border: 2px solid rgba(221,255,255,.32);
      box-shadow: 0 0 34px rgba(170,125,255,.30), inset 0 0 36px rgba(255,255,255,.16);
      animation: jellyPulse 3.2s ease-in-out infinite alternate;
    }

    @keyframes jellyPulse {
      from { transform: translateY(0) rotate(-5deg) scale(.96); }
      to { transform: translateY(14px) rotate(5deg) scale(1.04); }
    }

    .heroContent {
      position: relative;
      z-index: 2;
      max-width: 760px;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      color: var(--glowD);
      font-size: clamp(12px, 1.5vw, 15px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .13em;
      box-shadow: 0 0 20px rgba(255, 243, 174, .13);
    }
    h1 {
      margin: 14px 0 10px;
      font-size: clamp(48px, 8vw, 106px);
      line-height: .88;
      letter-spacing: -.045em;
      text-shadow:
        0 0 16px rgba(85,243,255,.75),
        0 0 42px rgba(170,125,255,.38),
        0 7px 0 rgba(0,0,0,.20);
    }
    .heroText {
      margin: 0;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 24px);
      line-height: 1.32;
      font-weight: 800;
      text-shadow: 0 3px 18px rgba(0,0,0,.35);
    }
    .menuActions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 22px;
    }
    .openButton, .themeChoice, .backButton {
      border: 0;
      cursor: pointer;
      font-weight: 1000;
      transition: transform .13s ease, filter .13s ease, box-shadow .13s ease;
    }
    .openButton {
      min-height: 62px;
      padding: 15px 26px;
      border-radius: 999px;
      color: #032334;
      font-size: clamp(18px, 2vw, 23px);
      background: linear-gradient(135deg, #e6ffff, var(--glowA) 32%, var(--glowC) 66%, var(--glowD));
      box-shadow: 0 14px 32px rgba(0,0,0,.34), 0 0 32px rgba(85,243,255,.30), inset 0 2px 0 rgba(255,255,255,.65);
    }
    .openButton:hover, .themeChoice:hover, .backButton:hover { transform: translateY(-3px) scale(1.025); filter: brightness(1.08); }
    .openButton:active, .themeChoice:active, .backButton:active { transform: translateY(1px) scale(.98); }

    .choiceGrid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(10px, 1.5vw, 16px);
    }
    .themeChoice {
      position: relative;
      min-height: clamp(126px, 18vh, 190px);
      overflow: hidden;
      padding: 18px;
      text-align: left;
      color: white;
      border-radius: 30px;
      border: 1.7px solid rgba(210,255,255,.22);
      background:
        radial-gradient(circle at 26% 18%, var(--cardA), transparent 24%),
        radial-gradient(circle at 78% 74%, var(--cardB), transparent 24%),
        linear-gradient(145deg, rgba(255,255,255,.15), rgba(255,255,255,.035)),
        rgba(1, 22, 39, .72);
      box-shadow: 0 18px 36px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .themeChoice::before {
      content: "";
      position: absolute;
      left: -8%; right: -8%; bottom: 8px;
      height: 58px;
      opacity: .6;
      background: linear-gradient(90deg, transparent, var(--cardA), var(--cardB), transparent);
      clip-path: polygon(0 60%, 8% 42%, 16% 66%, 24% 34%, 32% 70%, 40% 44%, 50% 68%, 59% 28%, 68% 66%, 77% 38%, 88% 64%, 100% 50%, 100% 100%, 0 100%);
      animation: smallWave 1.8s ease-in-out infinite alternate;
    }
    .themeChoice::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 16px;
      width: 56px;
      height: 56px;
      border-radius: var(--orbRadius, 50%);
      background: radial-gradient(circle at 32% 25%, rgba(255,255,255,.85), var(--cardA) 24%, var(--cardB) 74%);
      box-shadow: 0 0 24px var(--cardA);
      transform: rotate(var(--orbRot, -8deg));
    }
    .themeChoice.active {
      outline: 3px solid rgba(255, 243, 174, .95);
      box-shadow: 0 0 0 2px rgba(255,255,255,.18), 0 0 38px rgba(85,243,255,.26), inset 0 1px 0 rgba(255,255,255,.22);
    }
    .themeChoice strong {
      position: relative;
      z-index: 2;
      display: block;
      max-width: calc(100% - 64px);
      font-size: clamp(20px, 2vw, 27px);
      line-height: .96;
      text-shadow: 0 3px 12px rgba(0,0,0,.30);
    }
    .themeChoice span {
      position: relative;
      z-index: 2;
      display: block;
      margin-top: 8px;
      color: rgba(237, 255, 255, .76);
      font-size: clamp(13px, 1.35vw, 16px);
      line-height: 1.25;
      font-weight: 800;
    }
    @keyframes smallWave { to { transform: translateX(20px) scaleY(1.18); opacity: .80; } }

    #keyboardPage { padding: clamp(8px, 1.5vw, 22px); }
    .keyboardShell {
      width: min(1180px, 99vw);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: stretch;
      gap: clamp(8px, 1.7vh, 18px);
    }
    .topBar {
      position: relative;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 54px;
    }
    .backButton {
      min-width: 112px;
      min-height: 50px;
      border-radius: 999px;
      color: #032334;
      background: linear-gradient(135deg, #ffffff, var(--glowA), var(--glowC));
      box-shadow: 0 12px 26px rgba(0,0,0,.36), 0 0 24px rgba(85,243,255,.25), inset 0 2px 0 rgba(255,255,255,.75);
      font-size: 18px;
    }
    .keyboardArea {
      min-height: 0;
      display: grid;
      align-content: end;
      justify-items: center;
      padding-bottom: clamp(8px, 2.1vh, 24px);
    }
    #keyboard {
      position: relative;
      z-index: 50;
      width: min(1080px, 98vw);
      padding: clamp(12px, 1.7vw, 22px);
      border-radius: clamp(28px, 3vw, 42px);
      border: 2px solid var(--panelBorder);
      background:
        radial-gradient(circle at 22% 0%, rgba(255,255,255,.16), transparent 32%),
        radial-gradient(circle at 78% 10%, rgba(170,125,255,.14), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.045)),
        var(--glass);
      box-shadow:
        0 30px 80px rgba(0,0,0,.62),
        0 0 46px var(--keyGlow),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -16px 50px rgba(0, 20, 34, .38);
      backdrop-filter: blur(18px);
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: clamp(7px, 1vw, 13px);
      margin-bottom: clamp(8px, 1vw, 14px);
    }
    .kb-row:last-child { margin-bottom: 0; }
    .row-home { transform: translateX(3.4%); }
    .row-bottom { transform: translateX(-.8%); }

    .key {
      position: relative;
      display: grid;
      place-items: center;
      min-width: clamp(48px, 7.7vw, 84px);
      height: clamp(56px, 7.2vw, 84px);
      padding: 0 8px;
      border: 0;
      border-radius: 23px 18px 27px 20px;
      cursor: pointer;
      color: #f7ffff;
      background:
        radial-gradient(circle at 38% 22%, rgba(255,255,255,.74) 0 8%, rgba(255,255,255,.18) 9% 22%, transparent 38%),
        linear-gradient(155deg, var(--keyTop), var(--keyBottom));
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.30),
        inset 0 -6px 10px rgba(0,18,34,.34),
        0 10px 18px rgba(0,0,0,.34),
        0 0 18px rgba(85,243,255,.12);
      font-size: clamp(26px, 3.1vw, 40px);
      font-weight: 1000;
      letter-spacing: .035em;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0, 28, 44, .30), 0 0 12px rgba(255,255,255,.60);
      overflow: hidden;
      transition: transform 78ms ease, filter 100ms ease, box-shadow 120ms ease;
    }
    .key::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--stripe, var(--glowA)), transparent);
      box-shadow: 0 0 13px var(--stripe, var(--glowA));
      opacity: .86;
    }
    .key::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      border: 1px solid rgba(236, 255, 255, .22);
      pointer-events: none;
    }
    .key:nth-child(3n+1) { border-radius: 30px 20px 24px 18px; }
    .key:nth-child(3n+2) { border-radius: 19px 31px 20px 29px; }
    .key:nth-child(3n) { border-radius: 27px 22px 32px 20px; }
    .key.active {
      transform: translateY(-8px) scale(1.075);
      filter: brightness(1.16) saturate(1.12);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.48),
        inset 0 -5px 10px rgba(0,18,34,.30),
        0 16px 24px rgba(0,0,0,.38),
        0 0 24px var(--stripe, var(--glowA)),
        0 0 58px rgba(85,243,255,.24);
    }
    .spaceRow { margin-top: clamp(2px, .7vw, 7px); }
    .spaceKey {
      width: min(640px, 80vw);
      height: clamp(58px, 7vw, 82px);
      border-radius: 999px 999px 34px 34px;
      font-size: clamp(18px, 2.6vw, 32px);
      letter-spacing: .18em;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.34), transparent 36%),
        radial-gradient(circle at 22% 80%, rgba(255,119,183,.22), transparent 20%),
        linear-gradient(135deg, rgba(125,255,214,.58), rgba(85,243,255,.34), rgba(170,125,255,.30));
    }
    .key[data-i="0"], .key[data-i="8"], .key[data-i="16"], .key[data-i="24"] { --stripe: var(--glowD); }
    .key[data-i="1"], .key[data-i="9"], .key[data-i="17"], .key[data-i="25"] { --stripe: var(--glowA); }
    .key[data-i="2"], .key[data-i="10"], .key[data-i="18"] { --stripe: var(--coral); }
    .key[data-i="3"], .key[data-i="11"], .key[data-i="19"] { --stripe: var(--reef); }
    .key[data-i="4"], .key[data-i="12"], .key[data-i="20"] { --stripe: var(--glowB); }
    .key[data-i="5"], .key[data-i="13"], .key[data-i="21"] { --stripe: var(--glowC); }
    .key[data-i="6"], .key[data-i="14"], .key[data-i="22"] { --stripe: #7ed7ff; }
    .key[data-i="7"], .key[data-i="15"], .key[data-i="23"] { --stripe: #fff7cf; }

    #fxLayer, #letterLayer {
      position: fixed;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      overflow: hidden;
    }
    #letterLayer { z-index: 90; }

    .letterPop {
      position: fixed;
      left: var(--x);
      top: var(--y);
      display: grid;
      place-items: center;
      width: var(--s, 112px);
      height: var(--s, 112px);
      color: white;
      font-size: calc(var(--s, 112px) * .48);
      font-weight: 1000;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0,0,0,.18), 0 0 14px rgba(255,255,255,.72);
      transform: translate(-50%, -50%) scale(.2) rotate(var(--r, -8deg));

    .letterPop.shell {

      clip-path: polygon(50% 0, 60% 23%, 85% 12%, 76% 38%, 100% 50%, 76% 62%, 85% 88%, 60% 77%, 50% 100%, 40% 77%, 15% 88%, 24% 62%, 0 50%, 24% 38%, 15% 12%, 40% 23%);

    @keyframes popFloat {

      22% { opacity: 1; transform: translate(-50%, -68%) scale(1.12) rotate(var(--r, -8deg)); }
      60% { opacity: 1; transform: translate(calc(-50% + var(--dx, 18px)), calc(-50% - 98px)) scale(1.02) rotate(calc(var(--r, -8deg) + 7deg)); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx, 45px)), calc(-50% - 210px)) scale(.58) rotate(calc(var(--r, -8deg) + 18deg)); }

    .fxParticle {
      position: fixed;
      left: var(--x);
      top: var(--y);
      width: var(--s, 14px);
      height: var(--s, 14px);
      pointer-events: none;
      background: var(--c, var(--glowA));
      box-shadow: 0 0 14px var(--c, var(--glowA));
      transform: translate(-50%, -50%) scale(.35) rotate(0deg);
      opacity: .95;
      animation: particleFly var(--dur, .78s) ease-out forwards;
      will-change: transform, opacity;
    }
    .fxParticle.bubbleP {
      border-radius: 50%;

      border: 1.5px solid rgba(230,255,255,.62);
      box-shadow: inset 0 0 12px rgba(255,255,255,.18), 0 0 15px rgba(85,243,255,.18);
    }

    .fxParticle.shardP { clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
    .fxParticle.petalP { border-radius: 80% 20% 80% 20%; }
    .fxParticle.trailP { height: 4px; width: var(--s, 48px); border-radius: 999px; transform-origin: center; }
    @keyframes particleFly {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.15) rotate(0deg); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--scale, 1.1)) rotate(var(--rot, 160deg)); }
    }

    .rippleRing {
      position: fixed;
      left: var(--x);
      top: var(--y);
      width: var(--s, 34px);
      height: var(--s, 34px);
      border: 3px solid var(--c, var(--glowA));

      opacity: .95;
      animation: ringOut var(--dur, .88s) ease-out forwards;

    @keyframes ringOut {
      to { opacity: 0; transform: translate(-50%, -50%) scale(var(--scale, 7)); }

    .jellyTrail {
      position: fixed;
      left: var(--x);
      top: var(--y);
      width: var(--w, 190px);
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--c, var(--glowB)), var(--c2, var(--glowA)), transparent);
      filter: blur(.3px) drop-shadow(0 0 18px var(--c, var(--glowB)));
      transform: translate(-50%, -50%) rotate(var(--rot, -16deg)) scaleX(.15);
      opacity: 0;
      animation: jellySlide var(--dur, .9s) ease-out forwards;

    .jellyTrail::before, .jellyTrail::after {
      content: "";
      position: absolute;
      left: 30%;
      top: 12px;
      width: 46%;
      height: 42px;
      border-radius: 0 0 999px 999px;
      border-left: 2px solid rgba(255,255,255,.30);
      border-bottom: 2px solid rgba(255,255,255,.18);
      transform: skewX(-20deg);
      opacity: .62;
    }
    .jellyTrail::after { left: 50%; width: 28%; transform: skewX(18deg); }
    @keyframes jellySlide {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot, -16deg)) scaleX(.12); }
      25% { opacity: .92; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx, 90px)), calc(-50% + var(--dy, -30px))) rotate(var(--rot, -16deg)) scaleX(1.18); }
    }

    .waveSweep {
      position: fixed;
      left: -20vw;
      top: var(--y, 42vh);
      width: 140vw;
      height: var(--h, 96px);
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), var(--c, var(--glowA)), var(--c2, var(--glowB)), rgba(255,255,255,.08), transparent);
      clip-path: polygon(0 50%, 6% 42%, 12% 57%, 19% 29%, 28% 62%, 37% 36%, 45% 58%, 53% 22%, 62% 65%, 70% 40%, 80% 60%, 90% 35%, 100% 55%, 100% 72%, 90% 52%, 80% 77%, 70% 55%, 62% 80%, 53% 40%, 45% 74%, 37% 52%, 28% 80%, 19% 44%, 12% 73%, 6% 57%, 0 68%);
      filter: drop-shadow(0 0 24px var(--c, var(--glowA)));
      animation: waveSweepMove 1.05s ease-out forwards;
      transform: translateX(-18%) scaleY(.7);
    }
    @keyframes waveSweepMove {
      0% { opacity: 0; transform: translateX(-22%) scaleY(.52); }
      18%, 55% { opacity: .86; }
      100% { opacity: 0; transform: translateX(18%) scaleY(1.05); }
    }

    .screenFlash {
      position: fixed;
      inset: 0;
      z-index: 65;
      pointer-events: none;
      background: radial-gradient(circle at 50% 55%, rgba(255,255,255,.28), rgba(85,243,255,.16) 24%, transparent 58%);
      opacity: 0;
      animation: screenPulse .72s ease-out forwards;
    }
    @keyframes screenPulse {
      0% { opacity: 0; transform: scale(.92); }
      25% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.18); }
    }


    /* Sub-theme-specific menu card motion and extra key effects */
    body[data-theme="coral"] .stage {
      background:
        radial-gradient(circle at 12% 22%, rgba(255, 119, 183, .30), transparent 24%),
        radial-gradient(circle at 78% 28%, rgba(69, 255, 186, .24), transparent 28%),

    body[data-theme="jellyfish"] .stage {
      background:
        radial-gradient(circle at 18% 18%, rgba(216, 149, 255, .28), transparent 25%),

    .themeChoice .cardEffect {

      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      opacity: .96;
    }
    .themeChoice .cardEffect span {
      position: absolute;
      display: block;
      left: var(--x, 50%);
      top: var(--y, 50%);
      width: var(--s, 30px);
      height: var(--s, 30px);
      transform: translate(-50%, -50%);
    }
    .themeChoice[data-theme="coral"] .cardEffect span {
      bottom: -18px;
      top: auto;
      width: 12px;
      height: var(--h, 78px);
      border-radius: 999px 999px 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.72), var(--cardA) 20%, var(--cardB));
      box-shadow: 0 0 17px var(--cardA);
      transform: translateX(-50%) rotate(var(--r, 0deg));

      content: "";

      border-radius: 999px;

    .themeChoice[data-theme="coral"] .cardEffect span::after { right: -9px; transform: rotate(38deg); }
    @keyframes cardCoralGrow { from { transform: translateX(-50%) rotate(var(--r, 0deg)) scaleY(.72); } to { transform: translateX(-50%) rotate(calc(var(--r, 0deg) * -1)) scaleY(1.12); } }

    .themeChoice[data-theme="jellyfish"] .cardEffect span {
      border-radius: 58% 42% 50% 50% / 62% 62% 38% 38%;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,.86), var(--cardA) 22%, rgba(255,255,255,.10) 48%, transparent 72%);
      border: 1px solid rgba(255,255,255,.32);

        repeating-linear-gradient(90deg, rgba(255,255,255,.34) 0 2px, transparent 3px 12px),

      mask-image: linear-gradient(180deg, #000, transparent);
      opacity: .80;

    @keyframes cardJellyFloat { from { transform: translate(-50%, -50%) translateY(9px) scale(.9); } to { transform: translate(-50%, -50%) translateY(-12px) scale(1.06); } }

    .themeChoice[data-theme="deep"] .cardEffect span {
      width: var(--w, 12px);
      height: var(--h, 120px);
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, var(--cardA), rgba(255,255,255,.65), transparent);
      box-shadow: 0 0 25px var(--cardA);
      transform: translate(-50%, -50%) rotate(var(--r, 18deg));
      opacity: .72;
      animation: cardDeepBeam 2.8s ease-in-out infinite alternate;
    }
    .themeChoice[data-theme="deep"] .cardEffect span::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cardB);
      box-shadow: 0 0 18px var(--cardB), 18px 22px 0 -3px var(--cardA), -20px -18px 0 -4px var(--cardB);
    }
    @keyframes cardDeepBeam { from { transform: translate(-50%, -50%) rotate(var(--r, 18deg)) translateY(12px); opacity: .38; } to { transform: translate(-50%, -50%) rotate(calc(var(--r, 18deg) * -1)) translateY(-12px); opacity: .86; } }

    .themeChoice[data-theme="lagoon"] .cardEffect span {
      border-radius: 50%;
      background: radial-gradient(circle at 32% 26%, rgba(255,255,255,.90) 0 9%, rgba(255,255,255,.16) 23%, rgba(255,255,255,.03) 70%);
      border: 1.7px solid rgba(238,255,255,.62);
      box-shadow: inset 0 0 16px rgba(255,255,255,.18), 0 0 18px var(--cardA);
      animation: cardBubbleRise 2.4s ease-in-out infinite;
      opacity: .78;

    @keyframes cardBubbleRise { 0% { transform: translate(-50%, 80%) scale(.58); opacity: 0; } 20%, 70% { opacity: .82; } 100% { transform: translate(calc(-50% + var(--drift, 20px)), -190%) scale(1.18); opacity: 0; } }

    .themeChoice[data-theme="coral"]::after {
      border-radius: 58% 42% 61% 39%;
      clip-path: polygon(50% 0, 68% 20%, 88% 18%, 82% 42%, 100% 58%, 76% 70%, 70% 94%, 50% 78%, 30% 94%, 24% 70%, 0 58%, 18% 42%, 12% 18%, 32% 20%);
    }
    .themeChoice[data-theme="jellyfish"]::after {
      border-radius: 58% 42% 50% 50% / 64% 64% 36% 36%;
      animation: cardJellyFloat 2.3s ease-in-out infinite alternate;

      border-radius: 28px 28px 50% 50%;
      clip-path: polygon(50% 0, 80% 18%, 70% 100%, 30% 100%, 20% 18%);
    }
    .themeChoice[data-theme="lagoon"]::after { border-radius: 999px; }

    .letterPop.reefOrb {

      left: var(--x);
      top: var(--y);
      will-change: transform, opacity;

    .jellyBurst {

    @keyframes jellyBurstDrift { 0% { opacity: 0; transform: translate(-50%, -50%) scale(.25); } 20%, 75% { opacity: .94; } 100% { opacity: 0; transform: translate(calc(-50% + var(--dx, 80px)), calc(-50% + var(--dy, -120px))) scale(1.12); } }

    .deepBeam {

    .abyssSpark {

    .abyssSpark::after { right: 20%; }

    .bubbleFountain {
      width: 1px;
      height: 1px;

    .bubbleFountain span {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--s, 22px);
      height: var(--s, 22px);
      border-radius: 50%;
      background: radial-gradient(circle at 32% 26%, rgba(255,255,255,.88) 0 10%, rgba(255,255,255,.18) 24%, transparent 70%);

      animation: fountainBubble var(--dur, 1s) ease-out forwards;
    }
    @keyframes fountainBubble { 0% { opacity: 0; transform: translate(-50%, -50%) scale(.25); } 18%, 70% { opacity: .9; } 100% { opacity: 0; transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, -220px))) scale(1.2); } }

    .foamRing {
      width: var(--s, 68px);
      height: var(--s, 68px);
      border-radius: 50%;
      border: 5px dotted rgba(255,255,255,.82);
      box-shadow: 0 0 18px var(--c, var(--glowA));
      transform: translate(-50%, -50%) scale(.2) rotate(0deg);
      animation: foamRingPop .86s ease-out forwards;
    }
    @keyframes foamRingPop { to { opacity: 0; transform: translate(-50%, -50%) scale(2.8) rotate(140deg); } }

    .pearlOrbit {
      width: var(--s, 122px);
      height: var(--s, 122px);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.32);
      box-shadow: 0 0 22px var(--c, var(--glowD));
      transform: translate(-50%, -50%) scale(.2) rotate(0deg);
      animation: pearlOrbitOut 1.1s ease-out forwards;
    }
    .pearlOrbit::before, .pearlOrbit::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, #fff, var(--c, var(--glowD)));
      box-shadow: 0 0 15px var(--c, var(--glowD));
    }
    .pearlOrbit::before { left: 4px; top: 50%; }
    .pearlOrbit::after { right: 8px; top: 20%; }
    @keyframes pearlOrbitOut { 20%, 70% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(180deg); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4) rotate(430deg); } }

    @media (max-width: 900px) {
      .choiceGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .heroPanel::after { opacity: .42; }
      .key { min-width: clamp(37px, 8.8vw, 70px); height: clamp(48px, 8.5vw, 72px); font-size: clamp(22px, 4.1vw, 34px); }
      #keyboard { width: 99vw; padding: clamp(9px, 1.6vw, 16px); }
      .kb-row { gap: clamp(5px, .9vw, 9px); }
      .spaceKey { width: min(560px, 83vw); }
    }

    @media (max-width: 560px) {
      .choiceGrid { grid-template-columns: 1fr; }
      .heroPanel { min-height: auto; }
      h1 { font-size: clamp(42px, 15vw, 70px); }
      .key { min-width: clamp(29px, 8.8vw, 50px); height: clamp(42px, 10vw, 58px); border-radius: 16px; }
      .kb-row { gap: 4px; margin-bottom: 7px; }
      #keyboard { border-radius: 24px; }
      .spaceKey { width: 76vw; height: 52px; }
      .topBar { min-height: 48px; }
      .backButton { min-height: 44px; min-width: 94px; font-size: 16px; }
    }

    @media (max-height: 620px) {
      .seaFloor { height: 18vh; }
      #keyboardPage { padding: 8px; }
      .keyboardShell { gap: 6px; }
      .topBar { min-height: 44px; }
      .backButton { min-height: 42px; }
      .keyboardArea { padding-bottom: 6px; }
      .key { height: clamp(40px, 10vh, 62px); min-width: clamp(42px, 7vw, 72px); font-size: clamp(22px, 3vw, 34px); }
      .spaceKey { height: clamp(42px, 10vh, 60px); }
    }
  </style>
</head>
<body data-theme="coral">
  <div class="stage" aria-hidden="true"></div>
  <div class="waveLayer" aria-hidden="true"></div>
  <div class="seaFloor" aria-hidden="true">
    <span class="coral left"><i></i><b></b></span>
    <span class="coral right"><i></i><b></b></span>
  </div>
  <div class="bubbleField" id="bubbleField" aria-hidden="true"></div>
  <div id="fxLayer" aria-hidden="true"></div>
  <div id="letterLayer" aria-hidden="true"></div>

  <main class="page active" id="menuPage">
    <section class="menuShell">
      <div class="heroPanel">
        <div class="heroContent">
          <div class="kicker">Open Keys Theme</div>
          <h1>Underwater Glow</h1>
          <p class="heroText">Choose a glowing ocean world, then tap open keys to trigger its own bubbles, reef blooms, jellyfish trails, deep-sea beams, and lagoon celebrations.</p>
          <div class="menuActions">
            <button class="openButton" id="openKeyboard" type="button">Open Keyboard</button>
          </div>
        </div>
      </div>

      <div class="choiceGrid" id="themeChoices" aria-label="Theme choices"></div>
    </section>
  </main>

  <main class="page" id="keyboardPage">
    <section class="keyboardShell">
      <div class="topBar">
        <button class="backButton" id="backButton" type="button">Back</button>
      </div>
      <div class="keyboardArea">
        <div id="keyboard" aria-label="Underwater Glow alphabet keyboard"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const variants = [
        {
          id: "coral",
          name: "Coral Reef",
          text: "Bright reef colors, coral bursts, pearl pops, and bubbly key lights.",
          cardA: "rgba(255, 119, 183, .58)",
          cardB: "rgba(69, 255, 186, .46)",
          orbRadius: "54% 46% 63% 37%",
          orbRot: "-11deg",
          tone: 0
        },
        {
          id: "jellyfish",
          name: "Jellyfish Glow",
          text: "Soft violet trails, floating glows, and gentle sparkling sea ribbons.",
          cardA: "rgba(170, 125, 255, .62)",
          cardB: "rgba(85, 243, 255, .44)",
          orbRadius: "48% 52% 58% 42%",
          orbRot: "8deg",
          tone: 2
        },
        {
          id: "deep",
          name: "Deep Sea",
          text: "Darker ocean lights, mysterious ripples, and bright creature glimmers.",
          cardA: "rgba(49, 223, 255, .48)",
          cardB: "rgba(47, 255, 205, .28)",
          orbRadius: "42% 58% 40% 60%",
          orbRot: "-2deg",
          tone: -2
        },
        {
          id: "lagoon",
          name: "Bubble Lagoon",
          text: "Big playful bubbles, pastel glow, and splashy celebration waves.",
          cardA: "rgba(182, 255, 247, .62)",
          cardB: "rgba(255, 187, 225, .45)",
          orbRadius: "50%",
          orbRot: "4deg",
          tone: 4
        }
      ];

      const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
      const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      const colorCycle = ["var(--glowA)", "var(--glowB)", "var(--glowC)", "var(--glowD)", "var(--coral)", "var(--reef)"];
      const shapeCycle = ["bubble", "pearl", "shell", "orb", "badge", "crystal"];
      const particleClasses = ["bubbleP", "pearlP", "shardP", "petalP", "trailP"];
      const variantShapes = {
        coral: ["shell", "reefOrb", "pearl", "badge", "crystal"],
        jellyfish: ["jellyDome", "orb", "bubble", "crystal", "pearl"],
        deep: ["deepLantern", "crystal", "badge", "orb", "pearl"],
        lagoon: ["foamBubble", "bubble", "pearl", "orb", "reefOrb"]
      };
      const pressed = new Set();

      let activeVariant = variants[0];
      let audioCtx = null;

      const body = document.body;
      const menuPage = document.getElementById("menuPage");
      const keyboardPage = document.getElementById("keyboardPage");
      const themeChoices = document.getElementById("themeChoices");
      const keyboard = document.getElementById("keyboard");
      const fxLayer = document.getElementById("fxLayer");
      const letterLayer = document.getElementById("letterLayer");
      const bubbleField = document.getElementById("bubbleField");

      function buildAmbientBubbles() {
        bubbleField.innerHTML = "";
        for (let i = 0; i < 42; i += 1) {
          const bubble = document.createElement("span");
          bubble.className = "ambientBubble";
          const size = 8 + Math.random() * 34;
          bubble.style.width = size + "px";
          bubble.style.height = size + "px";
          bubble.style.left = (Math.random() * 100) + "vw";
          bubble.style.setProperty("--dur", (8 + Math.random() * 15) + "s");
          bubble.style.setProperty("--delay", (-Math.random() * 14) + "s");
          bubble.style.setProperty("--drift", (-48 + Math.random() * 96) + "px");
          bubble.style.setProperty("--op", (.18 + Math.random() * .42).toFixed(2));
          bubbleField.appendChild(bubble);
        }
      }

      function buildThemeChoices() {
        themeChoices.innerHTML = "";
        variants.forEach((variant) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "themeChoice";
          button.dataset.theme = variant.id;
          button.style.setProperty("--cardA", variant.cardA);
          button.style.setProperty("--cardB", variant.cardB);
          button.style.setProperty("--orbRadius", variant.orbRadius);
          button.style.setProperty("--orbRot", variant.orbRot);

          const effect = document.createElement("span");
          effect.className = "cardEffect";
          for (let i = 0; i < 7; i += 1) {
            const piece = document.createElement("span");
            piece.style.setProperty("--x", (14 + i * 13 + (i % 2) * 5) + "%");
            piece.style.setProperty("--y", (22 + ((i * 19) % 62)) + "%");
            piece.style.setProperty("--s", (18 + ((i * 11) % 44)) + "px");
            piece.style.setProperty("--h", (44 + ((i * 17) % 78)) + "px");
            piece.style.setProperty("--w", (8 + ((i * 7) % 22)) + "px");
            piece.style.setProperty("--r", (-34 + i * 13) + "deg");
            piece.style.setProperty("--d", (i * .08) + "s");
            piece.style.setProperty("--drift", (-30 + i * 10) + "px");
            effect.appendChild(piece);
          }

          const title = document.createElement("strong");
          title.textContent = variant.name;
          const text = document.createElement("span");
          text.textContent = variant.text;
          button.appendChild(effect);
          button.appendChild(title);
          button.appendChild(text);
          button.addEventListener("click", () => applyVariant(variant.id));
          themeChoices.appendChild(button);
        });
      }

      function buildKeyboard() {
        keyboard.innerHTML = "";
        rows.forEach((row, rowIndex) => {
          const rowEl = document.createElement("div");
          rowEl.className = "kb-row" + (rowIndex === 1 ? " row-home" : "") + (rowIndex === 2 ? " row-bottom" : "");
          row.split("").forEach((letter) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "key";
            button.textContent = letter;
            button.dataset.key = letter;
            button.dataset.i = String(letters.indexOf(letter));
            button.setAttribute("aria-label", "Letter " + letter);
            button.addEventListener("pointerdown", (event) => {
              event.preventDefault();
              triggerKey(letter, button);
            });
            rowEl.appendChild(button);
          });
          keyboard.appendChild(rowEl);
        });

        const spaceRow = document.createElement("div");
        spaceRow.className = "kb-row spaceRow";
        const space = document.createElement("button");
        space.type = "button";
        space.className = "key spaceKey";
        space.textContent = "SPACE";
        space.dataset.key = "space";
        space.setAttribute("aria-label", "Space bar");
        space.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          triggerSpace(space);
        });
        spaceRow.appendChild(space);
        keyboard.appendChild(spaceRow);
      }

      function applyVariant(id) {
        const next = variants.find((variant) => variant.id === id) || variants[0];
        activeVariant = next;
        body.dataset.theme = next.id;
        document.querySelectorAll(".themeChoice").forEach((button) => {
          button.classList.toggle("active", button.dataset.theme === next.id);
        });
        makeWaveSweep(34 + Math.random() * 22, true);
      }

      function openKeyboardPage() {
        menuPage.classList.remove("active");
        keyboardPage.classList.add("active");
        ensureAudio();
        makeWaveSweep(42, true);
      }

      function backToMenu() {
        keyboardPage.classList.remove("active");
        menuPage.classList.add("active");
      }

      function ensureAudio() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      function playTone(freq, duration, options) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        const type = options && options.type ? options.type : "sine";
        const volume = options && options.volume ? options.volume : 0.08;
        const delay = options && options.delay ? options.delay : 0;
        const slideTo = options && options.slideTo ? options.slideTo : freq;
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(options && options.filter ? options.filter : 4200, now + delay);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now + delay);
        osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), now + delay + duration);
        gain.gain.setValueAtTime(0.0001, now + delay);
        gain.gain.exponentialRampToValueAtTime(volume, now + delay + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + delay);
        osc.stop(now + delay + duration + 0.03);
      }

      function playNoise(duration, options) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const delay = options && options.delay ? options.delay : 0;
        const volume = options && options.volume ? options.volume : 0.055;
        const filterFreq = options && options.filter ? options.filter : 1200;
        const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = options && options.type ? options.type : "bandpass";
        filter.frequency.setValueAtTime(filterFreq, now + delay);
        gain.gain.setValueAtTime(0.0001, now + delay);
        gain.gain.exponentialRampToValueAtTime(volume, now + delay + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);
        source.buffer = buffer;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(now + delay);
        source.stop(now + delay + duration + 0.03);
      }

      function playLetterSound(index) {
        ensureAudio();
        const scale = [0, 2, 4, 7, 9, 12, 14, 16];
        const octave = Math.floor(index / scale.length);
        const semitone = scale[index % scale.length] + activeVariant.tone + octave * 3;
        const freq = 220 * Math.pow(2, semitone / 12);
        const mode = index % 4;
        if (mode === 0) {
          playTone(freq * 1.45, .16, { type: "sine", volume: .075, slideTo: freq * .92, filter: 4200 });
          playTone(freq * 2.1, .09, { type: "triangle", volume: .034, delay: .035, slideTo: freq * 1.7 });
        } else if (mode === 1) {
          playTone(freq * .92, .18, { type: "triangle", volume: .07, slideTo: freq * 1.12, filter: 3600 });
          playNoise(.075, { volume: .022, filter: 1700 + index * 24 });
        } else if (mode === 2) {
          playTone(freq * 1.2, .12, { type: "sine", volume: .062, slideTo: freq * 1.65, filter: 5200 });
          playTone(freq * 2.4, .12, { type: "sine", volume: .030, delay: .06, slideTo: freq * 2.15 });
        } else {
          playTone(freq * .72, .20, { type: "triangle", volume: .068, slideTo: freq * .86, filter: 2800 });
          playTone(freq * 1.8, .10, { type: "sine", volume: .032, delay: .045, slideTo: freq * 2.05 });
        }
      }

      function playSpaceSound() {
        ensureAudio();
        playTone(120, .42, { type: "sine", volume: .095, slideTo: 54, filter: 1400 });
        playNoise(.52, { volume: .070, filter: 850, type: "lowpass", delay: .01 });
        playTone(392 + activeVariant.tone * 8, .22, { type: "triangle", volume: .058, slideTo: 520, delay: .08, filter: 4800 });
        playTone(659 + activeVariant.tone * 12, .28, { type: "sine", volume: .048, slideTo: 784, delay: .18, filter: 5600 });
        playTone(1046 + activeVariant.tone * 15, .35, { type: "sine", volume: .038, slideTo: 1318, delay: .28, filter: 6500 });
      }

      function getKeyButton(letter) {
        if (letter === "space") return keyboard.querySelector('[data-key="space"]');
        return keyboard.querySelector('[data-key="' + letter + '"]');
      }

      function centerOf(element) {
        const rect = element.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function randomScreenPoint(index) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const topBand = h * (0.10 + ((index * 17) % 28) / 100);
        const midBand = h * (0.30 + ((index * 13) % 24) / 100);
        const yChoices = [topBand, midBand, h * (0.18 + Math.random() * .40)];
        const x = w * (0.12 + (((index * 37) % 76) / 100)) + (Math.random() * 90 - 45);
        const y = yChoices[index % yChoices.length] + (Math.random() * 60 - 30);
        return {
          x: Math.max(58, Math.min(w - 58, x)),
          y: Math.max(74, Math.min(h * .64, y))
        };
      }

      function cssColor(index, offset) {
        return colorCycle[(index + (offset || 0)) % colorCycle.length];
      }

      function clearLater(el, ms) {
        window.setTimeout(() => {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, ms);
      }

      function pulseKey(button) {
        if (!button) return;
        button.classList.add("active");
        window.setTimeout(() => button.classList.remove("active"), 150);
      }

      function makeLetter(letter, index) {
        const p = randomScreenPoint(index + Math.floor(Math.random() * 7));
        const el = document.createElement("div");
        const shapes = variantShapes[activeVariant.id] || shapeCycle;
        const shape = shapes[index % shapes.length];
        el.className = "letterPop " + shape;
        el.textContent = letter;
        el.style.setProperty("--x", p.x + "px");
        el.style.setProperty("--y", p.y + "px");
        el.style.setProperty("--s", (84 + (index % 5) * 13 + Math.random() * 16) + "px");
        el.style.setProperty("--c", cssColor(index, 0));
        el.style.setProperty("--c2", cssColor(index, 2));
        el.style.setProperty("--dx", (-85 + Math.random() * 170) + "px");
        el.style.setProperty("--r", (-20 + Math.random() * 40) + "deg");
        el.style.setProperty("--dur", (.95 + Math.random() * .42) + "s");
        letterLayer.appendChild(el);
        clearLater(el, 1600);
        return p;
      }

      function makeParticles(x, y, index, amount, styleBias) {
        for (let i = 0; i < amount; i += 1) {
          const el = document.createElement("span");
          const type = styleBias || particleClasses[(index + i) % particleClasses.length];
          const angle = (Math.PI * 2 * i / amount) + Math.random() * .45;
          const distance = 36 + Math.random() * (index % 2 ? 160 : 120);
          el.className = "fxParticle " + type;
          el.style.setProperty("--x", x + "px");
          el.style.setProperty("--y", y + "px");
          el.style.setProperty("--dx", Math.cos(angle) * distance + "px");
          el.style.setProperty("--dy", Math.sin(angle) * distance - Math.random() * 36 + "px");
          el.style.setProperty("--rot", (-220 + Math.random() * 440) + "deg");
          el.style.setProperty("--scale", (.65 + Math.random() * .9).toFixed(2));
          el.style.setProperty("--s", (8 + Math.random() * (type === "trailP" ? 52 : 24)) + "px");
          el.style.setProperty("--dur", (.52 + Math.random() * .58) + "s");
          el.style.setProperty("--c", cssColor(index, i));
          fxLayer.appendChild(el);
          clearLater(el, 1250);
        }
      }

      function makeRipple(x, y, index, count) {
        for (let i = 0; i < count; i += 1) {
          const ring = document.createElement("span");
          ring.className = "rippleRing";
          ring.style.setProperty("--x", x + "px");
          ring.style.setProperty("--y", y + "px");
          ring.style.setProperty("--s", (26 + i * 13) + "px");
          ring.style.setProperty("--scale", (4.2 + i * 1.2).toFixed(2));
          ring.style.setProperty("--dur", (.62 + i * .15) + "s");
          ring.style.setProperty("--c", cssColor(index, i));
          fxLayer.appendChild(ring);
          clearLater(ring, 1200);
        }
      }

      function makeJellyTrail(x, y, index) {
        const trail = document.createElement("span");
        trail.className = "jellyTrail";
        trail.style.setProperty("--x", x + "px");
        trail.style.setProperty("--y", y + "px");
        trail.style.setProperty("--w", (130 + (index % 5) * 26) + "px");
        trail.style.setProperty("--rot", (-34 + Math.random() * 68) + "deg");
        trail.style.setProperty("--dx", (-130 + Math.random() * 260) + "px");
        trail.style.setProperty("--dy", (-95 + Math.random() * 90) + "px");
        trail.style.setProperty("--c", cssColor(index, 1));
        trail.style.setProperty("--c2", cssColor(index, 4));
        fxLayer.appendChild(trail);
        clearLater(trail, 1200);
      }

      function makeWaveSweep(yPercent, soft) {
        const sweep = document.createElement("span");
        sweep.className = "waveSweep";
        sweep.style.setProperty("--y", yPercent + "vh");
        sweep.style.setProperty("--h", (soft ? 72 : 118) + "px");
        sweep.style.setProperty("--c", cssColor(Math.floor(Math.random() * 20), 0));
        sweep.style.setProperty("--c2", cssColor(Math.floor(Math.random() * 20), 3));
        fxLayer.appendChild(sweep);
        clearLater(sweep, 1300);
      }

      function makeScreenFlash() {
        const flash = document.createElement("span");
        flash.className = "screenFlash";
        fxLayer.appendChild(flash);
        clearLater(flash, 900);
      }


      function makeCoralBloom(x, y, index) {
        const bloom = document.createElement("span");
        bloom.className = "coralBloom";
        bloom.style.setProperty("--x", x + "px");
        bloom.style.setProperty("--y", y + "px");
        bloom.style.setProperty("--s", (98 + (index % 4) * 18) + "px");
        bloom.style.setProperty("--c", cssColor(index, 4));
        bloom.style.setProperty("--c2", cssColor(index, 5));
        for (let i = 0; i < 6; i += 1) {
          const branch = document.createElement("span");
          branch.style.setProperty("--r", (-52 + i * 21 + Math.random() * 8) + "deg");
          branch.style.setProperty("--h", (48 + Math.random() * 72) + "px");
          bloom.appendChild(branch);
        }
        fxLayer.appendChild(bloom);
        clearLater(bloom, 1250);
      }

      function makeFishSchool(x, y, index, amount) {
        for (let i = 0; i < amount; i += 1) {
          const fish = document.createElement("span");
          fish.className = "fishFlash";
          fish.style.setProperty("--x", x + "px");
          fish.style.setProperty("--y", y + "px");
          fish.style.setProperty("--w", (24 + Math.random() * 34) + "px");
          fish.style.setProperty("--dx", ((i % 2 ? -1 : 1) * (90 + Math.random() * 210)) + "px");
          fish.style.setProperty("--dy", (-70 + Math.random() * 140) + "px");
          fish.style.setProperty("--r", (-24 + Math.random() * 48) + "deg");
          fish.style.setProperty("--c", cssColor(index, i));
          fish.style.setProperty("--c2", cssColor(index, i + 2));
          fxLayer.appendChild(fish);
          clearLater(fish, 1100);
        }
      }

      function makeJellyBurst(x, y, index, amount) {
        for (let i = 0; i < amount; i += 1) {
          const jelly = document.createElement("span");
          jelly.className = "jellyBurst";
          jelly.style.setProperty("--x", (x + Math.random() * 90 - 45) + "px");
          jelly.style.setProperty("--y", (y + Math.random() * 55 - 25) + "px");
          jelly.style.setProperty("--s", (52 + Math.random() * 64) + "px");
          jelly.style.setProperty("--dx", (-120 + Math.random() * 240) + "px");
          jelly.style.setProperty("--dy", (-170 + Math.random() * 80) + "px");
          jelly.style.setProperty("--c", cssColor(index, i + 1));
          jelly.style.setProperty("--c2", cssColor(index, i + 4));
          fxLayer.appendChild(jelly);
          clearLater(jelly, 1350);
        }
      }

      function makeDeepBeam(x, y, index, amount) {
        for (let i = 0; i < amount; i += 1) {
          const beam = document.createElement("span");
          beam.className = "deepBeam";
          beam.style.setProperty("--x", (x + Math.random() * 180 - 90) + "px");
          beam.style.setProperty("--y", (y + Math.random() * 120 - 60) + "px");
          beam.style.setProperty("--w", (48 + Math.random() * 92) + "px");
          beam.style.setProperty("--h", (220 + Math.random() * 240) + "px");
          beam.style.setProperty("--r", (-26 + Math.random() * 52) + "deg");
          beam.style.setProperty("--dx", (-45 + Math.random() * 90) + "px");
          beam.style.setProperty("--c", cssColor(index, i));
          fxLayer.appendChild(beam);
          clearLater(beam, 1100);
        }
      }

      function makeAbyssSparks(x, y, index, amount) {
        for (let i = 0; i < amount; i += 1) {
          const spark = document.createElement("span");
          spark.className = "abyssSpark";
          spark.style.setProperty("--x", (x + Math.random() * 120 - 60) + "px");
          spark.style.setProperty("--y", (y + Math.random() * 80 - 40) + "px");
          spark.style.setProperty("--s", (12 + Math.random() * 22) + "px");
          spark.style.setProperty("--dx", (-100 + Math.random() * 200) + "px");
          spark.style.setProperty("--dy", (-140 + Math.random() * 120) + "px");
          spark.style.setProperty("--c", cssColor(index, i + 2));
          spark.style.setProperty("--c2", cssColor(index, i + 4));
          fxLayer.appendChild(spark);
          clearLater(spark, 1300);
        }
      }

      function makeBubbleFountain(x, y, index, amount) {
        const fountain = document.createElement("span");
        fountain.className = "bubbleFountain";
        fountain.style.setProperty("--x", x + "px");
        fountain.style.setProperty("--y", y + "px");
        for (let i = 0; i < amount; i += 1) {
          const bubble = document.createElement("span");
          bubble.style.setProperty("--s", (11 + Math.random() * 32) + "px");
          bubble.style.setProperty("--dx", (-120 + Math.random() * 240) + "px");
          bubble.style.setProperty("--dy", (-120 - Math.random() * 230) + "px");
          bubble.style.setProperty("--dur", (.68 + Math.random() * .68) + "s");
          bubble.style.setProperty("--c", cssColor(index, i));
          fountain.appendChild(bubble);
        }
        fxLayer.appendChild(fountain);
        clearLater(fountain, 1500);
      }

      function makeFoamRing(x, y, index, amount) {
        for (let i = 0; i < amount; i += 1) {
          const ring = document.createElement("span");
          ring.className = "foamRing";
          ring.style.setProperty("--x", (x + Math.random() * 70 - 35) + "px");
          ring.style.setProperty("--y", (y + Math.random() * 50 - 25) + "px");
          ring.style.setProperty("--s", (42 + i * 18 + Math.random() * 20) + "px");
          ring.style.setProperty("--c", cssColor(index, i));
          fxLayer.appendChild(ring);
          clearLater(ring, 1050);
        }
      }

      function makePearlOrbit(x, y, index) {
        const orbit = document.createElement("span");
        orbit.className = "pearlOrbit";
        orbit.style.setProperty("--x", x + "px");
        orbit.style.setProperty("--y", y + "px");
        orbit.style.setProperty("--s", (84 + Math.random() * 80) + "px");
        orbit.style.setProperty("--c", cssColor(index, 3));
        fxLayer.appendChild(orbit);
        clearLater(orbit, 1250);
      }

      function triggerVariantLetterEffect(index, from, popPoint) {
        const mode = index % 5;
        if (activeVariant.id === "coral") {
          if (mode === 0) makeCoralBloom(from.x, from.y - 12, index);
          if (mode === 1) makeCoralBloom(popPoint.x, popPoint.y + 40, index);
          if (mode === 2) makeFishSchool(popPoint.x, popPoint.y, index, 4);
          if (mode === 3) makePearlOrbit(popPoint.x, popPoint.y, index);
          if (mode === 4) { makeCoralBloom(from.x, from.y, index); makeFishSchool(popPoint.x, popPoint.y, index, 3); }
        } else if (activeVariant.id === "jellyfish") {
          if (mode === 0) makeJellyBurst(popPoint.x, popPoint.y, index, 1);
          if (mode === 1) makeJellyBurst(popPoint.x, popPoint.y, index, 2);
          if (mode === 2) { makeJellyTrail(from.x, from.y - 20, index); makeJellyBurst(popPoint.x, popPoint.y, index, 1); }
          if (mode === 3) makePearlOrbit(popPoint.x, popPoint.y, index);
          if (mode === 4) { makeJellyBurst(popPoint.x, popPoint.y, index, 2); makeWaveSweep(24 + Math.random() * 42, true); }
        } else if (activeVariant.id === "deep") {
          if (mode === 0) makeDeepBeam(popPoint.x, popPoint.y, index, 1);
          if (mode === 1) makeAbyssSparks(popPoint.x, popPoint.y, index, 6);
          if (mode === 2) { makeDeepBeam(window.innerWidth * (.20 + Math.random() * .60), window.innerHeight * .34, index, 1); makeAbyssSparks(popPoint.x, popPoint.y, index, 4); }
          if (mode === 3) makePearlOrbit(popPoint.x, popPoint.y, index);
          if (mode === 4) { makeDeepBeam(popPoint.x, popPoint.y, index, 2); makeAbyssSparks(from.x, from.y, index, 5); }
        } else if (activeVariant.id === "lagoon") {
          if (mode === 0) makeBubbleFountain(from.x, from.y, index, 12);
          if (mode === 1) makeFoamRing(popPoint.x, popPoint.y, index, 2);
          if (mode === 2) { makeBubbleFountain(popPoint.x, popPoint.y, index, 10); makeFoamRing(from.x, from.y, index, 1); }
          if (mode === 3) makeFishSchool(popPoint.x, popPoint.y, index, 5);
          if (mode === 4) { makeBubbleFountain(from.x, from.y, index, 14); makePearlOrbit(popPoint.x, popPoint.y, index); }
        }
      }

      function triggerVariantSpaceEffect(from) {
        if (activeVariant.id === "coral") {
          makeCoralBloom(window.innerWidth * .24, window.innerHeight * .55, 5);
          makeCoralBloom(window.innerWidth * .50, window.innerHeight * .44, 12);
          makeCoralBloom(window.innerWidth * .76, window.innerHeight * .55, 20);
          makeFishSchool(window.innerWidth * .50, window.innerHeight * .30, 10, 12);
          makePearlOrbit(window.innerWidth * .50, window.innerHeight * .34, 14);
        } else if (activeVariant.id === "jellyfish") {
          makeJellyBurst(window.innerWidth * .28, window.innerHeight * .34, 4, 2);
          makeJellyBurst(window.innerWidth * .50, window.innerHeight * .28, 12, 3);
          makeJellyBurst(window.innerWidth * .72, window.innerHeight * .38, 20, 2);
          makeWaveSweep(26, false);
          makeWaveSweep(44, true);
        } else if (activeVariant.id === "deep") {
          makeDeepBeam(window.innerWidth * .30, window.innerHeight * .34, 8, 2);
          makeDeepBeam(window.innerWidth * .70, window.innerHeight * .36, 16, 2);
          makeAbyssSparks(window.innerWidth * .50, window.innerHeight * .32, 21, 18);
          makePearlOrbit(window.innerWidth * .50, window.innerHeight * .42, 6);
        } else if (activeVariant.id === "lagoon") {
          makeBubbleFountain(window.innerWidth * .28, window.innerHeight * .54, 3, 24);
          makeBubbleFountain(window.innerWidth * .50, window.innerHeight * .45, 12, 30);
          makeBubbleFountain(window.innerWidth * .72, window.innerHeight * .54, 20, 24);
          makeFoamRing(window.innerWidth * .50, window.innerHeight * .34, 14, 5);
          makeFishSchool(window.innerWidth * .50, window.innerHeight * .30, 8, 9);
        }
      }

      function triggerKey(letter, button) {
        const index = letters.indexOf(letter);
        if (index < 0) return;
        pulseKey(button);
        playLetterSound(index);
        const from = centerOf(button);
        const popPoint = makeLetter(letter, index);
        makeRipple(from.x, from.y, index, 1 + (index % 2));

        const effectMode = index % 6;
        if (effectMode === 0) {
          makeParticles(from.x, from.y, index, 11, "bubbleP");
          makeParticles(popPoint.x, popPoint.y, index, 7, "pearlP");
        } else if (effectMode === 1) {
          makeParticles(popPoint.x, popPoint.y, index, 12, "petalP");
          makeJellyTrail(popPoint.x, popPoint.y, index);
        } else if (effectMode === 2) {
          makeJellyTrail(from.x, from.y - 16, index);
          makeParticles(popPoint.x, popPoint.y, index, 8, "trailP");
        } else if (effectMode === 3) {
          makeRipple(popPoint.x, popPoint.y, index, 2);
          makeParticles(from.x, from.y, index, 7, "shardP");
        } else if (effectMode === 4) {
          makeParticles(popPoint.x, popPoint.y, index, 13, "pearlP");
          if (index % 10 === 4) makeWaveSweep(28 + Math.random() * 22, true);
        } else {
          makeParticles(from.x, from.y, index, 9);
          makeJellyTrail(popPoint.x, popPoint.y, index);
          makeRipple(popPoint.x, popPoint.y, index, 1);
        }
        triggerVariantLetterEffect(index, from, popPoint);
      }

      function triggerSpace(button) {
        pulseKey(button);
        playSpaceSound();
        const from = centerOf(button);
        makeScreenFlash();
        makeWaveSweep(34, false);
        makeWaveSweep(50, false);
        makeRipple(from.x, from.y, 12, 4);
        makeParticles(from.x, from.y - 20, 17, 34, "bubbleP");
        makeParticles(window.innerWidth * .28, window.innerHeight * .32, 21, 20, "pearlP");
        makeParticles(window.innerWidth * .72, window.innerHeight * .28, 7, 20, "petalP");
        makeJellyTrail(window.innerWidth * .36, window.innerHeight * .34, 5);
        makeJellyTrail(window.innerWidth * .66, window.innerHeight * .42, 14);
        triggerVariantSpaceEffect(from);
        ["S", "P", "A", "C", "E"].forEach((letter, idx) => {
          window.setTimeout(() => makeLetter(letter, 8 + idx * 3), idx * 62);
        });
      }

      function handlePhysicalKey(event) {
        if (!keyboardPage.classList.contains("active")) return;
        const raw = event.key;
        if (raw === " " || event.code === "Space") {
          event.preventDefault();
          if (pressed.has("space")) return;
          pressed.add("space");
          triggerSpace(getKeyButton("space"));
          return;
        }
        const letter = raw.length === 1 ? raw.toUpperCase() : "";
        if (/^[A-Z]$/.test(letter)) {
          event.preventDefault();
          if (pressed.has(letter)) return;
          pressed.add(letter);
          triggerKey(letter, getKeyButton(letter));
        }
      }

      function releasePhysicalKey(event) {
        const raw = event.key;
        if (raw === " " || event.code === "Space") {
          pressed.delete("space");
          return;
        }
        const letter = raw.length === 1 ? raw.toUpperCase() : "";
        if (/^[A-Z]$/.test(letter)) pressed.delete(letter);
      }

      document.getElementById("openKeyboard").addEventListener("click", openKeyboardPage);
      document.getElementById("backButton").addEventListener("click", backToMenu);
      window.addEventListener("keydown", handlePhysicalKey);
      window.addEventListener("keyup", releasePhysicalKey);
      window.addEventListener("pointerdown", ensureAudio, { once: true });

      buildAmbientBubbles();
      buildThemeChoices();
      buildKeyboard();
      applyVariant("coral");
    }());
  </script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
</html>
