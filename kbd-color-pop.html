<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythmic Typing Keyboard Trainer</title>
    <style>
        :root {
            --bg-color-top: #1e3b2b;
            --bg-color-bottom: #0d1a13;
            
            /* Required Finger Color Codes */
            --left-pinky: #ff6b81;
            --left-ring: #ffa502;
            --left-middle: #eccc68;
            --left-index: #7bed9f;
            --right-index: #70a1ff;
            --right-middle: #5352ed;
            --right-ring: #9b59b6;
            --right-pinky: #ff4757;
            --thumb: #dfe4ea;
        }

        html, body {
            background-color: #1e3b2b;
            background: linear-gradient(135deg, var(--bg-color-top) 0%, var(--bg-color-bottom) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            padding-bottom: 50px;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            color: white;
            box-sizing: border-box;
        }

        /* Mandatory Start Screen to Unlock Browser Audio */
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
        }

        #start-screen h1 {
            font-size: 60px;
            color: #7bed9f;
            margin: 0 0 20px 0;
        }

        #start-screen p {
            font-size: 30px;
            color: black;
            background: #2ecc71;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(0.95); }
        }

        /* Top Header Area holding both tracking rows */
        #header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 60px; 
            width: 100%;
            flex-grow: 1; 
            position: relative;
        }

        /* Main Letter Row Layout */
        #sequence-line {
            display: flex;
            width: 90vw; 
            max-width: 1400px; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: nowrap; 
            position: relative;
            margin-bottom: 30px;
        }

        /* Space Display Row Layout - Situated cleanly underneath */
        #space-line-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 90px;
            position: relative;
        }

        /* Massive, Clean Target Letters - Pure solid white */
        .seq-item {
            color: #ffffff;
            font-size: clamp(60px, 8vw, 130px); 
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0,0,0,0.9); 
            position: relative;
            z-index: 10; 
        }

        /* Distinct Visual Look for the Word SPACE Underneath */
        .space-target-item {
            color: transparent;
            -webkit-text-stroke: 3px #dfe4ea; 
            font-size: 65px;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
            border-bottom: 4px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            transition: transform 0.2s, opacity 0.2s;
        }

        /* --- FRONT SIDE LETTERS STABLE VANISHING ACTIONS --- */
        .pop-nova { animation: popNova 0.5s ease-out forwards; }
        .pop-ghost { animation: popGhost 0.6s ease-in forwards; }
        .pop-implode { animation: popImplode 0.4s cubic-bezier(0.5, 0, 1, 1) forwards; }
        .pop-scatter { animation: popScatter 0.5s ease-out forwards; }
        .pop-spin { animation: popSpin 0.5s ease-in forwards; }
        .pop-drop { animation: popDrop 0.5s ease-in forwards; }

        /* The Big Space Exploder Shatter Effect */
        .pop-space-shatter { animation: spaceShatter 0.8s cubic-bezier(0.1, 0.8, 0.1, 1) forwards; }

        @keyframes popNova {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2.2); opacity: 0.8; }
            100% { transform: scale(2.8); opacity: 0; filter: blur(8px); }
        }
        @keyframes popGhost {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-130px) scaleY(1.8) scaleX(0.6); opacity: 0; filter: blur(4px); }
        }
        @keyframes popImplode {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }
        @keyframes popScatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            20% { transform: translate(-8px, 8px) scale(1.1); opacity: 1; }
            100% { transform: translate(0, -30px) scale(1.4); opacity: 0; filter: blur(8px); }
        }
        @keyframes popSpin {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) rotate(270deg); opacity: 0; }
        }
        @keyframes popDrop {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(80px) scale(0.6); opacity: 0; }
        }
        @keyframes spaceShatter {
            0% { transform: scale(1); opacity: 1; filter: blur(0); -webkit-text-stroke-color: #ffffff; }
            30% { transform: scale(1.4); opacity: 1; filter: blur(2px); }
            100% { transform: scale(2.5) cubic-bezier(0.4, 0, 1, 1); opacity: 0; filter: blur(25px); -webkit-text-stroke-color: rgba(255,255,255,0); }
        }

        /* --- VISUAL EFFECTS SYSTEM UNDERNEATH --- */
        .bg-fx {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1; 
            transform: translate(-50%, -50%); 
        }

        .fx-ripple {
            width: 10px; height: 10px;
            border: 8px solid;
            animation: fxRippleAnim 0.5s ease-out forwards;
        }
        @keyframes fxRippleAnim {
            0% { width: 10px; height: 10px; opacity: 1; }
            100% { width: 220px; height: 220px; opacity: 0; border-width: 2px; }
        }

        .fx-aura {
            width: 140px; height: 140px;
            filter: blur(15px);
            animation: fxAuraAnim 0.6s ease-out forwards;
        }
        @keyframes fxAuraAnim {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        .fx-shockwave {
            width: 15px; height: 15px;
            border: 6px solid;
            box-shadow: inset 0 0 0 8px rgba(255,255,255,0.2);
            animation: fxShockwaveAnim 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes fxShockwaveAnim {
            0% { width: 15px; height: 15px; opacity: 1; }
            100% { width: 240px; height: 240px; opacity: 0; border-width: 1px; }
        }

        .fx-diamond {
            width: 45px; height: 45px;
            animation: fxDiamondAnim 0.5s ease-out forwards;
        }
        @keyframes fxDiamondAnim {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(135deg) scale(2.8); opacity: 0; }
        }

        .fx-radar {
            width: 90px; height: 90px;
            border: 2px solid;
            background: radial-gradient(circle, transparent 30%, currentColor 100%);
            animation: fxRadarAnim 0.6s ease-out forwards;
        }
        @keyframes fxRadarAnim {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        }

        /* --- THE SCREEN-WIDE LANDSCAPE EFFECT WHEN SPACE IS PRESSED --- */
        .fx-landscape-curtain {
            position: absolute;
            left: 50%; top: 50%;
            width: 10px; height: 10px;
            border: 30px solid;
            border-radius: 40px; 
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            animation: fxCurtainAnim 0.9s cubic-bezier(0.1, 0.8, 0.1, 1) forwards;
        }
        @keyframes fxCurtainAnim {
            0% { width: 10px; height: 10px; opacity: 1; border-width: 30px; }
            50% { opacity: 0.7; }
            100% { width: 98vw; height: 85vh; opacity: 0; border-width: 1px; filter: blur(8px); }
        }

        /* Keyboard Styles */
        .keyboard {
            background: rgba(30, 39, 46, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .row { display: flex; gap: 10px; }
        .row:nth-child(2) { margin-left: 25px; }
        .row:nth-child(3) { margin-left: 50px; }

        .key {
            width: 65px; height: 65px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold;
            color: #2f3542; text-transform: uppercase;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.1s;
            position: relative;
        }

        .spacebar { width: 400px; height: 65px; }

        .l-pinky { background-color: var(--left-pinky); }
        .l-ring { background-color: var(--left-ring); }
        .l-middle { background-color: var(--left-middle); }
        .l-index { background-color: var(--left-index); }
        .r-index { background-color: var(--right-index); }
        .r-middle { background-color: var(--right-middle); }
        .r-ring { background-color: var(--right-ring); }
        .r-pinky { background-color: var(--right-pinky); }
        .thumb { background-color: var(--thumb); }

        .key.pressed {
            transform: translateY(6px) !important;
            box-shadow: 0 0 0 rgba(0,0,0,0.4) !important;
            filter: brightness(0.85);
        }

        .key.lit {
            background-color: white !important;
            color: black !important;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.5);
            border: 3px solid #dfe4ea;
            z-index: 2;
        }

        .key.lit::before {
            content: '▼';
            position: absolute;
            top: -30px;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="unlockGame()">
        <h1>Rhythmic Typing</h1>
        <p>PRESS ANY KEY TO START</p>
    </div>

    <div id="header-container">
        <div id="sequence-line"></div>
        <div id="space-line-row"></div>
    </div>

    <div class="keyboard">
        <div class="row">
            <div class="key l-pinky" id="key-q">q</div>
            <div class="key l-ring" id="key-w">w</div>
            <div class="key l-middle" id="key-e">e</div>
            <div class="key l-index" id="key-r">r</div>
            <div class="key l-index" id="key-t">t</div>
            <div class="key r-index" id="key-y">y</div>
            <div class="key r-index" id="key-u">u</div>
            <div class="key r-middle" id="key-i">i</div>
            <div class="key r-ring" id="key-o">o</div>
            <div class="key r-pinky" id="key-p">p</div>
        </div>
        <div class="row">
            <div class="key l-pinky" id="key-a">a</div>
            <div class="key l-ring" id="key-s">s</div>
            <div class="key l-middle" id="key-d">d</div>
            <div class="key l-index" id="key-f">f</div>
            <div class="key l-index" id="key-g">g</div>
            <div class="key r-index" id="key-h">h</div>
            <div class="key r-index" id="key-j">j</div>
            <div class="key r-middle" id="key-k">k</div>
            <div class="key r-ring" id="key-l">l</div>
            <div class="key r-pinky" id="key-semi">;</div>
        </div>
        <div class="row">
            <div class="key l-pinky" id="key-z">z</div>
            <div class="key l-ring" id="key-x">x</div>
            <div class="key l-middle" id="key-c">c</div>
            <div class="key l-index" id="key-v">v</div>
            <div class="key l-index" id="key-b">b</div>
            <div class="key r-index" id="key-n">n</div>
            <div class="key r-index" id="key-m">m</div>
        </div>
        <div class="row">
            <div class="key thumb spacebar" id="key-space">space</div>
        </div>
    </div>

    <script>
        // Core Rhythmic Sequences
        const stageLevels = [
            ['f', 'g', 'f', 'g', 'f', 'g', 'f', 'space'],
            ['f', 'r', 'f', 'r', 'f', 'r', 'f', 'space'],
            ['f', 'v', 'f', 'v', 'f', 'v', 'f', 'space'],
            ['j', 'h', 'j', 'h', 'j', 'h', 'j', 'space'],
            ['d', 'e', 'd', 'e', 'd', 'e', 'd', 'space'],
            ['k', 'i', 'k', 'i', 'k', 'i', 'k', 'space'] 
        ];

        const colorPool = ['#ff6b81', '#7bed9f', '#eccc68', '#70a1ff', '#9b59b6', '#ffa502'];
        const frontAnimPool = ['pop-nova', 'pop-ghost', 'pop-implode', 'pop-scatter', 'pop-spin', 'pop-drop'];
        const backFxPool = ['fx-ripple', 'fx-aura', 'fx-shockwave', 'fx-diamond', 'fx-radar'];
        const synthEnginePool = [1, 2, 3, 4, 5, 6];

        let currentLevelIndex = 0;
        let step = 0; 
        let audioCtx = null;
        let isStarted = false;
        let inputLocked = false; 

        let currentSetMapping = null;

        const lineContainer = document.getElementById('sequence-line');
        const spaceContainer = document.getElementById('space-line-row');

        function getKeyId(keyChar) {
            if (keyChar === ' ' || keyChar === 'space') return 'key-space';
            if (keyChar === ';') return 'key-semi';
            return 'key-' + keyChar;
        }

        function unlockGame() {
            document.getElementById('start-screen').style.display = 'none';
            isStarted = true;
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) {
                    audioCtx = new AudioContextClass();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                }
            } catch (err) {}
            buildNew8BeatSet();
        }

        // Initialize pattern mappings at the absolute start of each 8-beat block
        function buildNew8BeatSet() {
            const rawSequence = stageLevels[currentLevelIndex];
            const distinctiveKeys = [...new Set(rawSequence)];

            const setColors = [...colorPool].sort(() => 0.5 - Math.random());
            const setFrontAnims = [...frontAnimPool].sort(() => 0.5 - Math.random());
            const setBackFX = [...backFxPool].sort(() => 0.5 - Math.random());
            const setSounds = [...synthEnginePool].sort(() => 0.5 - Math.random());

            currentSetMapping = {};

            distinctiveKeys.forEach((char, idx) => {
                if (char === 'space') {
                    currentSetMapping['space'] = {
                        color: setColors[0], 
                        frontAnim: 'pop-space-shatter',
                        bgAnim: 'fx-landscape-curtain', 
                        isCloser: true
                    };
                } else {
                    currentSetMapping[char] = {
                        color: setColors[idx % setColors.length],
                        frontAnim: setFrontAnims[idx % setFrontAnims.length],
                        bgAnim: setBackFX[idx % setBackFX.length],
                        soundProfile: setSounds[idx % setSounds.length],
                        isCloser: false
                    };
                }
            });

            renderSequence(rawSequence);
        }

        function renderSequence(sequenceArray) {
            lineContainer.innerHTML = '';
            spaceContainer.innerHTML = '';

            sequenceArray.forEach((char, index) => {
                if (char === 'space') {
                    const el = document.createElement('div');
                    el.className = 'space-target-item';
                    el.id = 'seq-' + index;
                    el.innerText = 'SPACE';
                    spaceContainer.appendChild(el);
                } else {
                    const el = document.createElement('div');
                    el.className = 'seq-item';
                    el.id = 'seq-' + index;
                    el.style.color = currentSetMapping[char].color;
                    el.innerText = char;
                    lineContainer.appendChild(el);
                }
            });
            step = 0;
            lightUpCurrentKey(sequenceArray);
        }

        // DYNAMIC AUDIO SYNTHESIZER
        function playSound(pressedKey, mappedConfig, isSpaceCloser) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const now = audioCtx.currentTime;

                if (isSpaceCloser) {
                    // --- COMPLETELY UNPREDICTABLE DRAMATIC FINALE CHORD ---
                    const baseFreq = Math.floor(Math.random() * 90) + 60; 
                    const waveformTypes = ['sawtooth', 'square', 'triangle', 'sine'];
                    
                    for (let i = 0; i < 4; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        
                        osc.type = waveformTypes[Math.floor(Math.random() * waveformTypes.length)];
                        const randomInterval = 1.1 + (Math.random() * 2.2);
                        osc.frequency.setValueAtTime(baseFreq * randomInterval, now);
                        osc.frequency.exponentialRampToValueAtTime((baseFreq * randomInterval) * (0.05 + Math.random() * 0.1), now + 0.6);
                        
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        gain.gain.setValueAtTime(0.35, now);
                        gain.gain.exponentialRampToValueAtTime(0.005, now + 0.7);
                        osc.start(now); osc.stop(now + 0.7);
                    }

                    const bufferSize = audioCtx.sampleRate * 0.45;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const noiseFilter = audioCtx.createBiquadFilter();
                    noiseFilter.type = Math.random() > 0.5 ? 'lowpass' : 'bandpass';
                    noiseFilter.frequency.setValueAtTime(1000 + Math.random() * 1500, now);
                    noiseFilter.frequency.exponentialRampToValueAtTime(50 + Math.random() * 100, now + 0.4);
                    
                    const noiseGain = audioCtx.createGain();
                    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
                    noiseGain.gain.setValueAtTime(0.6, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.005, now + 0.45);
                    noise.start(now); noise.stop(now + 0.45);

                } else {
                    // --- MOTHER PATTERN STEADY REPEATING LETTER SYNTHS ---
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    switch (mappedConfig.soundProfile) {
                        case 1: // Marimba Pluck
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(440, now);
                            gain.gain.setValueAtTime(1.0, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                            osc.start(now); osc.stop(now + 0.18);
                            break;
                        case 2: // Retro Arcade
                            osc.type = 'square';
                            osc.frequency.setValueAtTime(523.25, now);
                            osc.frequency.setValueAtTime(659.25, now + 0.06);
                            gain.gain.setValueAtTime(0.22, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                            osc.start(now); osc.stop(now + 0.2);
                            break;
                        case 3: // Metallic Bell Chime
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(880, now);
                            gain.gain.setValueAtTime(0.65, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7); 
                            osc.start(now); osc.stop(now + 0.7);
                            break;
                        case 4: // Sci-Fi Laser Zap
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(750, now);
                            osc.frequency.exponentialRampToValueAtTime(130, now + 0.2); 
                            gain.gain.setValueAtTime(0.3, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                            osc.start(now); osc.stop(now + 0.2);
                            break;
                        case 5: // Deep Block Bass
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(260, now);
                            osc.frequency.exponentialRampToValueAtTime(70, now + 0.32); 
                            gain.gain.setValueAtTime(1.3, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.32);
                            osc.start(now); osc.stop(now + 0.32);
                            break;
                        case 6: // Short Analog Pluck
                            osc.type = 'square';
                            osc.frequency.setValueAtTime(349.23, now);
                            const lowpassFilter = audioCtx.createBiquadFilter();
                            lowpassFilter.type = 'lowpass';
                            lowpassFilter.frequency.setValueAtTime(2000, now);
                            lowpassFilter.frequency.exponentialRampToValueAtTime(100, now + 0.12);
                            osc.disconnect(); osc.connect(lowpassFilter); lowpassFilter.connect(gain);
                            gain.gain.setValueAtTime(0.4, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                            osc.start(now); osc.stop(now + 0.22);
                            break;
                    }
                }
            } catch(e) {}
        }

        function spawnBackgroundEffect(targetEl, config) {
            try {
                const rect = targetEl.getBoundingClientRect();
                const containerRect = targetEl.parentNode.getBoundingClientRect();
                const centerX = (rect.left - containerRect.left) + (rect.width / 2);
                const centerY = (rect.top - containerRect.top) + (rect.height / 2);

                const bgFx = document.createElement('div');
                bgFx.className = `bg-fx ${config.bgAnim}`;
                bgFx.style.borderColor = config.color;
                bgFx.style.backgroundColor = config.color;
                bgFx.style.color = config.color; 
                bgFx.style.left = centerX + 'px';
                bgFx.style.top = centerY + 'px';

                targetEl.parentNode.appendChild(bgFx);
                setTimeout(() => { if (bgFx.parentNode) bgFx.parentNode.removeChild(bgFx); }, 1100);
            } catch(e) {}
        }

        function lightUpCurrentKey(seqArray) {
            document.querySelectorAll('.key').forEach(el => el.classList.remove('lit'));
            const activeSequence = seqArray || stageLevels[currentLevelIndex];
            if (step < activeSequence.length) {
                const target = activeSequence[step];
                const el = document.getElementById(getKeyId(target));
                if (el) el.classList.add('lit');
            }
        }

        // MAIN INPUT EVENT LOOP
        window.addEventListener('keydown', function(e) {
            if(e.key === ' ') e.preventDefault();
            if (!isStarted || inputLocked) return;

            let pressed = e.key.toLowerCase();
            if (pressed === ' ') pressed = 'space';

            const sequenceArray = stageLevels[currentLevelIndex];
            const target = sequenceArray[step];
            const keyEl = document.getElementById(getKeyId(pressed));
            if (keyEl) keyEl.classList.add('pressed');

            if (pressed === target) {
                const keyConfig = currentSetMapping[pressed];

                playSound(pressed, keyConfig, keyConfig.isCloser);

                const currentItemInLine = document.getElementById('seq-' + step);
                if (currentItemInLine) {
                    spawnBackgroundEffect(currentItemInLine, keyConfig);
                    currentItemInLine.classList.add(keyConfig.frontAnim);
                }

                step++;
                
                if (step >= sequenceArray.length) {
                    inputLocked = true; 
                    document.querySelectorAll('.key').forEach(el => el.classList.remove('lit'));
                    
                    currentLevelIndex++;
                    if(currentLevelIndex >= stageLevels.length) currentLevelIndex = 0; 
                    
                    setTimeout(() => {
                        buildNew8BeatSet();
                        inputLocked = false; 
                    }, 1000); 
                } else {
                    lightUpCurrentKey(sequenceArray);
                }
            }
        });

        window.addEventListener('keyup', function(e) {
            let pressed = e.key.toLowerCase();
            if (pressed === ' ') pressed = 'space';
            const keyEl = document.getElementById(getKeyId(pressed));
            if (keyEl) keyEl.classList.remove('pressed');
        });
    </script>
