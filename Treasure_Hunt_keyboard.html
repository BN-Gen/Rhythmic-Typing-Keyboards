<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Treasure Hunt Keyboard V4 - Distinct Realistic Themes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    :root {
      --sky0: #041824;
      --sky1: #07324a;
      --sea0: #06394c;
      --sea1: #0d7180;
      --wood0: #2b160b;
      --wood1: #6b3d1e;
      --wood2: #b06a2e;
      --gold: #ffd15c;
      --gold2: #ff9f1a;
      --map: #f3d797;
      --ink: #4b2611;
      --foam: #bffff7;
      --coral: #ff7b68;
      --accent: #5ef7ff;
      --shadow: rgba(0,0,0,.54);
      --panel: rgba(49, 27, 11, .84);
      --soft: rgba(255,255,255,.82);
      --keyTop: #8a542a;
      --keyBase: #2b160b;
      --glow: rgba(255, 209, 92, .55);
      --fxIntensity: 1;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: #fff9e8;
      background: var(--sky0);
      font-family: "Trebuchet MS", "Gill Sans", system-ui, sans-serif;
    }
    button { font: inherit; color: inherit; }

    #oceanWorld {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 18% 14%, color-mix(in srgb, var(--gold) 18%, transparent), transparent 24%),
        radial-gradient(circle at 80% 18%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 26%),
        linear-gradient(180deg, var(--sky1) 0 43%, var(--sea0) 44%, var(--sea1) 72%, #052531 100%);
      transition: background 450ms ease;
    }
    #oceanWorld::before {
      content: '';
      position: absolute;
      left: -20%;
      right: -20%;
      top: 39%;
      height: 36%;
      opacity: .78;
      background:
        radial-gradient(ellipse at 12% 70%, rgba(255,255,255,.35) 0 2%, transparent 2.5%),
        radial-gradient(ellipse at 44% 60%, rgba(255,255,255,.26) 0 1.8%, transparent 2.5%),
        radial-gradient(ellipse at 76% 68%, rgba(255,255,255,.32) 0 2%, transparent 2.6%),
        repeating-radial-gradient(ellipse at 50% 100%, rgba(191,255,247,.34) 0 8px, rgba(191,255,247,.05) 9px 20px, transparent 21px 48px);
      animation: bigWaves 8s ease-in-out infinite alternate;
      pointer-events: none;
    }
    #oceanWorld::after {
      content: '';
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -6%;
      height: 31%;
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,.18) 0 2px, transparent 2px 74px),
        linear-gradient(180deg, var(--wood2), var(--wood1) 46%, var(--wood0));
      border-top: 8px solid rgba(255,215,130,.28);
      box-shadow: 0 -16px 45px rgba(0,0,0,.35), inset 0 16px 22px rgba(255,255,255,.06);
      transform: perspective(600px) rotateX(10deg);
      transform-origin: bottom center;
      pointer-events: none;
    }
    @keyframes bigWaves { to { transform: translateX(-6%) translateY(12px) scaleY(1.08); } }

    .cloud, .shipSilhouette, .sunGlow, .floatingBarrel, .ambientCoin, .mapRibbon {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }
    .sunGlow {
      width: 110px;
      height: 110px;
      right: 8vw;
      top: 7vh;
      border-radius: 50%;
      background: radial-gradient(circle, #fff4b8 0 20%, var(--gold) 21% 44%, transparent 66%);
      box-shadow: 0 0 60px var(--gold);
      opacity: .72;
      animation: sunBob 5s ease-in-out infinite alternate;
    }
    @keyframes sunBob { to { transform: translateY(12px); filter: brightness(1.15); } }
    .cloud {
      width: var(--w, 160px);
      height: var(--h, 46px);
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      opacity: .34;
      background: rgba(255,255,255,.48);
      filter: blur(.5px);
      animation: cloudDrift var(--dur, 24s) linear infinite;
    }
    .cloud::before, .cloud::after { content:''; position:absolute; border-radius:50%; background:inherit; }
    .cloud::before { width: 45%; height: 150%; left: 18%; bottom: 20%; }
    .cloud::after { width: 34%; height: 120%; right: 18%; bottom: 18%; }
    @keyframes cloudDrift { from { transform: translateX(-12vw); } to { transform: translateX(112vw); } }
    .shipSilhouette {
      left: var(--x, 12vw);
      top: var(--y, 36vh);
      width: 160px;
      height: 100px;
      opacity: .28;
      animation: shipBob 7s ease-in-out infinite alternate;
    }
    .shipSilhouette::before {
      content:'';
      position:absolute;
      left: 12%;
      right: 12%;
      bottom: 0;
      height: 30px;
      border-radius: 0 0 70px 70px;
      background: rgba(0,0,0,.7);
    }
    .shipSilhouette::after {
      content:'';
      position:absolute;
      left: 45%;
      bottom: 26px;
      width: 6px;
      height: 70px;
      background: rgba(0,0,0,.7);
      box-shadow: -32px 20px 0 -1px rgba(0,0,0,.55), 34px 12px 0 -1px rgba(0,0,0,.55);
    }
    @keyframes shipBob { to { transform: translateY(14px) rotate(1deg); } }
    .ambientCoin {
      width: var(--s, 28px);
      height: var(--s, 28px);
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: radial-gradient(circle at 32% 30%, #fff7bd, var(--gold) 34%, var(--gold2) 82%);
      box-shadow: 0 0 18px rgba(255,209,92,.55);
      opacity: .42;
      animation: coinIdle var(--dur, 8s) ease-in-out infinite alternate;
    }
    .ambientCoin::before { content:''; position:absolute; inset: 24%; border-radius:50%; border:2px solid rgba(86,42,8,.42); }
    @keyframes coinIdle { to { transform: translateY(-28px) rotateY(160deg); opacity: .78; } }
    .mapRibbon {
      width: var(--w, 200px);
      height: 4px;
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--map), var(--gold), transparent);
      box-shadow: 0 0 20px rgba(255,209,92,.35);
      transform: rotate(var(--r, -18deg));
      animation: ribbonSlide var(--dur, 5s) ease-in-out infinite;
      opacity: .38;
    }
    @keyframes ribbonSlide { 0%,100% { transform: rotate(var(--r)) scaleX(.5); opacity:.12; } 50% { transform: rotate(var(--r)) scaleX(1); opacity:.58; } }

    #fxLayer { position: fixed; inset: 0; z-index: 40; pointer-events: none; overflow: hidden; }
    .page { position: fixed; inset: 0; z-index: 10; display: none; overflow: hidden; }
    .page.active { display: block; }

    #homePage { overflow-y: auto; padding: clamp(10px, 2vw, 24px); }
    #homePage::-webkit-scrollbar { width: 10px; }
    #homePage::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--gold) 50%, transparent); border-radius: 99px; }
    .menuShell {
      width: min(1220px, 98vw);
      min-height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(310px, .74fr) minmax(0, 1.1fr);
      grid-template-rows: auto;
      gap: clamp(12px, 2vw, 20px);
      align-content: center;
      padding-bottom: 18px;
    }
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background:
        linear-gradient(140deg, rgba(255,255,255,.16), rgba(255,255,255,.035)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.045) 0 2px, transparent 2px 72px),
        var(--panel);
      border: 3px solid rgba(255,218,126,.24);
      box-shadow: 0 22px 68px rgba(0,0,0,.45), 0 0 42px rgba(255,209,92,.18), inset 0 2px 0 rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }
    .mapPanel {
      grid-row: auto;
      padding: clamp(18px, 2.7vw, 30px);
      min-height: 560px;
      background:
        radial-gradient(circle at 78% 18%, rgba(255,209,92,.18), transparent 24%),
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.03)),
        var(--panel);
    }
    .mapPanel::before {
      content:'';
      position:absolute;
      inset: 18px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 24% 22%, rgba(75,38,17,.16) 0 8px, transparent 9px),
        radial-gradient(circle at 65% 70%, rgba(75,38,17,.14) 0 12px, transparent 13px),
        repeating-linear-gradient(18deg, transparent 0 60px, rgba(75,38,17,.065) 61px 63px, transparent 64px 122px),
        linear-gradient(145deg, var(--map), #dcae67);
      opacity: .96;
      z-index: 0;
      box-shadow: inset 0 0 0 3px rgba(75,38,17,.16), inset 0 0 36px rgba(75,38,17,.28);
    }
    .mapPanel::after {
      content: 'X';
      position:absolute;
      right: 52px;
      bottom: 66px;
      z-index: 0;
      color: rgba(140,20,10,.72);
      font-size: clamp(64px, 8vw, 112px);
      font-weight: 900;
      font-family: Georgia, serif;
      transform: rotate(-10deg);
      text-shadow: 0 2px rgba(255,255,255,.18);
    }
    .mapContent { position: relative; z-index: 2; color: var(--ink); }
    h1 {
      margin: 4px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(43px, 6.4vw, 82px);
      line-height: .9;
      color: #51240c;
      text-shadow: 0 2px 0 rgba(255,255,255,.35), 0 10px 22px rgba(75,38,17,.18);
    }
    .lead { margin: 0; max-width: 620px; color: rgba(75,38,17,.78); font-size: clamp(16px, 2vw, 22px); line-height: 1.32; font-weight: 800; }
    .treasurePreview {
      position: relative;
      margin-top: 22px;
      min-height: 230px;
      border-radius: 26px;
      border: 3px dashed rgba(75,38,17,.22);
      overflow: hidden;
      background: rgba(255,255,255,.12);
    }
    .routeLine {
      position: absolute;
      height: 5px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, rgba(75,38,17,.84) 0 16px, transparent 16px 30px);
      transform-origin: left center;
      opacity: .82;
      animation: routeDraw 2.4s ease-in-out infinite alternate;
    }
    .routeLine.one { width: 45%; left: 14%; top: 34%; transform: rotate(18deg); }
    .routeLine.two { width: 36%; left: 46%; top: 56%; transform: rotate(-22deg); animation-delay: .4s; }
    .routeLine.three { width: 28%; left: 25%; top: 72%; transform: rotate(-10deg); animation-delay: .8s; }
    @keyframes routeDraw { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0); } }
    .compassPreview {
      position:absolute;
      left: 9%;
      top: 12%;
      width: 82px;
      height: 82px;
      border-radius:50%;
      border:4px solid rgba(75,38,17,.42);
      animation: compassTurn 7s linear infinite;
    }
    .compassPreview::before {
      content:'';
      position:absolute;
      inset: 20%;
      background: linear-gradient(135deg, transparent 0 40%, #b21e12 41% 50%, #f8f1d7 51% 60%, transparent 61%);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    }
    @keyframes compassTurn { to { transform: rotate(360deg); } }
    .treasureChest {
      position:absolute;
      right: 10%;
      bottom: 14%;
      width: 142px;
      height: 96px;
      border-radius: 16px 16px 18px 18px;
      background: linear-gradient(180deg, #8c4a21 0 42%, #4f250e 43% 100%);
      box-shadow: 0 16px 22px rgba(75,38,17,.25), inset 0 2px 0 rgba(255,255,255,.2);
      border: 4px solid rgba(75,38,17,.44);
      animation: chestGlow 1.6s ease-in-out infinite alternate;
    }
    .treasureChest::before { content:''; position:absolute; left:0; right:0; top: 38%; height: 9px; background: var(--gold); box-shadow: 0 0 14px var(--gold); }
    .treasureChest::after { content:''; position:absolute; left: 50%; top: 48%; width: 28px; height: 30px; transform: translateX(-50%); border-radius: 8px; background: var(--gold); box-shadow: 0 0 14px var(--gold); }
    @keyframes chestGlow { to { filter: brightness(1.12); transform: translateY(-4px); } }

    .themePanel { padding: clamp(16px, 2.4vw, 25px); }
    .sectionTitle { margin: 0 0 10px; font-family: Georgia, serif; font-size: clamp(25px, 3vw, 38px); text-shadow: 0 3px rgba(0,0,0,.18); }
    .buttonRow { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .bigButton, .smallButton, .themeCard, .backButton {
      border: 0;
      cursor: pointer;
      font-weight: 900;
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }
    .bigButton, .smallButton, .backButton {
      min-height: 52px;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(145deg, #fff4af, var(--gold) 44%, var(--gold2));
      color: #402008;
      box-shadow: 0 10px 24px rgba(0,0,0,.34), 0 0 22px rgba(255,209,92,.32), inset 0 2px 0 rgba(255,255,255,.42);
    }
    .smallButton.off { background: linear-gradient(145deg, #5a3318, #251209); color: #fff7df; border: 2px solid rgba(255,209,92,.28); }
    .bigButton:hover, .smallButton:hover, .themeCard:hover, .backButton:hover { transform: translateY(-3px) scale(1.025); filter: brightness(1.08); }
    .bigButton:active, .smallButton:active, .themeCard:active, .backButton:active { transform: translateY(1px) scale(.98); }
    .controlGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .meterBox {
      min-height: 88px;
      border-radius: 22px;
      padding: 14px;
      background: rgba(0,0,0,.18);
      border: 2px solid rgba(255,255,255,.14);
    }
    .meterLabel { color: var(--soft); font-size: 13px; text-transform: uppercase; letter-spacing: .07em; font-weight: 900; }
    .meterValue { display: block; margin-top: 6px; color: var(--gold); font-size: 28px; font-weight: 900; text-shadow: 0 0 14px rgba(255,209,92,.44); }
    .themeGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
    .themeCard {
      min-height: 132px;
      padding: 14px;
      text-align: left;
      border-radius: 24px;
      color: #fff8dc;
      background:
        radial-gradient(circle at 80% 18%, color-mix(in srgb, var(--cardB) 38%, transparent), transparent 28%),
        linear-gradient(145deg, color-mix(in srgb, var(--cardA) 38%, rgba(255,255,255,.04)), rgba(0,0,0,.18)),
        var(--panel);
      border: 3px solid color-mix(in srgb, var(--cardA) 48%, rgba(255,255,255,.16));
      box-shadow: 0 14px 32px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.14);
      position: relative;
      overflow: hidden;
    }
    .themeCard.active { outline: 4px solid rgba(255,255,255,.18); box-shadow: 0 0 0 2px var(--gold), 0 0 36px color-mix(in srgb, var(--cardA) 52%, transparent); }
    .themeCard::before {
      content:'';
      position:absolute;
      right: -24px;
      top: -20px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff7bd, var(--cardB) 34%, var(--cardA) 72%);
      opacity: .34;
      animation: cardCoinSpin 3s ease-in-out infinite alternate;
    }
    @keyframes cardCoinSpin { to { transform: rotateY(180deg) translateY(8px); } }
    .themeIcon { width: 48px; height: 48px; position: relative; margin-bottom: 10px; filter: drop-shadow(0 0 14px var(--cardB)); }
    .themeIcon.coin::before { content:''; position:absolute; inset:4px; border-radius:50%; background: radial-gradient(circle at 32% 28%, #fff8c9, var(--gold) 36%, var(--gold2)); box-shadow:0 0 18px var(--gold); }
    .themeIcon.wave::before { content:''; position:absolute; inset:12px 2px; border:5px solid var(--foam); border-left:0; border-bottom:0; border-radius:0 999px 0 0; transform: rotate(-20deg); box-shadow:0 0 14px var(--foam); }
    .themeIcon.map::before { content:''; position:absolute; inset:5px; border-radius:8px; background:var(--map); transform:rotate(-8deg); box-shadow:0 0 14px var(--map); }
    .themeIcon.map::after { content:''; position:absolute; left:12px; top:23px; width:28px; height:4px; background: repeating-linear-gradient(90deg, var(--ink) 0 8px, transparent 8px 14px); transform:rotate(18deg); }
    .themeIcon.anchor::before { content:''; position:absolute; left:21px; top:5px; width:6px; height:35px; background:var(--cardB); box-shadow:0 0 12px var(--cardB); }
    .themeIcon.anchor::after { content:''; position:absolute; left:8px; bottom:6px; width:32px; height:22px; border:6px solid var(--cardB); border-top:0; border-radius:0 0 999px 999px; box-shadow:0 0 12px var(--cardB); }
    .themeIcon.compass::before { content:''; position:absolute; inset:4px; border-radius:50%; border:4px solid var(--cardB); box-shadow:0 0 14px var(--cardB); }
    .themeIcon.compass::after { content:''; position:absolute; inset:13px; background:linear-gradient(135deg, transparent 0 40%, #fff 41% 49%, var(--cardB) 50% 59%, transparent 60%); clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); }
    .themeIcon.cannon::before { content:''; position:absolute; left:7px; top:18px; width:34px; height:16px; border-radius:999px; background:linear-gradient(90deg,#222,#777,#222); box-shadow:0 0 14px var(--cardB); transform:rotate(-10deg); }
    .themeIcon.cannon::after { content:''; position:absolute; left:25px; top:31px; width:11px; height:11px; border-radius:50%; background:#111; box-shadow:-22px 2px 0 #111; }
    .themeCard strong, .themeCard span { position: relative; z-index: 1; display: block; }
    .themeCard strong { font-size: 18px; margin-bottom: 5px; }
    .themeCard span { color: rgba(255,255,255,.78); font-size: 13px; line-height: 1.24; }

    #keyboardPage { padding: clamp(9px, 1.6vw, 20px); }
    .shipShell {
      width: min(1200px, 100%);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(250px, 350px) minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(10px, 1.6vw, 18px);
    }
    .topDeck {
      grid-column: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .backButton { min-width: 104px; }
    .captainStatus {
      flex: 1;
      min-height: 54px;
      border-radius: 22px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(43,22,11,.72);
      border: 2px solid rgba(255,218,126,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 12px 30px rgba(0,0,0,.3);
    }
    .captainStatus strong { font-family: Georgia, serif; font-size: clamp(18px, 2.1vw, 28px); }
    .captainStatus span { color: var(--soft); font-weight: 900; }
    .sideDashboard {
      grid-column: 1;
      grid-row: 2 / 4;
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .treasureFace {
      position: relative;
      min-height: 160px;
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(0,0,0,.14)), rgba(0,0,0,.16);
      border: 2px solid rgba(255,255,255,.12);
      overflow: hidden;
    }
    .treasureFace::before {
      content:'';
      position:absolute;
      left: 50%;
      top: 55%;
      width: 98px;
      height: 94px;
      transform: translate(-50%, -50%);
      border-radius: 48% 48% 44% 44%;
      background:
        radial-gradient(circle at 33% 40%, #111 0 5px, transparent 6px),
        radial-gradient(circle at 67% 40%, #111 0 5px, transparent 6px),
        linear-gradient(180deg, #f0b06c, #a85d2d);
      box-shadow: 0 0 24px rgba(255,209,92,.24), inset 0 -8px 12px rgba(0,0,0,.18);
    }
    .treasureFace::after {
      content:'';
      position:absolute;
      left: 50%;
      top: 25%;
      width: 128px;
      height: 48px;
      transform: translateX(-50%);
      border-radius: 999px 999px 20px 20px;
      background: linear-gradient(180deg, #3a160b, #15100f);
      box-shadow: 0 0 16px rgba(0,0,0,.35), inset 0 2px rgba(255,255,255,.12);
    }
    .captainBubble {
      min-height: 68px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.09);
      border: 1.5px solid rgba(255,255,255,.13);
      color: var(--soft);
      font-weight: 900;
      line-height: 1.25;
    }
    .dashGrid { display:grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .dashCard { min-height: 72px; border-radius: 18px; padding: 10px; background: rgba(0,0,0,.18); border: 1.5px solid rgba(255,255,255,.12); }
    .dashCard small { display:block; color:var(--soft); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.07em; }
    .dashCard b { display:block; color:var(--gold); font-size:26px; line-height:1.1; text-shadow:0 0 12px rgba(255,209,92,.42); }
    .energyTrack { height: 14px; border-radius:999px; background:rgba(0,0,0,.25); overflow:hidden; border:1px solid rgba(255,255,255,.13); margin-top: 8px; }
    #treasureEnergy { width: 0%; height:100%; border-radius:999px; background:linear-gradient(90deg, var(--accent), var(--gold), var(--gold2)); transition: width .25s ease; }

    .playZone {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      min-height: 0;
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 52%, rgba(255,209,92,.16), transparent 26%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.045) 0 2px, transparent 2px 72px),
        linear-gradient(180deg, rgba(129,78,37,.55), rgba(52,28,13,.82));
      border: 3px solid rgba(255,218,126,.2);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.12), 0 20px 48px rgba(0,0,0,.38);
    }
    .playZone::before {
      content:'TREASURE LOG';
      position:absolute;
      left: 18px;
      bottom: 10px;
      color: rgba(255,255,255,.07);
      font-family: Georgia, serif;
      font-size: clamp(30px, 5vw, 68px);
      letter-spacing: .08em;
      font-weight: 900;
    }
    .playZone::after {
      content:'';
      position:absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;

      62% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - 42px)) scale(.58); }

    .topPearlFx {
      width: var(--s, 36px);

    @keyframes topPearlLift {
      0% { opacity: 0; transform: translate(-50%, 38px) scale(.25); }

      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% - 88px)) scale(.78); }

    .topCoralStarFx {
      width: var(--s, 42px);

      clip-path: polygon(50% 0, 62% 31%, 96% 18%, 76% 50%, 100% 75%, 66% 70%, 50% 100%, 34% 70%, 0 75%, 24% 50%, 4% 18%, 38% 31%);
      filter: drop-shadow(0 0 13px rgba(255,140,175,.72));
      animation: topCoralTwirl 2.05s ease-out forwards;
    }
    @keyframes topCoralTwirl {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2) rotate(-90deg); }
      24%, 76% { opacity: 1; transform: translate(calc(-50% + var(--dx)), -50%) scale(1.08) rotate(14deg); }

    @media (max-width: 700px) {

    /* V6: remove the fixed word/letter line. Words now appear only as popups at the top of the screen. */
    #topStageTitle,
    #topLetterTrail {

    #keyboardPage.cleanKeyboardOnly #topLetterStage {

  <script>
    // Space Worlds Treasure Hunt V2: simplified child keyboard with gold-coin letters, optional drums/BPM, volume, random spacebar sounds, and keypress-only rewards.
    const root = document.documentElement;
    const body = document.body;
    const oceanWorld = document.getElementById('oceanWorld');
    const fxLayer = document.getElementById('fxLayer');
    const homePage = document.getElementById('homePage');
    const keyboardPage = document.getElementById('keyboardPage');
    const themeGrid = document.getElementById('themeGrid');
    const keyboard = document.getElementById('keyboard');
    const typedLog = document.getElementById('typedLog');
    const helperText = document.getElementById('helperText');
    const keyCountEl = document.getElementById('keyCount');
    const coinCountEl = document.getElementById('coinCount');
    const comboCountEl = document.getElementById('comboCount');
    const spaceCountEl = document.getElementById('spaceCount');
    const treasureEnergy = document.getElementById('treasureEnergy');
    const voyageName = document.getElementById('voyageName');
    const voyageHint = document.getElementById('voyageHint');
    const celebration = document.getElementById('celebration');
    const topLetterStage = document.getElementById('topLetterStage');
    const topStageTitle = document.getElementById('topStageTitle');
    const topLetterTrail = document.getElementById('topLetterTrail');
    const topEffectLayer = document.getElementById('topEffectLayer');

    const THEMES = {
      treasure: {
        label:'Treasure Deck',
        short:'carved dark-wood keys with warm chest glow',
        icon:'coin', status:'Treasure Deck', hint:'Carved deck keys',
        vars:['#03131c','#062538','#083246','#0c5965','#1d0f08','#573118','#9d602e','#f7c85a','#d58b21','#e7c47b','#6fe7ff','#ff7a4f'],
        cardA:'#f7c85a', cardB:'#d58b21',
        effects:['deckSpark'], sound:'coin', motion:'pop'
      },
      waves: {
        label:'Wave Splash',
        short:'clear aqua glass keys with soft water ripples',
        icon:'wave', status:'Wave Splash', hint:'Aqua glass keys',
        vars:['#001526','#003657','#004f74','#059fa2','#0a2430','#0f5665','#3a91a0','#bffff7','#4de6ff','#d9f6ee','#66fff0','#84cfff'],
        cardA:'#4de6ff', cardB:'#bffff7',
        effects:['waveCurl'], sound:'whoosh', motion:'float'
      },
      map: {
        label:'Treasure Map',
        short:'aged parchment keys with inked route marks',
        icon:'map', status:'Treasure Map', hint:'Parchment route keys',
        vars:['#130d08','#332313','#3f3220','#806c45','#2b160b','#6a4520','#b07a3d','#f2d497','#c73524','#f8e1a6','#7ccfec','#a22217'],
        cardA:'#f2d497', cardB:'#c73524',
        effects:['routeTrace'], sound:'drum', motion:'slide'
      },
      harbor: {
        label:'Sunset Harbor',
        short:'slanted copper-brass keys with amber light rays',
        icon:'compass', status:'Sunset Harbor', hint:'Brass sunset keys',
        vars:['#210d2e','#5b2454','#193a5d','#0f7384','#22100a','#7a351d','#c36b2d','#ffd36a','#ff7b55','#f0bd73','#ffd77a','#ff7258'],
        cardA:'#ff7b55', cardB:'#ffd36a',
        effects:['sunRay'], sound:'bell', motion:'jump'
      },
      storm: {
        label:'Stormy Cannon',
        short:'black iron keys with sharp lightning flashes',
        icon:'cannon', status:'Stormy Cannon', hint:'Iron storm keys',
        vars:['#01050b','#0b1628','#111f2d','#16435c','#090c10','#1d2631','#343f4a','#dbe9ff','#6fc8ff','#c7d3dc','#78d9ff','#ff5f45'],
        cardA:'#78d9ff', cardB:'#ff5f45',
        effects:['lightning'], sound:'drum', motion:'spin'
      },
      cove: {
        label:'Coral Cove',
        short:'matte coral shell keys with reef shimmer lines',
        icon:'anchor', status:'Coral Cove', hint:'Coral shell keys',
        vars:['#03141f','#063844','#075e63','#0d9488','#16251e','#31523c','#896946','#ffe082','#ff8caf','#f3d797','#99fff1','#ff88b2'],
        cardA:'#ff8caf', cardB:'#99fff1',
        effects:['coralBranch'], sound:'bubble', motion:'wiggle'
      }
    };
    const themeOrder = ['treasure','waves','map','harbor','storm','cove'];
    const motions = ['pop','slide','jump','wiggle','spin','float'];
    const TOP_THEME_EFFECTS = {
      treasure: ['coin','coin','coin','gem','spark','spark','spark'],
      waves: ['rain','rain','rain','splash','splash','bubble','bubble'],
      map: ['route','route','xmark','spark','spark','gem'],
      harbor: ['sunRay','sunRay','coin','coin','spark','spark'],
      storm: ['rain','rain','rain','lightning','lightning','splash','splash'],
      cove: ['pearl','pearl','bubble','bubble','coralStar','coralStar','splash']
    };
    const TOP_EFFECT_CLASS = {
      coin: 'topCoinFx', gem: 'topGemFx', spark: 'topSparkFx', rain: 'topRainFx',
      splash: 'topSplashFx', bubble: 'topBubbleFx', route: 'topRouteFx', xmark: 'topXFx',
      sunRay: 'topSunRayFx', lightning: 'topLightningFx', pearl: 'topPearlFx', coralStar: 'topCoralStarFx'
    };
    const helperLines = [
      'Press a letter to collect treasure.',
      'Great hunting. Try the spacebar for a big wave.',
      'Coins fly when your fingers move fast.',
      'Watch the map lines draw across the deck.',
      'Keep typing to fill the treasure chest.'
    ];

    let currentTheme = 'treasure';
    let soundOn = true;
    let helperOn = false;
    let randomSpacebar = false;
    let drumsOn = false;
    let effectLevel = 1;
    let demoOn = false;
    let demoTimer = null;
    let drumTimer = null;
    let topMagicTimer = null;
    let bpm = 96;
    let volume = 0.85;
    let audioCtx = null;
    let keyCount = 0;
    let coinCount = 0;
    let comboCount = 0;
    let spaceCount = 0;
    let typedText = '';
    let currentWord = '';
    let activeWordBurst = null;
    let wordBurstTimer = null;
    let lastPress = 0;

    function applyTheme(name) {
      currentTheme = name;
      const t = THEMES[name];
      const vars = ['--sky0','--sky1','--sea0','--sea1','--wood0','--wood1','--wood2','--gold','--gold2','--map','--accent','--coral'];
      t.vars.forEach((v, i) => root.style.setProperty(vars[i], v));
      root.style.setProperty('--keyTop', mix(t.vars[6], '#ffffff', .08));
      root.style.setProperty('--keyBase', mix(t.vars[4], '#000000', .1));
      body.dataset.theme = name;
      if (voyageName) voyageName.textContent = t.status;
      if (voyageHint) voyageHint.textContent = t.hint;
      if (topStageTitle) topStageTitle.textContent = t.label;
      if (topEffectLayer) topEffectLayer.innerHTML = '';
      clearTopWordBurst();
      updateTopLetters();
      document.querySelectorAll('.themeCard').forEach(card => card.classList.toggle('active', card.dataset.theme === name));
      buildAmbient();
    }

    function mix(a, b, amount) {
      const ar=parseInt(a.slice(1,3),16), ag=parseInt(a.slice(3,5),16), ab=parseInt(a.slice(5,7),16);
      const br=parseInt(b.slice(1,3),16), bg=parseInt(b.slice(3,5),16), bb=parseInt(b.slice(5,7),16);
      const r=Math.round(ar+(br-ar)*amount), g=Math.round(ag+(bg-ag)*amount), bl=Math.round(ab+(bb-ab)*amount);
      return '#' + [r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('');
    }

    function buildThemeGrid() {
      themeGrid.innerHTML = '';
      themeOrder.forEach(name => {
        const t = THEMES[name];
        const b = document.createElement('button');
        b.className = 'themeCard';
        b.dataset.theme = name;
        b.style.setProperty('--cardA', t.cardA);
        b.style.setProperty('--cardB', t.cardB);
        b.innerHTML = '<div class="themeIcon ' + t.icon + '" aria-hidden="true"></div><strong>' + t.label + '</strong><span>' + t.short + '</span>';
        b.addEventListener('click', () => { unlockAudio(); applyTheme(name); playClick(); });
        themeGrid.appendChild(b);
      });
    }

    function buildAmbient() {
      oceanWorld.querySelectorAll('.cloud,.shipSilhouette,.floatingBarrel,.ambientCoin,.mapRibbon').forEach(el => el.remove());
      const quiet = keyboardPage.classList.contains('active');
      const cloudTotal = quiet ? 1 : (currentTheme === 'storm' ? 2 : 3);
      for (let i=0;i<cloudTotal;i++) {
        const c = document.createElement('div');
        c.className = 'cloud';
        c.style.setProperty('--x', (-24 + Math.random()*96) + 'vw');
        c.style.setProperty('--y', (5 + Math.random()*22) + 'vh');
        c.style.setProperty('--w', (120 + Math.random()*140) + 'px');
        c.style.setProperty('--h', (34 + Math.random()*22) + 'px');
        c.style.setProperty('--dur', (32 + Math.random()*24) + 's');
        c.style.opacity = quiet ? '.18' : '.28';
        oceanWorld.appendChild(c);
      }
      if (!quiet && currentTheme !== 'map' && currentTheme !== 'cove') {
        const s = document.createElement('div');
        s.className = 'shipSilhouette';
        s.style.setProperty('--x', (10 + Math.random()*62) + 'vw');
        s.style.setProperty('--y', (35 + Math.random()*8) + 'vh');
        s.style.animationDelay = (-Math.random()*4) + 's';
        oceanWorld.appendChild(s);
      }
      if (!quiet && currentTheme === 'map') {
        for (let i=0;i<2;i++) {
          const line = document.createElement('div');
          line.className = 'mapRibbon';
          line.style.setProperty('--x', (12 + Math.random()*70) + 'vw');
          line.style.setProperty('--y', (20 + Math.random()*48) + 'vh');
          line.style.setProperty('--w', (160 + Math.random()*120) + 'px');
          line.style.setProperty('--r', (-26 + Math.random()*52) + 'deg');
          line.style.setProperty('--dur', (4 + Math.random()*3) + 's');
          oceanWorld.appendChild(line);
        }
      }
    }

    function unlockAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playClick() {
      if (!soundOn || !audioCtx) return;
      playTone('c', false, currentTheme);
    }

    function playTone(key, special, themeName) {
      if (!soundOn) return;
      unlockAudio();
      const theme = THEMES[themeName || currentTheme];
      const now = audioCtx.currentTime;
      const idx = key === 'space' ? 31 : key.toUpperCase().charCodeAt(0) - 64;
      let base = 150 + idx * 9;
      let wave = 'sine';
      let decay = special ? .46 : .22;
      let gainLevel = special ? .19 : .12;
      if (theme.sound === 'coin') { base *= 1.14; wave = 'sine'; }
      if (theme.sound === 'whoosh') { base *= .86; wave = 'triangle'; decay += .08; }
      if (theme.sound === 'drum') { base *= .54; wave = 'triangle'; gainLevel += .04; }
      if (theme.sound === 'bell') { base *= 1.3; wave = 'sine'; decay += .12; }
      if (theme.sound === 'bubble') { base *= 1.05; wave = 'sine'; }
      if (special) base *= .72;

      const mainGain = audioCtx.createGain();
      mainGain.gain.setValueAtTime(0.0001, now);
      mainGain.gain.exponentialRampToValueAtTime(gainLevel * volume, now + .012);
      mainGain.gain.exponentialRampToValueAtTime(0.0001, now + decay);
      mainGain.connect(audioCtx.destination);

      const osc = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      osc.type = wave;
      filter.type = theme.sound === 'whoosh' ? 'bandpass' : 'lowpass';
      filter.frequency.setValueAtTime(theme.sound === 'drum' ? 620 : 1300, now);
      filter.frequency.exponentialRampToValueAtTime(theme.sound === 'whoosh' ? 450 : 1800, now + decay);
      filter.Q.setValueAtTime(theme.sound === 'whoosh' ? 4 : 1.1, now);
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(special ? base * 1.7 : base * 1.18, now + .1);
      osc.connect(filter);
      filter.connect(mainGain);
      osc.start(now);
      osc.stop(now + decay + .02);

      if (theme.sound === 'drum' || special) playDrumTap(now, special);
      if (theme.sound === 'coin' || theme.sound === 'bell' || special) playCoinDing(now, base * 1.6, special);
      if (theme.sound === 'whoosh' || special) playOceanWhoosh(now, special);
    }

    function playCoinDing(now, freq, big) {
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, now + .02);
      g.gain.exponentialRampToValueAtTime((big ? .09 : .045) * volume, now + .035);
      g.gain.exponentialRampToValueAtTime(0.0001, now + (big ? .42 : .26));
      g.connect(audioCtx.destination);
      [1, 1.5].forEach((m, i) => {
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq * m, now + i * .025);
        o.connect(g);
        o.start(now + i * .025);
        o.stop(now + (big ? .45 : .28));
      });
    }

    function playDrumTap(now, big) {
      const g = audioCtx.createGain();
      g.gain.setValueAtTime((big ? .12 : .07) * volume, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + (big ? .18 : .11));
      g.connect(audioCtx.destination);
      const o = audioCtx.createOscillator();
      o.type = 'triangle';
      o.frequency.setValueAtTime(big ? 92 : 130, now);
      o.frequency.exponentialRampToValueAtTime(55, now + (big ? .18 : .11));
      o.connect(g);
      o.start(now);
      o.stop(now + (big ? .2 : .13));
    }

    function playOceanWhoosh(now, big) {
      const bufferSize = audioCtx.sampleRate * (big ? .38 : .18);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(big ? 520 : 820, now);
      filter.Q.setValueAtTime(2.4, now);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime((big ? .13 : .05) * volume, now + .02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + (big ? .4 : .2));
      src.connect(filter);
      filter.connect(g);
      g.connect(audioCtx.destination);
      src.start(now);
    }

    function normalizeKey(raw) {
      if (!raw) return null;
      const k = raw.toLowerCase();
      if (k === ' ' || k === 'spacebar' || k === 'space') return 'space';
      if (/^[a-z]$/.test(k)) return k;
      return null;
    }

    function pressKey(raw, sourceButton) {
      const key = normalizeKey(raw);
      if (!key) return;
      unlockAudio();
      const button = sourceButton || document.querySelector('.key[data-key="' + key + '"]');
      if (!button) return;
      const special = key === 'space';
      const nowTime = performance.now();
      comboCount = nowTime - lastPress < 1000 ? comboCount + 1 : 1;
      lastPress = nowTime;
      keyCount++;
      if (special) spaceCount++;
      coinCount += special ? 5 : 1;
      updateStats();

      const soundTheme = special && randomSpacebar ? randomFrom(themeOrder) : currentTheme;
      playTone(key, special, soundTheme);
      if (drumsOn && audioCtx && Math.random() > (special ? .15 : .64)) playDrumTap(audioCtx.currentTime + .02, special);

      const motion = (THEMES[currentTheme] && THEMES[currentTheme].motion) || motions[(special ? Date.now() : key.charCodeAt(0)) % motions.length];
      button.classList.remove('active','motion-pop','motion-slide','motion-jump','motion-wiggle','motion-spin','motion-float');
      void button.offsetWidth;
      button.classList.add('active', 'motion-' + motion);
      setTimeout(() => button.classList.remove('active','motion-' + motion), special ? 760 : 620);

      appendLog(key);
      const rect = button.getBoundingClientRect();
      createLetter(key === 'space' ? 'SPACE' : key.toUpperCase(), motion, rect, special);
      createTreasureEffects(rect, special);
      if (helperOn && helperText && (keyCount % 6 === 0 || special)) helperText.textContent = special ? 'Boom! The spacebar made a big ocean reward.' : randomFrom(helperLines);
      if (coinCount > 0 && coinCount % 30 === 0) celebrate();
      fitKeyboard();
    }

    function updateStats() {
      if (keyCountEl) keyCountEl.textContent = keyCount;
      if (coinCountEl) coinCountEl.textContent = coinCount;
      if (comboCountEl) comboCountEl.textContent = comboCount;
      if (spaceCountEl) spaceCountEl.textContent = spaceCount;
      if (treasureEnergy) treasureEnergy.style.width = Math.min(100, (coinCount % 30) / 30 * 100) + '%';
    }

    function appendLog(key) {
      typedText += key === 'space' ? ' ' : key.toUpperCase();
      if (typedText.length > 64) typedText = typedText.slice(-64);
      if (typedLog) typedLog.textContent = typedText || 'Press keys to write on the treasure log...';
      updateTopLetters();
    }

    function updateTopLetters() {
      // V6 keeps the top area clean: no fixed typing line is shown.
    }

    function handleTopWord(key, motion, special) {
      // V7: no word building. Each press shows only the newest single key.
      currentWord = '';
      showTopLetter(key === 'space' ? 'SPACE' : key.toUpperCase(), special);
    }

    function showTopLetter(letter, final) {
      if (!letter) return;
      const stage = getTopStageRect();
      const x = clamp(
        stage.left + stage.width * .5 + randomBetween(-stage.width * .08, stage.width * .08),
        stage.left + Math.min(130, stage.width * .22),
        stage.left + stage.width - Math.min(130, stage.width * .22)
      );
      const y = clamp(
        stage.top + stage.height * .48 + randomBetween(-stage.height * .08, stage.height * .08),
        stage.top + 58,
        stage.top + stage.height - 30
      );
      if (activeWordBurst) activeWordBurst.remove();
      if (wordBurstTimer) clearTimeout(wordBurstTimer);
      const el = document.createElement('div');
      el.className = 'topWordBurst singleLetter' + (final ? ' final' : ' live');
      el.textContent = letter;
      el.style.setProperty('--x', x + 'px');
      el.style.setProperty('--y', y + 'px');
      fxLayer.appendChild(el);
      activeWordBurst = el;
      const life = final ? 2600 : 2200;
      wordBurstTimer = setTimeout(() => {
        if (activeWordBurst === el) activeWordBurst = null;
        el.remove();
      }, life);
    }

    function showTopWord(word, final) {
      showTopLetter((word || '').slice(-1), final);
    }

    function clearTopWordBurst() {
      if (wordBurstTimer) clearTimeout(wordBurstTimer);
      wordBurstTimer = null;
      if (activeWordBurst) activeWordBurst.remove();
      activeWordBurst = null;
      currentWord = '';
    }

    function getTopStageRect() {
      if (topLetterStage && keyboardPage.classList.contains('active')) {
        const rect = topLetterStage.getBoundingClientRect();
        if (rect.width > 20 && rect.height > 20) return rect;
      }
      const width = Math.min(900, window.innerWidth * .86);
      const height = Math.max(118, Math.min(220, window.innerHeight * .22));
      return { left: (window.innerWidth - width) / 2, top: Math.max(12, window.innerHeight * .04), width, height };
    }

    function getTopPoint() {
      const rect = getTopStageRect();
      return {
        x: clamp(rect.left + rect.width * .5 + randomBetween(-rect.width * .32, rect.width * .32), rect.left + 54, rect.left + rect.width - 54),
        y: clamp(rect.top + rect.height * .52 + randomBetween(-rect.height * .18, rect.height * .22), rect.top + 52, rect.top + rect.height - 30)
      };
    }

    function createLetter(label, motion, rect, special) {
      // Keep only one big popup letter on screen at a time.
      document.querySelectorAll('.topLetterBurst, .topWordBurst').forEach(el => el.remove());
      if (wordBurstTimer) clearTimeout(wordBurstTimer);
      activeWordBurst = null;
      const point = getTopPoint();
      const themeMotion = (THEMES[currentTheme] && THEMES[currentTheme].motion) || motion;
      const el = document.createElement('div');
      el.className = 'letterBurst topLetterBurst oneAtATime ' + themeMotion + (special ? ' is-space' : '');
      el.textContent = label;
      el.style.setProperty('--x', point.x + 'px');
      el.style.setProperty('--y', point.y + 'px');
      fxLayer.appendChild(el);
      setTimeout(() => el.remove(), special ? 2600 : 2200);
    }

    function createTreasureEffects(rect, special) {
      const t = THEMES[currentTheme];
      const point = getTopPoint();
      const multiplier = effectLevel === 0 ? .85 : effectLevel === 2 ? 2.2 : 1.45;
      spawnTopThemeEffects(special, false);
      const effects = (t && t.effects && t.effects.length) ? t.effects : ['deckSpark'];
      createNamedEffect(effects[0], point.x, point.y, special);
      const extraNamed = special ? 3 : (effectLevel === 2 ? 3 : 2);
      for (let i = 0; i < extraNamed; i++) {
        const p2 = getTopPoint();
        createNamedEffect(randomFrom(effects), p2.x, p2.y, special && i === 0);
      }
      const dropCount = Math.max(4, Math.round((special ? 10 : 6) * multiplier));
      for (let i=0;i<dropCount;i++) {
        const p = getTopPoint();
        createThemeDrop(p.x, p.y, special);
      }
      createPulse(point.x, point.y, special);
    }

    function createThemeDrop(x, y, big) {
      const wetThemes = currentTheme === 'waves' || currentTheme === 'storm' || currentTheme === 'cove';
      const d = document.createElement('div');
      d.className = 'dropFx';
      d.style.setProperty('--x', x + 'px');
      d.style.setProperty('--y', y + 'px');
      d.style.setProperty('--dx', randomBetween(-70, 70) + 'px');
      d.style.setProperty('--dy', randomBetween(big ? 70 : 42, big ? 180 : 118) + 'px');
      d.style.setProperty('--s', randomBetween(big ? 9 : 5, big ? 18 : 11) + 'px');
      d.style.setProperty('--c', wetThemes ? 'var(--accent)' : randomFrom(['var(--gold)','var(--gold2)','var(--coral)']));
      d.style.setProperty('--r', wetThemes ? '24deg' : randomBetween(-28, 28) + 'deg');
      fxLayer.appendChild(d);
      setTimeout(() => d.remove(), 820);
    }

    function spawnTopThemeEffects(special, ambient) {
      if (!keyboardPage.classList.contains('active')) return;
      if (effectLevel === 0 && ambient && Math.random() < .45) return;
      const themeList = TOP_THEME_EFFECTS[currentTheme] || TOP_THEME_EFFECTS.treasure;
      const count = ambient ? (effectLevel === 2 ? 5 : 3) : Math.round((special ? 16 : 9) * (effectLevel === 2 ? 1.65 : effectLevel === 0 ? .85 : 1.25));
      for (let i = 0; i < count; i++) {
        setTimeout(() => createTopStageEffect(randomFrom(themeList), special), i * (ambient ? 110 : 55));
      }
    }

    function createTopStageEffect(type, big) {
      const layer = topEffectLayer || fxLayer;
      const stage = getTopStageRect();
      const localLayer = layer === topEffectLayer;
      const localX = clamp(randomBetween(34, stage.width - 34), 24, Math.max(24, stage.width - 24));
      const localY = type === 'rain'
        ? randomBetween(-12, stage.height * .2)
        : clamp(randomBetween(stage.height * .22, stage.height * .78), 26, Math.max(28, stage.height - 24));
      const x = localLayer ? localX : stage.left + localX;
      const y = localLayer ? localY : stage.top + localY;
      const el = document.createElement('div');
      el.className = 'topStageFx ' + (TOP_EFFECT_CLASS[type] || 'topSparkFx');
      if (type === 'xmark') el.textContent = 'X';
      el.style.setProperty('--x', x + 'px');
      el.style.setProperty('--y', y + 'px');
      el.style.setProperty('--dx', randomBetween(-90, 90) + 'px');
      el.style.setProperty('--dy', randomBetween(-44, 30) + 'px');
      el.style.setProperty('--fall', randomBetween(stage.height * .55, stage.height * 1.12) + 'px');
      el.style.setProperty('--s', randomBetween(big ? 38 : 24, big ? 70 : 50) + 'px');
      el.style.setProperty('--w', randomBetween(110, big ? 280 : 210) + 'px');
      el.style.setProperty('--r', randomBetween(-26, 26) + 'deg');
      layer.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    function startTopMagic() {
      stopTopMagic();
      updateTopLetters();
      if (!keyboardPage.classList.contains('active')) return;
      topMagicTimer = setInterval(() => spawnTopThemeEffects(false, true), 850);
    }

    function stopTopMagic() {
      if (topMagicTimer) clearInterval(topMagicTimer);
      topMagicTimer = null;
      if (topEffectLayer) topEffectLayer.innerHTML = '';
    }

    function createDrop(x, y, big) {
      const d = document.createElement('div');
      d.className = 'dropFx';
      d.style.setProperty('--x', x + 'px');
      d.style.setProperty('--y', y + 'px');
      d.style.setProperty('--dx', randomBetween(-110, 110) + 'px');
      d.style.setProperty('--dy', randomBetween(big ? -165 : -90, big ? 58 : 35) + 'px');
      d.style.setProperty('--s', randomBetween(big ? 7 : 4, big ? 16 : 10) + 'px');
      d.style.setProperty('--c', randomFrom(['var(--gold)','var(--gold2)','var(--foam)','var(--accent)','var(--coral)']));
      d.style.setProperty('--r', randomBetween(-32, 32) + 'deg');
      fxLayer.appendChild(d);
      setTimeout(() => d.remove(), 700);
    }

    function createNamedEffect(type, x, y, big) {
      const map = { deckSpark:'deckSparkFx', waveCurl:'waveCurlFx', routeTrace:'routeTraceFx', sunRay:'sunRayFx', lightning:'lightningFx', coralBranch:'coralBranchFx', coin:'coinFx', splash:'splashFx', wave:'splashFx', map:'mapLineFx', rope:'ropeFx', cannon:'cannonFx', compass:'compassFx', pearl:'pearlFx', anchor:'anchorFx', wheel:'wheelFx' };
      const el = document.createElement('div');
      el.className = map[type] || 'coinFx';
      el.style.setProperty('--x', x + 'px');
      el.style.setProperty('--y', y + 'px');
      el.style.setProperty('--s', (big ? randomBetween(86, 140) : randomBetween(42, 90)) + 'px');
      el.style.setProperty('--w', randomBetween(130, big ? 290 : 220) + 'px');
      el.style.setProperty('--r', randomBetween(-38, 38) + 'deg');
      el.style.setProperty('--dx', randomBetween(-110, 110) + 'px');
      el.style.setProperty('--dy', randomBetween(-160, -50) + 'px');
      fxLayer.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function createPulse(x, y, big) {
      const p = document.createElement('div');
      p.className = 'screenPulse';
      p.style.setProperty('--x', x + 'px');
      p.style.setProperty('--y', y + 'px');
      p.style.opacity = big ? '.9' : '.48';
      fxLayer.appendChild(p);
      setTimeout(() => p.remove(), 460);
    }

    function celebrate() {
      celebration.innerHTML = '<strong>Great typing!</strong><span>Keep the treasure trail moving</span>';
      celebration.classList.remove('show');
      void celebration.offsetWidth;
      celebration.classList.add('show');
      const rect = keyboard.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + Math.max(44, rect.height * .16);
      const effect = ((THEMES[currentTheme] && THEMES[currentTheme].effects) || ['deckSpark'])[0];
      for (let i=0;i<5;i++) {
        setTimeout(() => createNamedEffect(effect, x + randomBetween(-120, 120), y + randomBetween(-38, 38), false), i * 70);
      }
    }

    function fitKeyboard() {
      keyboard.style.transform = 'scale(1)';
      const rect = keyboard.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const availableWidth = Math.max(260, keyboard.parentElement.getBoundingClientRect().width - 8);
      const availableHeight = Math.max(160, window.innerHeight - keyboard.getBoundingClientRect().top - 8);
      const scale = Math.max(.42, Math.min(1, availableWidth / rect.width, availableHeight / rect.height));
      keyboard.style.transform = 'scale(' + Math.floor(scale*1000)/1000 + ')';
    }

    function startDemo() {
      if (demoTimer) clearInterval(demoTimer);
      const seq = 'treasure hunt map waves coins space ocean'.split('');
      let i = 0;
      demoTimer = setInterval(() => {
        if (!demoOn || !keyboardPage.classList.contains('active')) return;
        const ch = seq[i % seq.length];
        pressKey(ch === ' ' ? 'space' : ch);
        i++;
      }, 540);
    }

    function stopDemo() { if (demoTimer) clearInterval(demoTimer); demoTimer = null; }

    function startDrums() {
      stopDrums();
      if (!drumsOn) return;
      unlockAudio();
      playDrumBeat();
      drumTimer = setInterval(playDrumBeat, Math.round(60000 / bpm));
    }

    function stopDrums() {
      if (drumTimer) clearInterval(drumTimer);
      drumTimer = null;
    }

    function playDrumBeat() {
      if (!drumsOn || !soundOn || !audioCtx) return;
      const now = audioCtx.currentTime;
      playDrumTap(now, false);
      if (Math.random() > .45) setTimeout(() => audioCtx && playDrumTap(audioCtx.currentTime, false), Math.max(80, Math.round(30000 / bpm)));
      if (keyboardPage.classList.contains('active')) {
        const pulse = document.createElement('div');
        pulse.className = 'drumPulse';
        fxLayer.appendChild(pulse);
        setTimeout(() => pulse.remove(), 500);
      }
    }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function randomBetween(min, max) { return min + Math.random() * (max - min); }
    function randomFrom(list) { return list[Math.floor(Math.random() * list.length)]; }

    const startKeyboardButton = document.getElementById('startKeyboard');
    if (startKeyboardButton) startKeyboardButton.addEventListener('click', () => {
      unlockAudio();
      homePage.classList.remove('active');
      keyboardPage.classList.add('active');
      setTimeout(fitKeyboard, 60);
      setTimeout(fitKeyboard, 260);
      startTopMagic();
      spawnTopThemeEffects(false, true);
      if (demoOn) startDemo();
    });

    const backHomeButton = document.getElementById('backHome');
    if (backHomeButton) backHomeButton.addEventListener('click', () => {
      keyboardPage.classList.remove('active');
      homePage.classList.add('active');
      stopDemo();
      stopDrums();
      stopTopMagic();
      clearTopWordBurst();
    });

    const soundToggleButton = document.getElementById('soundToggle');
    if (soundToggleButton) soundToggleButton.addEventListener('click', event => {
      soundOn = !soundOn;
      event.currentTarget.textContent = 'Sound: ' + (soundOn ? 'ON' : 'OFF');
      event.currentTarget.classList.toggle('off', !soundOn);
      if (soundOn) { unlockAudio(); playClick(); if (drumsOn) startDrums(); } else { stopDrums(); }
    });

    const effectModeButton = document.getElementById('effectMode');
    if (effectModeButton) effectModeButton.addEventListener('click', event => {
      effectLevel = (effectLevel + 1) % 3;
      const labels = ['Calm','Normal','Turbo'];
      root.style.setProperty('--fxIntensity', effectLevel === 0 ? .55 : effectLevel === 1 ? 1 : 1.65);
      event.currentTarget.textContent = 'Effects: ' + labels[effectLevel];
      playClick();
    });

    const randomSpaceToggleButton = document.getElementById('randomSpaceToggle');
    if (randomSpaceToggleButton) randomSpaceToggleButton.addEventListener('click', event => {
      unlockAudio();
      randomSpacebar = !randomSpacebar;
      event.currentTarget.textContent = 'Random Spacebar: ' + (randomSpacebar ? 'ON' : 'OFF');
      event.currentTarget.classList.toggle('off', !randomSpacebar);
      event.currentTarget.setAttribute('aria-pressed', String(randomSpacebar));
      playTone('space', true, randomFrom(themeOrder));
    });

    const drumToggleButton = document.getElementById('drumToggle');
    if (drumToggleButton) drumToggleButton.addEventListener('click', event => {
      unlockAudio();
      drumsOn = !drumsOn;
      event.currentTarget.textContent = 'Drum Sounds: ' + (drumsOn ? 'ON' : 'OFF');
      event.currentTarget.classList.toggle('off', !drumsOn);
      event.currentTarget.setAttribute('aria-pressed', String(drumsOn));
      if (drumsOn) startDrums(); else stopDrums();
    });

    const volumeSlider = document.getElementById('volumeSlider');
    if (volumeSlider) volumeSlider.addEventListener('input', event => {
      volume = Number(event.currentTarget.value) / 100;
      const volumeValue = document.getElementById('volumeValue');
      if (volumeValue) volumeValue.textContent = Math.round(volume * 100) + '%';
    });

    const bpmSlider = document.getElementById('bpmSlider');
    if (bpmSlider) bpmSlider.addEventListener('input', event => {
      bpm = Number(event.currentTarget.value);
      const bpmValue = document.getElementById('bpmValue');
      if (bpmValue) bpmValue.textContent = String(bpm);
      if (drumsOn) startDrums();
    });

    document.querySelectorAll('.key').forEach(button => {
      button.addEventListener('pointerdown', event => {
        event.preventDefault();
        pressKey(button.dataset.key, button);
      });
    });
    document.addEventListener('keydown', event => {
      const k = normalizeKey(event.key);
      if (!k) return;
      event.preventDefault();
      pressKey(k);
    });
    window.addEventListener('resize', () => { buildAmbient(); fitKeyboard(); });
    window.addEventListener('orientationchange', () => setTimeout(fitKeyboard, 220));

    buildThemeGrid();
    applyTheme(currentTheme);
    updateStats();
    // Keystroke rewards now trigger only from actual key presses. Ambient background movement remains gentle on the menu and keyboard pages.
    document.addEventListener('DOMContentLoaded', fitKeyboard);
  </script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
</html>
