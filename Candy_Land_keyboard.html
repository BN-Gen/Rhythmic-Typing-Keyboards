<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Candy_Land_keyboard_V3_unique_themes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Bangers&family=Bubblegum+Sans&family=Bungee&family=Chewy&family=Fredoka:wght@600;700&family=Luckiest+Guy&family=Modak&family=Nunito:wght@800;900&family=Rubik+Bubbles&display=swap');

    *, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Fredoka', 'Baloo 2', system-ui, sans-serif;
      color: #5b245f;
      background: #ffd8ef;
    }
    button { font: inherit; color: inherit; }

    :root {
      --sky1: #ffeffb;
      --sky2: #ffd0ec;
      --sky3: #bff8ff;
      --hill1: #ff8fd7;
      --hill2: #ffe070;
      --hill3: #9af6b4;
      --accent: #ff47b8;
      --accent2: #5fd7ff;
      --accent3: #ffe65c;
      --accent4: #8dff89;
      --ink: #5b245f;
      --panel: rgba(255, 255, 255, .74);
      --panel2: rgba(255, 244, 253, .82);
      --keyTop: #ffffff;
      --keyBase: #ffd4ef;
      --good: #62e884;
      --warn: #ff7aa8;
      --shadow: rgba(111, 24, 92, .22);
      --glow: rgba(255, 71, 184, .38);
      --stripe: #ff47b8;
    }

    body[data-theme="lollipop"] { --sky1:#fff3fb; --sky2:#ffd3f0; --sky3:#aef7ff; --hill1:#ff78c9; --hill2:#ffe76c; --hill3:#90f8b9; --accent:#ff3dab; --accent2:#59dfff; --accent3:#ffe45e; --accent4:#7dff9e; --ink:#64205f; --keyBase:#ffd7ef; --stripe:#ff3dab; }
    body[data-theme="gumdrop"] { --sky1:#f1fff5; --sky2:#c9ffdd; --sky3:#fff0a8; --hill1:#86efac; --hill2:#ff8fd2; --hill3:#7cecff; --accent:#20cf75; --accent2:#ff72c6; --accent3:#ffe55f; --accent4:#72edff; --ink:#235b43; --keyBase:#d8ffe5; --stripe:#20cf75; }
    body[data-theme="chocolate"] { --sky1:#fff2d8; --sky2:#ffd9ac; --sky3:#ffb7df; --hill1:#b46b3c; --hill2:#ffcf6f; --hill3:#ff8fb8; --accent:#8b4a2f; --accent2:#ff9d4f; --accent3:#fff06a; --accent4:#ff77b7; --ink:#5a2d27; --keyBase:#ffe2bf; --stripe:#8b4a2f; }
    body[data-theme="sprinkle"] { --sky1:#f3f8ff; --sky2:#cdeaff; --sky3:#ffe1f4; --hill1:#66d7ff; --hill2:#ff78cc; --hill3:#ffe15b; --accent:#2ab6ff; --accent2:#ff3eb5; --accent3:#fff069; --accent4:#82f36e; --ink:#244268; --keyBase:#dff4ff; --stripe:#2ab6ff; }
    body[data-theme="cotton"] { --sky1:#f9efff; --sky2:#e7c8ff; --sky3:#c3f7ff; --hill1:#d79cff; --hill2:#ffaee0; --hill3:#aef6ff; --accent:#bb75ff; --accent2:#ff78c8; --accent3:#83edff; --accent4:#fff27c; --ink:#5d3b86; --keyBase:#ecd9ff; --stripe:#bb75ff; }
    body[data-theme="peppermint"] { --sky1:#fff8f8; --sky2:#ffd6d6; --sky3:#c9fff4; --hill1:#ff5d67; --hill2:#ffffff; --hill3:#7bf5d4; --accent:#ef3347; --accent2:#35d9bd; --accent3:#ffffff; --accent4:#ff8da2; --ink:#6e2130; --keyBase:#ffe4e4; --stripe:#ef3347; }

    #world {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.92) 0 10%, transparent 20%),
        radial-gradient(circle at 82% 18%, color-mix(in srgb, var(--accent3) 46%, transparent) 0 8%, transparent 22%),
        linear-gradient(180deg, var(--sky1), var(--sky2) 52%, var(--sky3));
      transition: background 650ms ease;
    }
    #world::before {
      content: '';
      position: absolute;
      inset: -10%;
      opacity: .7;
      background:
        radial-gradient(circle at 10% 26%, color-mix(in srgb, var(--accent2) 52%, transparent) 0 5px, transparent 6px),
        radial-gradient(circle at 32% 20%, color-mix(in srgb, var(--accent) 50%, transparent) 0 4px, transparent 5px),
        radial-gradient(circle at 66% 17%, color-mix(in srgb, var(--accent4) 52%, transparent) 0 5px, transparent 6px),
        radial-gradient(circle at 86% 34%, color-mix(in srgb, var(--accent3) 60%, transparent) 0 5px, transparent 6px),
        repeating-linear-gradient(110deg, transparent 0 38px, rgba(255,255,255,.38) 39px 42px, transparent 43px 86px);
      animation: sprinkleSky 22s linear infinite;
    }
    #world::after {
      content: '';
      position: absolute;
      left: -7%;
      right: -7%;
      bottom: -18vh;
      height: 46vh;
      border-radius: 50% 50% 0 0 / 42% 42% 0 0;
      background:
        radial-gradient(ellipse at 17% 52%, var(--hill2) 0 20%, transparent 21%),
        radial-gradient(ellipse at 45% 45%, var(--hill1) 0 24%, transparent 25%),
        radial-gradient(ellipse at 78% 54%, var(--hill3) 0 22%, transparent 23%),
        linear-gradient(135deg, color-mix(in srgb, var(--hill1) 78%, white 16%), color-mix(in srgb, var(--hill2) 70%, white 18%));
      box-shadow: inset 0 24px 0 rgba(255,255,255,.25);
      animation: candyHills 12s ease-in-out infinite alternate;
    }
    @keyframes sprinkleSky { to { transform: translate3d(-4%, 6%, 0) rotate(1deg); } }
    @keyframes candyHills { from { transform: translateY(1vh); } to { transform: translateY(-1.7vh); } }

    #candyDecor, #fxLayer, #letterLayer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    #candyDecor { z-index: 2; }
    #fxLayer { z-index: 30; }
    #letterLayer { z-index: 42; }

    .candyPiece {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      opacity: var(--o, .78);
      filter: drop-shadow(0 10px 14px rgba(118, 34, 98, .18)) drop-shadow(0 0 18px color-mix(in srgb, var(--accent) 38%, transparent));
      animation: candyDrift var(--dur, 10s) ease-in-out infinite alternate;
    }
    @keyframes candyDrift {
      from { transform: translate3d(-12px, 10px, 0) rotate(var(--r, -8deg)) scale(.94); }
      to { transform: translate3d(16px, -26px, 0) rotate(calc(var(--r, -8deg) + 18deg)) scale(1.08); }
    }
    .shape-lollipop::before {
      content: '';
      position: absolute;
      inset: 4% 4% 20% 4%;
      border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, #fff 0 18deg, var(--accent) 18deg 36deg, var(--accent2) 36deg 54deg, var(--accent3) 54deg 72deg);
      border: 4px solid rgba(255,255,255,.85);
      box-shadow: inset 0 0 18px rgba(255,255,255,.42), 0 0 22px color-mix(in srgb, var(--accent) 42%, transparent);
    }
    .shape-lollipop::after {
      content: '';
      position: absolute;
      left: calc(50% - 4px);
      top: 68%;
      width: 8px;
      height: 48%;
      border-radius: 99px;
      background: #fff;
      box-shadow: inset 0 0 0 2px rgba(118, 34, 98, .18);
    }
    .shape-gumdrop::before {
      content: '';
      position: absolute;
      inset: 18% 8% 8% 8%;
      border-radius: 56% 56% 28% 28%;
      background: radial-gradient(circle at 32% 25%, #fff 0 10%, transparent 12%), linear-gradient(145deg, var(--accent4), var(--accent2));
      border: 3px solid rgba(255,255,255,.78);
      box-shadow: inset 0 -12px 14px rgba(95, 22, 80, .12);
    }
    .shape-candy::before {
      content: '';
      position: absolute;
      inset: 24% 12%;
      border-radius: 18px;
      background: repeating-linear-gradient(45deg, #fff 0 12px, var(--accent) 12px 24px, var(--accent2) 24px 36px);
      border: 3px solid rgba(255,255,255,.8);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 38%, transparent);
    }
    .shape-candy::after {
      content: '';
      position: absolute;
      inset: 30% 0;
      background: linear-gradient(90deg, transparent 0 12%, rgba(255,255,255,.9) 13% 22%, transparent 23% 77%, rgba(255,255,255,.9) 78% 87%, transparent 88%);
      clip-path: polygon(0 50%, 15% 0, 22% 50%, 15% 100%, 0 50%, 100% 50%, 85% 0, 78% 50%, 85% 100%, 100% 50%);
    }
    .shape-donut::before {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 25%, #fff5dd 26% 39%, transparent 40%),
        conic-gradient(var(--accent), var(--accent2), var(--accent3), var(--accent4), var(--accent));
      border: 4px solid rgba(255,255,255,.78);
      box-shadow: inset 0 0 0 9px rgba(255,255,255,.18), 0 0 18px color-mix(in srgb, var(--accent2) 42%, transparent);
    }
    .shape-donut::after {
      content: '';
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      background: var(--sky2);
      box-shadow: inset 0 0 8px rgba(111, 24, 92, .16);
    }
    .shape-swirl::before {
      content: '';
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, #fff 0 16deg, var(--accent) 16deg 32deg, var(--accent3) 32deg 48deg);
      animation: candySpin 3s linear infinite;
      border: 4px solid rgba(255,255,255,.85);
    }
    @keyframes candySpin { to { transform: rotate(360deg); } }

    .sugarCloud {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: calc(var(--w) * .42);
      border-radius: 999px;
      opacity: .62;
      background:
        radial-gradient(circle at 22% 52%, rgba(255,255,255,.92) 0 34%, transparent 35%),
        radial-gradient(circle at 45% 35%, rgba(255,255,255,.88) 0 38%, transparent 39%),
        radial-gradient(circle at 72% 55%, rgba(255,255,255,.9) 0 34%, transparent 35%);
      filter: drop-shadow(0 8px 14px rgba(111,24,92,.12));
      animation: cloudScoot var(--dur, 20s) linear infinite;
    }
    @keyframes cloudScoot {
      from { transform: translateX(-18vw); }
      to { transform: translateX(118vw); }
    }

    .page {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 10;
      overflow: hidden;
    }
    .page.active { display: block; }

    #homePage { overflow-y: auto; padding: clamp(10px, 2vw, 24px); }
    #homePage::-webkit-scrollbar { width: 10px; }
    #homePage::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--accent) 44%, transparent); border-radius: 999px; }

    .homeShell {
      width: min(1180px, 98vw);
      min-height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(270px, .9fr) minmax(340px, 1.25fr);
      grid-template-rows: auto 1fr;
      gap: clamp(12px, 2vw, 20px);
      align-items: stretch;
      padding-bottom: 18px;
    }
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      border: 4px solid rgba(255,255,255,.82);
      background:
        linear-gradient(145deg, rgba(255,255,255,.88), rgba(255,255,255,.52)),
        var(--panel);
      box-shadow:
        0 20px 58px var(--shadow),
        0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent),
        inset 0 2px 0 rgba(255,255,255,.78);
      backdrop-filter: blur(12px);
    }
    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .33;
      background:
        radial-gradient(circle at 14% 20%, var(--accent3) 0 7px, transparent 8px),
        radial-gradient(circle at 34% 74%, var(--accent2) 0 5px, transparent 6px),
        radial-gradient(circle at 68% 18%, var(--accent) 0 5px, transparent 6px),
        radial-gradient(circle at 88% 70%, var(--accent4) 0 6px, transparent 7px);
      background-size: 120px 90px;
    }

    .heroPanel { grid-column: 1 / 3; padding: clamp(18px, 3vw, 34px); }
    .heroInner { position: relative; z-index: 2; display: grid; grid-template-columns: 1.1fr .75fr; gap: clamp(14px, 2vw, 22px); align-items: center; }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 13px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent3) 36%, white 44%);
      border: 2px solid rgba(255,255,255,.85);
      color: var(--ink);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
      box-shadow: 0 8px 18px rgba(111,24,92,.13);
    }
    h1 {
      margin: 10px 0 10px;
      font-family: 'Baloo 2', 'Fredoka', sans-serif;
      font-size: clamp(42px, 7vw, 86px);
      line-height: .88;
      color: var(--ink);
      text-shadow: 0 5px 0 rgba(255,255,255,.78), 0 0 28px color-mix(in srgb, var(--accent) 28%, transparent);
    }
    .heroText {
      margin: 0;
      color: color-mix(in srgb, var(--ink) 84%, #5b245f 16%);
      font-size: clamp(16px, 2.05vw, 22px);
      line-height: 1.35;
      max-width: 760px;
    }
    .heroActions { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 18px; }

    .bigButton, .themeButton, .pillButton, .backButton {
      border: 0;
      cursor: pointer;
      font-weight: 900;
      border-radius: 999px;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255,255,255,.8), rgba(255,255,255,.28)),
        linear-gradient(135deg, var(--accent3), var(--accent2), var(--accent));
      box-shadow: 0 10px 24px rgba(111,24,92,.22), 0 0 22px color-mix(in srgb, var(--accent) 28%, transparent), inset 0 2px 0 rgba(255,255,255,.72);
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
    }
    .bigButton { min-height: 58px; padding: 14px 24px; font-size: clamp(17px, 2vw, 22px); }
    .pillButton { min-height: 48px; padding: 10px 17px; font-size: 15px; }
    .backButton { min-width: 108px; min-height: 50px; padding: 0 20px; }
    .bigButton:hover, .themeButton:hover, .pillButton:hover, .backButton:hover { transform: translateY(-3px) scale(1.03); filter: brightness(1.04); }
    .bigButton:active, .themeButton:active, .pillButton:active, .backButton:active { transform: translateY(1px) scale(.98); }
    .pillButton.off { background: linear-gradient(135deg, rgba(255,255,255,.78), rgba(255,255,255,.32)), linear-gradient(135deg, #d5ecff, #f5d8ff); }

    .candyPreview {
      position: relative;
      min-height: 230px;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.9) 0 13%, transparent 14%),
        linear-gradient(180deg, color-mix(in srgb, var(--accent2) 42%, white 48%), color-mix(in srgb, var(--accent) 34%, white 52%));
      border: 3px solid rgba(255,255,255,.88);
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.25), 0 12px 32px rgba(111,24,92,.16);
    }
    .candyPreview::before {
      content: '';
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: -18px;
      height: 76px;
      background: repeating-linear-gradient(90deg, #fff 0 34px, var(--accent3) 34px 68px, var(--accent) 68px 102px, var(--accent2) 102px 136px);
      border-top: 5px solid rgba(255,255,255,.75);
      animation: candyRoad 3.2s linear infinite;
    }
    @keyframes candyRoad { to { background-position: 136px 0; } }
    .previewLolli, .previewPop, .previewGumdrop {
      position: absolute;
      filter: drop-shadow(0 10px 14px rgba(111,24,92,.18));
    }
    .previewLolli { left: 13%; top: 16%; width: 92px; height: 126px; animation: previewBob 1.8s ease-in-out infinite alternate; }
    .previewPop { right: 11%; top: 20%; width: 86px; height: 86px; animation: previewSpin 3.4s linear infinite; }
    .previewGumdrop { left: 48%; bottom: 60px; width: 78px; height: 76px; animation: previewBounce 1.3s ease-in-out infinite alternate; }
    .previewLolli::before { content:''; position:absolute; inset:0 0 31px 0; border-radius:50%; background:repeating-conic-gradient(#fff 0 18deg, var(--accent) 18deg 36deg, var(--accent2) 36deg 54deg, var(--accent3) 54deg 72deg); border:4px solid #fff; }
    .previewLolli::after { content:''; position:absolute; left:42px; top:82px; width:9px; height:48px; border-radius:99px; background:#fff; }
    .previewPop::before { content:''; position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 33% 24%, #fff 0 9%, transparent 10%), conic-gradient(var(--accent), var(--accent2), var(--accent3), var(--accent4), var(--accent)); border:4px solid #fff; }
    .previewGumdrop::before { content:''; position:absolute; inset:10% 3% 4%; border-radius:55% 55% 26% 26%; background:linear-gradient(145deg,var(--accent4),var(--accent2)); border:4px solid #fff; }
    @keyframes previewBob { to { transform: translateY(-16px) rotate(7deg); } }
    @keyframes previewSpin { to { transform: rotate(360deg); } }
    @keyframes previewBounce { to { transform: translateY(-18px) scale(1.07); } }

    .themeDock { grid-column: 1 / 3; padding: clamp(15px, 2vw, 22px); display: grid; gap: 12px; align-content: start; }
    .sectionTitle {
      position: relative;
      z-index: 2;
      margin: 0;
      font-family: 'Baloo 2', 'Fredoka', sans-serif;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      color: var(--ink);
      text-shadow: 0 3px 0 rgba(255,255,255,.78);
    }
    .themeHint { position: relative; z-index: 2; margin: 0; color: color-mix(in srgb, var(--ink) 80%, #7c577e); line-height: 1.35; }
    .themeGrid { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .themeButton {
      min-height: 98px;
      border-radius: 26px;
      padding: 12px;
      text-align: left;
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      background:
        linear-gradient(145deg, rgba(255,255,255,.8), rgba(255,255,255,.35)),
        linear-gradient(135deg, var(--c1), var(--c2), var(--c3));
      border: 3px solid rgba(255,255,255,.76);
      box-shadow: 0 10px 20px rgba(111,24,92,.17), inset 0 2px 0 rgba(255,255,255,.56);
    }
    .themeButton.active {
      outline: 4px solid color-mix(in srgb, var(--accent3) 75%, white 14%);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent), 0 0 32px color-mix(in srgb, var(--accent) 32%, transparent), inset 0 2px 0 rgba(255,255,255,.7);
      transform: translateY(-2px);
    }
    .themeButton strong { display:block; font-size: 18px; line-height: 1.05; }
    .themeButton span { display:block; margin-top: 3px; font-size: 13px; color: color-mix(in srgb, var(--ink) 78%, white 5%); line-height: 1.15; }
    .themeIcon { position: relative; width: 56px; height: 56px; filter: drop-shadow(0 8px 10px rgba(111,24,92,.18)); }
    .themeIcon::before, .themeIcon::after { content:''; position:absolute; }
    .icon-lollipop::before { inset: 2px 2px 15px; border-radius:50%; background:repeating-conic-gradient(#fff 0 18deg, var(--c1) 18deg 36deg, var(--c2) 36deg 54deg); border:3px solid #fff; }
    .icon-lollipop::after { left:26px; top:39px; width:6px; height:22px; border-radius:99px; background:#fff; }
    .icon-gumdrop::before { inset:10px 3px 3px; border-radius:55% 55% 26% 26%; background:linear-gradient(145deg,var(--c1),var(--c2)); border:3px solid #fff; }
    .icon-chocolate::before { inset:8px; border-radius:10px; background:linear-gradient(145deg,#7b3f25,#c47c45); border:3px solid #fff; box-shadow: inset 0 0 0 7px rgba(255,255,255,.15); }
    .icon-sprinkle::before { inset:7px; border-radius:50%; background:#fff; border:3px solid var(--c1); }
    .icon-sprinkle::after { inset:11px; background:radial-gradient(circle at 20% 35%,var(--c1) 0 4px,transparent 5px),radial-gradient(circle at 55% 25%,var(--c2) 0 4px,transparent 5px),radial-gradient(circle at 65% 65%,var(--c3) 0 4px,transparent 5px),linear-gradient(45deg,transparent 42%,var(--c2) 43% 53%,transparent 54%); }
    .icon-cotton::before { inset:9px 0 8px; border-radius:999px; background:radial-gradient(circle at 22% 50%,#fff 0 26%,transparent 27%),radial-gradient(circle at 45% 34%,var(--c1) 0 33%,transparent 34%),radial-gradient(circle at 72% 56%,var(--c2) 0 29%,transparent 30%); }
    .icon-peppermint::before { inset:5px; border-radius:50%; background:repeating-conic-gradient(#fff 0 20deg, var(--c1) 20deg 40deg); border:3px solid #fff; }


    #keyboardPage { padding: clamp(10px, 1.6vw, 22px); }
    .keyboardShell {
      width: min(1120px, 100%);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(150px, 1fr) auto;
      gap: clamp(10px, 2vh, 18px);
      align-items: stretch;
    }
    .topBar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .badge {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.66);
      border: 3px solid rgba(255,255,255,.84);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(111,24,92,.14);
    }
    .displayStage {
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      border: 4px solid rgba(255,255,255,.84);
      background:
        radial-gradient(circle at 50% 58%, color-mix(in srgb, var(--accent3) 28%, transparent), transparent 27%),
        linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.18));
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75), 0 18px 52px rgba(111,24,92,.17);
      min-height: 170px;
    }
    .displayStage::before {
      content: '';
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -12px;
      height: 64px;

      osc.stop(start + dur + 0.04);

      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const src = audioCtx.createBufferSource();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();
      src.buffer = buffer;
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(filterFreq, start);
      gain.gain.setValueAtTime(Math.max(0.0001, gainValue * masterVolume), start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      src.start(start);
    }

    function playKeySound(key) {
      initAudio();
      const t = audioCtx.currentTime;
      const idx = key === 'space' ? 12 : Math.max(0, letters.indexOf(key));
      const theme = THEMES[currentTheme];
      const base = 58 + (idx % 13);
      const freq = noteFreq(base);
      const typeBySound = {
        pop: 'triangle', bounce: 'sine', cocoa: 'sawtooth', sprinkle: 'square', cloud: 'triangle', mint: 'sine'
      };
      const type = typeBySound[theme.sound] || 'triangle';
      const lowSupport = idx % 4 === 0;

      if (key === 'space') {
        const songName = randomSpacebarSounds ? pick(Object.values(THEMES)).space : theme.space;
        candyPopSoundLayer(true);
        playSpaceSong(songName);
        maybeDrumOnPress(true);
        return;
      }

      noiseBurst(t + .01, .035, .008, 2200 + (idx % 5) * 420);
      candyPopSoundLayer(false);
      maybeDrumOnPress(false);

      if (theme.sound === 'pop') {
        makeTone(freq * 1.8, t, .09, 'triangle', .09, 2500);
        makeTone(freq * 2.4, t + .035, .08, 'sine', .055, 3200);
      } else if (theme.sound === 'bounce') {
        makeTone(freq * .9, t, .14, 'sine', .085, 1300);
        makeTone(freq * 1.18, t + .06, .11, 'triangle', .055, 1700);
      } else if (theme.sound === 'cocoa') {
        makeTone(freq * .52, t, .16, 'sawtooth', .055, 700);
        makeTone(freq * .78, t + .04, .13, 'triangle', .045, 900);
      } else if (theme.sound === 'sprinkle') {
        makeTone(freq * 2.1, t, .065, 'square', .045, 4200);
        makeTone(freq * 2.8, t + .045, .06, 'triangle', .04, 5000);
        noiseBurst(t, .055, .018, 3600);
      } else if (theme.sound === 'cloud') {
        makeTone(freq * 1.05, t, .18, 'triangle', .06, 1700);
        makeTone(freq * 1.5, t + .06, .18, 'sine', .04, 2200);
      } else if (theme.sound === 'mint') {
        makeTone(freq * 1.6, t, .07, 'sine', .06, 3200);
        noiseBurst(t + .02, .055, .012, 4200);
      } else {
        makeTone(freq, t, .12, type, .07, 1800);
      }
      if (lowSupport) {
        makeTone(freq * .5, t + .025, .12, 'sine', .018, 620);
      }
    }

    function playSpaceSong(songName) {
      initAudio();
      const t = audioCtx.currentTime;
      const songs = {
        lollipopSong: [60, 64, 67, 72],
        gumdropSong: [55, 60, 62, 67],
        chocolateSong: [43, 48, 55, 60],
        sprinkleSong: [67, 72, 76, 79, 84],
        cottonSong: [58, 62, 65, 69],
        peppermintSong: [60, 72, 67, 76]
      };
      const wave = songName === 'chocolateSong' ? 'sawtooth' : songName === 'sprinkleSong' ? 'square' : 'triangle';
      const notes = songs[songName] || songs.lollipopSong;
      notes.forEach((m, i) => {
        makeTone(noteFreq(m), t + i * .075, .22, wave, i === 0 ? .08 : .06, songName === 'chocolateSong' ? 950 : 2600);
      });
      if (songName === 'sprinkleSong' || songName === 'peppermintSong') noiseBurst(t + .04, .24, .02, 4800);
      if (songName === 'chocolateSong') noiseBurst(t, .18, .025, 520);
      noiseBurst(t + .015, .055, .014, 1800);
      noiseBurst(t + .13, .045, .012, 2600);
      noiseBurst(t + .245, .055, .011, 3200);
    }

      }
      for (let i = 0; i < drips; i++) {
        makeThemeFx('chocoDrip', x + rand(-95, 95), y + rand(-95, -15), {
          '--w': `${rand(10, big ? 24 : 18)}px`,
          '--h': `${rand(58, big ? 142 : 100)}px`,
          '--dx': `${rand(-30, 30)}px`,
          '--dy': `${rand(110, big ? 310 : 210)}px`,
          '--dur': `${rand(1.05, 1.75)}s`
        }, 2200);
      }
      for (let i = 0; i < chunks; i++) {
        makeThemeFx('chocoChunk', x, y, {
          '--s': `${rand(18, big ? 44 : 32)}px`,
          '--dx': `${rand(-180, 180)}px`,
          '--dy': `${rand(big ? -120 : -70, big ? 190 : 120)}px`,
          '--dur': `${rand(1.15, big ? 2.05 : 1.65)}s`
        }, 2400);
      }
    }

    function sprinkleKeyEffects(x, y, big) {
      const comets = effectCount(big ? 18 : 7);
      const stars = effectCount(big ? 18 : 8);
      const dots = effectCount(big ? 34 : 15);
      for (let i = 0; i < comets; i++) {
        makeThemeFx('sprinkleComet', x, y, {
          '--w': `${rand(big ? 86 : 48, big ? 170 : 94)}px`,
          '--r': `${rand(0, 360)}deg`,
          '--dx': `${rand(-240, 240)}px`,
          '--dy': `${rand(big ? -240 : -160, big ? 170 : 85)}px`,
          '--dur': `${rand(.9, big ? 1.55 : 1.25)}s`
        }, 1900);
      }
      for (let i = 0; i < stars; i++) {
        makeThemeFx('sprinkleStar', x + rand(-24, 24), y + rand(-20, 20), {
          '--s': `${rand(18, big ? 48 : 34)}px`,
          '--c': pick(['#2ab6ff', '#ff3eb5', '#fff069', '#82f36e']),
          '--dx': `${rand(-210, 210)}px`,
          '--dy': `${rand(-220, 105)}px`,
          '--dur': `${rand(.95, 1.45)}s`
        }, 1800);
      }
      for (let i = 0; i < dots; i++) {
        makeThemeFx('sprinkleDot', x, y, {
          '--w': `${rand(10, 28)}px`,
          '--c': pick(['#2ab6ff', '#ff3eb5', '#fff069', '#82f36e', '#ffffff']),
          '--r': `${rand(0, 180)}deg`,
          '--dx': `${rand(-230, 230)}px`,
          '--dy': `${rand(-210, 120)}px`,
          '--dur': `${rand(.8, 1.25)}s`
        }, 1600);
      }
    }

    function cottonKeyEffects(x, y, big) {
      const puffs = effectCount(big ? 16 : 6);
      const bubbles = effectCount(big ? 18 : 8);
      const wisps = effectCount(big ? 14 : 5);
      for (let i = 0; i < puffs; i++) {
        makeThemeFx('cottonPuff', x + rand(-54, 54), y + rand(-16, 18), {
          '--s': `${rand(big ? 92 : 58, big ? 190 : 112)}px`,
          '--dx': `${rand(-160, 160)}px`,
          '--dy': `${rand(big ? -250 : -185, -30)}px`,
          '--dur': `${rand(1.65, big ? 2.9 : 2.3)}s`
        }, 3300);
      }
      for (let i = 0; i < bubbles; i++) {
        makeThemeFx('cottonBubble', x, y, {
          '--s': `${rand(24, big ? 64 : 46)}px`,
          '--dx': `${rand(-180, 180)}px`,
          '--dy': `${rand(big ? -300 : -210, -80)}px`,
          '--dur': `${rand(1.55, big ? 2.8 : 2.25)}s`
        }, 3200);
      }
      for (let i = 0; i < wisps; i++) {
        makeThemeFx('cottonWisp', x, y, {
          '--w': `${rand(big ? 160 : 95, big ? 300 : 180)}px`,
          '--r': `${rand(-38, 38)}deg`,
          '--dx': `${rand(-120, 120)}px`,
          '--dy': `${rand(-145, 55)}px`,
          '--dur': `${rand(1.45, 2.25)}s`
        }, 2800);
      }
    }

    function peppermintKeyEffects(x, y, big) {
      const shards = effectCount(big ? 28 : 11);
      const discs = effectCount(big ? 9 : 4);
      const slashes = effectCount(big ? 16 : 7);
      for (let i = 0; i < shards; i++) {
        makeThemeFx('mintShard', x, y, {
          '--s': `${rand(18, big ? 46 : 32)}px`,
          '--r': `${rand(0, 360)}deg`,
          '--dx': `${rand(-230, 230)}px`,
          '--dy': `${rand(-220, 120)}px`,
          '--dur': `${rand(.8, big ? 1.45 : 1.15)}s`
        }, 1800);
      }
      for (let i = 0; i < discs; i++) {
        makeThemeFx('mintDisc', x + rand(-34, 34), y + rand(-20, 18), {
          '--s': `${rand(big ? 58 : 34, big ? 102 : 66)}px`,
          '--dx': `${rand(-170, 170)}px`,
          '--dy': `${rand(big ? -210 : -150, big ? 80 : 30)}px`,
          '--dur': `${rand(1.0, big ? 1.65 : 1.35)}s`
        }, 2100);
      }
      for (let i = 0; i < slashes; i++) {
        makeThemeFx('mintFrost', x, y, {
          '--w': `${rand(big ? 120 : 70, big ? 240 : 135)}px`,
          '--r': `${rand(-70, 70)}deg`,
          '--dx': `${rand(-160, 160)}px`,
          '--dy': `${rand(-170, 75)}px`,
          '--dur': `${rand(.75, 1.2)}s`
        }, 1600);
      }
    }

    function themeSweep(key) {
      const theme = THEMES[currentTheme];
      const line = document.createElement('div');
      line.className = 'screenSyrup';
      line.style.setProperty('--x', `${rand(window.innerWidth * .18, window.innerWidth * .82)}px`);
      line.style.setProperty('--y', `${rand(window.innerHeight * .18, window.innerHeight * .68)}px`);
      line.style.setProperty('--w', `${key === 'space' ? rand(240, 420) : rand(110, 240)}px`);
      line.style.setProperty('--r', `${rand(-28, 28)}deg`);
      fxLayer.appendChild(line);
      setTimeout(() => line.remove(), 850);
    }

    function celebrate() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight * .38;
      themeKeyEffects(cx, cy, 'space', cx, cy);
      makeLetter('SWEET!', cx, cy - 40, 'space');
      candyPopSoundLayer(true);
      playSpaceSong(THEMES[currentTheme].space);
    }

    function fitKeyboardToScreen() {
      const kb = keyboard;
      if (!kb || !keyboardPage.classList.contains('active')) return;
      kb.style.transform = 'scale(1)';
      const rect = kb.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const topBar = document.querySelector('.topBar');
      const stage = document.querySelector('.displayStage');
      const reserved = (topBar ? topBar.getBoundingClientRect().height : 0) + (stage ? stage.getBoundingClientRect().height : 0) + 56;
      const availableWidth = Math.max(260, window.innerWidth - 12);
      const availableHeight = Math.max(120, window.innerHeight - reserved);
      let scale = Math.min(1, availableWidth / rect.width, availableHeight / rect.height);
      scale = Math.max(.42, Math.floor(scale * 1000) / 1000);
      kb.style.setProperty('--kb-scale', scale);
      kb.style.transform = `scale(${scale})`;
    }

    launchBtn.addEventListener('click', () => {
      initAudio();
      playSpaceSong(THEMES[currentTheme].space);
      showPage('keyboard');
      if (drumSounds) startDrumLoop();
    });
    backHome.addEventListener('click', () => showPage('home'));
    randomToggle.addEventListener('click', () => {
      randomSpacebarSounds = !randomSpacebarSounds;
      randomToggle.textContent = `Random Spacebar Sounds: ${randomSpacebarSounds ? 'ON' : 'OFF'}`;
      randomToggle.classList.toggle('off', !randomSpacebarSounds);
      initAudio();
      playSpaceSong(randomSpacebarSounds ? 'sprinkleSong' : THEMES[currentTheme].space);
    });

    reducedToggle.addEventListener('click', () => {
      reducedEffects = !reducedEffects;
      body.classList.toggle('reduced-effects', reducedEffects);
      reducedToggle.textContent = `Reduced Visual Effects: ${reducedEffects ? 'ON' : 'OFF'}`;
      reducedToggle.classList.toggle('off', !reducedEffects);
      makeCandyDecor();
    });

    keyboard.addEventListener('pointerdown', (event) => {
      const key = event.target.closest('.key');
      if (!key) return;
      event.preventDefault();
      pressKey(key.dataset.key, key);
    });

    window.addEventListener('keydown', (event) => {
      if (!keyboardPage.classList.contains('active')) return;
      const raw = event.key.toLowerCase();
      const key = raw === ' ' ? 'space' : letters.includes(raw) ? raw : '';
      if (!key) return;
      event.preventDefault();
      pressKey(key);
    });

    window.addEventListener('resize', fitKeyboardToScreen);
    window.addEventListener('orientationchange', () => setTimeout(fitKeyboardToScreen, 200));

    buildThemeGrid();
    makeCandyDecor();
    setTheme(currentTheme);
  </script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
</html>
