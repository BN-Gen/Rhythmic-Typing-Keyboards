<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Rainbow Bubble Keyboard</title>
<style>
:root{
  --bg1:#fff3fb; --bg2:#dff9ff; --bg3:#fff7cc;
  --ink:#27405f; --bubble:#ffffffaa; --accent:#ff74c8; --accent2:#63d8ff; --accent3:#ffe16b; --accent4:#9bf6c8;
  --shadow:rgba(95,54,126,.22);
  --key:#fff;
  --key2:#ffe6f7;
}
*{box-sizing:border-box} html,body{height:100%;margin:0;overflow:hidden;font-family:ui-rounded,"Arial Rounded MT Bold","Trebuchet MS",system-ui,sans-serif;color:var(--ink)}
body{
  background:
    radial-gradient(circle at 18% 8%,#fff 0 7%,transparent 8%),
    radial-gradient(circle at 78% 12%,var(--bg3) 0 11%,transparent 12%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 48%,#f2e5ff);
}
body.theme-bubblegum{--accent:#ff67bd;--accent2:#8ee8ff;--accent3:#ffe47d;--accent4:#c9ffeb;--bg1:#fff0fa;--bg2:#dcfbff;--key2:#ffe0f4}
body.theme-ocean{--accent:#27c3ff;--accent2:#75f0d6;--accent3:#d9fbff;--accent4:#91d9ff;--bg1:#dffaff;--bg2:#d9fff1;--key2:#dff9ff}
body.theme-foam{--accent:#ff87d6;--accent2:#8a7cff;--accent3:#fff06e;--accent4:#74f4b8;--bg1:#fff6c7;--bg2:#e0fffb;--key2:#f7e8ff}
body.theme-soda{--accent:#ff8c3a;--accent2:#ff4caf;--accent3:#fff16d;--accent4:#6fffd2;--bg1:#fff2d8;--bg2:#ffe5f6;--key2:#ffe2cd}
.app{position:relative;width:100%;height:100%;min-height:100svh;isolation:isolate}
.page{position:absolute;inset:0;padding:clamp(14px,3vw,34px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,2vw,24px);transition:.35s ease;z-index:4}
#keyboardPage{justify-content:flex-end;padding-bottom:clamp(16px,5vh,54px);padding-top:clamp(56px,8vh,92px)}
.hidden{opacity:0;pointer-events:none;transform:translateY(20px) scale(.98)}
.bubble-world{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.blob{position:absolute;border-radius:50%;background:radial-gradient(circle at 32% 25%,#fff 0 14%,color-mix(in srgb,var(--accent) 45%,transparent) 16%,color-mix(in srgb,var(--accent2) 32%,transparent) 56%,transparent 72%);box-shadow:inset -18px -22px 40px rgba(255,255,255,.45),0 12px 35px var(--shadow);animation:floaty 9s ease-in-out infinite alternate}
.blob:after{content:"";position:absolute;left:20%;top:18%;width:24%;height:14%;border-radius:50%;background:#fff9;filter:blur(1px)}
.b1{width:22vmin;height:22vmin;left:5%;top:12%;animation-delay:-1s}.b2{width:14vmin;height:14vmin;right:8%;top:10%;animation-delay:-3s}.b3{width:30vmin;height:30vmin;right:-5%;bottom:8%;animation-delay:-5s}.b4{width:18vmin;height:18vmin;left:10%;bottom:9%;animation-delay:-7s}.b5{width:10vmin;height:10vmin;left:48%;top:5%;animation-delay:-2s}.b6{width:12vmin;height:12vmin;left:58%;bottom:12%;animation-delay:-4s}
@keyframes floaty{to{transform:translate(22px,-32px) scale(1.08)}}
body.theme-ocean .blob{border-radius:45% 55% 58% 42%/55% 42% 58% 45%;background:radial-gradient(circle at 34% 20%,#fff 0 12%,#b8fff4aa 14%,#3fc6ffaa 60%,transparent 76%);animation-name:drift}
body.theme-foam .blob{background:conic-gradient(from 40deg,#ff8bd655,#ffe86f55,#71f4bd55,#7bc8ff55,#ff8bd655);border:2px solid #fff9}
body.theme-soda .blob{border-radius:65% 35% 55% 45%/42% 58% 40% 60%;background:radial-gradient(circle at 28% 22%,#fff 0 15%,#fff07a99 17%,#ff8c3a80 48%,#ff4caf66 78%,transparent 82%)}
@keyframes drift{to{transform:translate(-18px,-46px) rotate(8deg) scale(1.06)}}
.title{font-size:clamp(2.3rem,8vw,6rem);line-height:.92;text-align:center;margin:0;text-shadow:0 4px 0 #fff,0 18px 35px var(--shadow);letter-spacing:-.04em}
.subtitle{max-width:820px;text-align:center;font-size:clamp(1rem,2.2vw,1.35rem);margin:0;background:#ffffff92;border:2px solid #fff;border-radius:999px;padding:.8em 1.2em;box-shadow:0 16px 35px var(--shadow);backdrop-filter:blur(10px)}
.theme-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:clamp(12px,2vw,20px);width:min(1120px,96vw)}
.card{position:relative;min-height:250px;border:0;padding:0;cursor:pointer;border-radius:46px;background:#fff8;box-shadow:0 18px 40px var(--shadow),inset 0 0 0 3px #fff;overflow:hidden;color:var(--ink);transition:.22s ease;backdrop-filter:blur(12px)}
.card:hover{transform:translateY(-9px) rotate(-1deg)}
.card .preview{height:142px;position:relative;background:linear-gradient(135deg,color-mix(in srgb,var(--c1) 35%,#fff),color-mix(in srgb,var(--c2) 30%,#fff));border-radius:42px;margin:12px;overflow:hidden}
.card h2{font-size:1.25rem;margin:8px 16px 2px}.card p{margin:0 16px 16px;font-size:.92rem;line-height:1.25}
.preview i{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 22%,#fff 0 16%,var(--c1) 20%,var(--c2) 80%);box-shadow:inset -10px -12px 22px #ffffff66,0 10px 22px #0001}
.preview .p1{width:70px;height:70px;left:16px;top:18px}.preview .p2{width:46px;height:46px;right:24px;top:16px}.preview .p3{width:94px;height:42px;left:52px;bottom:20px;border-radius:999px}.preview .p4{width:28px;height:28px;right:70px;bottom:26px}
.card[data-theme=bubblegum]{--c1:#ff67bd;--c2:#86eaff}.card[data-theme=ocean]{--c1:#21c8ff;--c2:#78ffe2}.card[data-theme=foam]{--c1:#fff06e;--c2:#a282ff}.card[data-theme=soda]{--c1:#ff8c3a;--c2:#ff4caf}
body.theme-ocean .card[data-theme=ocean] .preview i{border-radius:48% 52% 42% 58%;filter:saturate(1.2)}
body.theme-foam .card[data-theme=foam] .preview{background:repeating-radial-gradient(circle at 30% 35%,#fff8 0 12px,transparent 13px 28px),linear-gradient(135deg,#fff6a9,#c9f8ff,#ffd2f1)}
body.theme-soda .card[data-theme=soda] .preview i{border-radius:40% 60% 60% 40%/50% 40% 60% 50%}
.start{border:0;border-radius:999px;padding:16px 26px;font-weight:900;font-size:1.1rem;color:#28405f;background:linear-gradient(135deg,#fff,#ffe8fb);box-shadow:0 16px 34px var(--shadow),inset 0 -5px 0 #0000000c;cursor:pointer}
.keyboard-wrap{width:min(1080px,98vw);display:flex;flex-direction:column;align-items:center;gap:clamp(10px,1.4vw,16px);padding:clamp(10px,2vw,20px);border-radius:44px;background:#ffffff82;box-shadow:0 -10px 45px var(--shadow),0 20px 45px var(--shadow),inset 0 0 0 3px #fff9;backdrop-filter:blur(16px);margin-top:auto}
.theme-name{font-size:clamp(1.3rem,3vw,2.3rem);font-weight:1000;text-shadow:0 3px 0 #fff;margin-bottom:4px;background:#ffffff9a;border:2px solid #fff;border-radius:999px;padding:.25em .8em;box-shadow:0 12px 25px var(--shadow)}
.row{display:flex;gap:clamp(7px,1vw,13px);justify-content:center;flex-wrap:nowrap}
.key{position:relative;border:0;width:clamp(44px,7.2vw,78px);height:clamp(54px,8.2vw,88px);border-radius:999px;background:radial-gradient(circle at 32% 24%,#fff 0 15%,var(--key) 17%,var(--key2) 58%,color-mix(in srgb,var(--accent) 24%,#fff) 100%);box-shadow:inset -9px -12px 24px #0000000a,inset 9px 10px 20px #ffffffcc,0 14px 25px var(--shadow);font-size:clamp(1.45rem,4vw,2.4rem);font-weight:1000;color:#2e4b6b;text-shadow:0 3px 0 #fff;cursor:pointer;transition:transform .13s ease;animation:wobble 4s ease-in-out infinite}
.key:nth-child(2n){animation-delay:-1.2s}.key:nth-child(3n){animation-delay:-2.2s}
@keyframes wobble{0%,100%{border-radius:58% 42% 52% 48%/46% 60% 40% 54%}50%{border-radius:42% 58% 47% 53%/58% 44% 56% 42%}}
.key:active,.key.active{transform:translateY(7px) scale(.93);box-shadow:inset -6px -8px 18px #00000012,0 5px 12px var(--shadow)}
.space-key{width:min(840px,92vw);height:clamp(64px,8.6vw,96px);font-size:clamp(1.05rem,2.2vw,1.65rem);letter-spacing:.16em;text-indent:.16em;border-radius:999px;background:linear-gradient(90deg,#fff,#fff0fa,#e8fbff,#fff8d6,#fff);overflow:hidden;animation:spaceBob 3s ease-in-out infinite;box-shadow:inset -12px -16px 28px #0000000d,inset 12px 12px 28px #ffffffdd,0 18px 30px var(--shadow),0 0 0 8px #ffffff4d}.space-key:before{content:"";position:absolute;inset:12% 8%;border-radius:999px;background:radial-gradient(circle at 10% 50%,var(--accent) 0 5px,transparent 6px),radial-gradient(circle at 22% 35%,var(--accent2) 0 7px,transparent 8px),radial-gradient(circle at 39% 60%,var(--accent3) 0 5px,transparent 6px),radial-gradient(circle at 56% 36%,var(--accent4) 0 8px,transparent 9px),radial-gradient(circle at 75% 56%,var(--accent2) 0 5px,transparent 6px),radial-gradient(circle at 90% 38%,var(--accent) 0 7px,transparent 8px);opacity:.7;animation:spaceBubbles 2.5s linear infinite}.space-key:after{content:"BUBBLE WAVE";position:absolute;inset:0;display:grid;place-items:center;color:#294a6c;text-shadow:0 3px 0 #fff,0 0 18px #fff;font-weight:1000}.space-key span{position:relative;z-index:1}@keyframes spaceBob{50%{transform:translateY(-4px) scaleX(1.035)}}@keyframes spaceBubbles{0%{background-position:0 14px,0 0,0 8px,0 -4px,0 10px,0 0}100%{background-position:160px -12px,150px -18px,140px -8px,120px -22px,110px -16px,100px -28px}}
.back{position:absolute;left:clamp(12px,2vw,24px);top:clamp(12px,2vw,24px);z-index:10;border:0;border-radius:999px;background:#fffffff0;color:#2c4868;font-weight:900;padding:12px 18px;box-shadow:0 10px 24px var(--shadow);cursor:pointer}
.fx-layer,.letter-layer{position:absolute;inset:0;pointer-events:none;z-index:6;overflow:hidden}
.letter-layer{z-index:9}
.giant-letter{position:absolute;left:50%;top:13%;width:clamp(132px,24vw,250px);height:clamp(132px,24vw,250px);display:grid;place-items:center;border-radius:50%;font-size:clamp(4.8rem,15vw,11rem);font-weight:1000;color:#28405f;background:radial-gradient(circle at 30% 20%,#fff 0 12%,#ffffffe0 16%,color-mix(in srgb,var(--accent) 34%,#fff) 55%,color-mix(in srgb,var(--accent2) 38%,transparent) 100%);box-shadow:inset -20px -24px 44px #0000000c,inset 18px 16px 30px #ffffffcc,0 22px 50px var(--shadow),0 0 0 12px #ffffff55;text-shadow:0 6px 0 #fff,0 12px 25px #0001;transform:translate(-50%,-50%) scale(.2);animation:giantBurst 1.8s cubic-bezier(.18,.9,.15,1) forwards}
.giant-letter:before,.giant-letter:after{content:"";position:absolute;border-radius:50%;border:5px solid #fff8;inset:-18px;animation:ringSplash 1.4s ease-out forwards}.giant-letter:after{inset:-36px;animation-delay:.08s}
@keyframes giantBurst{0%{opacity:0;transform:translate(-50%,-50%) scale(.18) rotate(-8deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.06) rotate(4deg)}70%{opacity:1;transform:translate(-50%,calc(-50% + 24px)) scale(1.0) rotate(-2deg)}100%{opacity:0;transform:translate(-50%,calc(-50% + 64px)) scale(.82) rotate(8deg)}}
@keyframes ringSplash{to{transform:scale(1.45);opacity:0}}
.fx{position:absolute;display:block;color:var(--accent);pointer-events:none}.bubble{width:var(--s);height:var(--s);border-radius:50%;background:radial-gradient(circle at 30% 22%,#fff 0 15%,currentColor 19%,transparent 70%);box-shadow:inset -8px -10px 18px #ffffff77,0 8px 20px #0001;animation:bubbleUp 1.25s ease-out forwards}.splash{width:60px;height:60px;border:5px solid currentColor;border-radius:50%;animation:splash .8s ease-out forwards}.drop{width:16px;height:26px;border-radius:60% 60% 60% 8%;background:currentColor;transform:rotate(45deg);animation:dropFly .9s ease-out forwards}.star{width:16px;height:16px;background:currentColor;clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:dropFly .9s ease-out forwards}
@keyframes bubbleUp{to{transform:translate(var(--dx),var(--dy)) scale(.22);opacity:0}}@keyframes splash{to{transform:translate(-50%,-50%) scale(4);opacity:0}}@keyframes dropFly{to{transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.25);opacity:0}}
.foam-puff{width:var(--s);height:calc(var(--s)*.58);border-radius:999px;background:radial-gradient(circle at 20% 45%,#fff 0 20%,currentColor 22% 42%,transparent 43%),radial-gradient(circle at 48% 35%,#fff 0 18%,currentColor 20% 44%,transparent 45%),radial-gradient(circle at 76% 48%,#fff 0 17%,currentColor 20% 44%,transparent 45%);animation:bubbleUp 1.2s ease-out forwards}.fizz{width:10px;height:10px;border-radius:50%;background:#fff;border:3px solid currentColor;box-shadow:0 0 14px currentColor;animation:fizzUp 1s ease-out forwards}.wave-ribbon{width:120px;height:40px;border-top:8px solid currentColor;border-radius:50%;animation:waveRibbon 1.1s ease-out forwards}.space-splash-word{position:absolute;left:50%;top:20%;font-weight:1000;font-size:clamp(2rem,8vw,6rem);color:#294a6c;text-shadow:0 5px 0 #fff,0 16px 30px var(--shadow),0 0 30px #fff;transform:translate(-50%,-50%) scale(.3);animation:spaceWord 1.6s cubic-bezier(.2,.9,.15,1) forwards}@keyframes fizzUp{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}@keyframes waveRibbon{to{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scaleX(1.8);opacity:0}}@keyframes spaceWord{15%{opacity:1;transform:translate(-50%,-50%) scale(1.08) rotate(-2deg)}70%{opacity:1;transform:translate(-50%,calc(-50% + 28px)) scale(1)}100%{opacity:0;transform:translate(-50%,calc(-50% + 88px)) scale(.82) rotate(4deg)}}
@media(max-width:860px){.theme-grid{grid-template-columns:repeat(2,1fr)}.card{min-height:210px}.row{gap:6px}.key{width:clamp(30px,9vw,58px);height:clamp(44px,11vw,68px)}}@media(max-width:480px){.theme-grid{grid-template-columns:1fr 1fr}.card p{display:none}.preview{height:105px!important}.keyboard-wrap{border-radius:28px}.key{font-size:1.25rem}}

/* Extra Rainbow Bubble effects pass */
.giant-letter { animation-duration:2.05s; }
.bubble-trail{width:var(--s);height:var(--s);border-radius:50%;background:radial-gradient(circle at 26% 20%,#fff 0 18%,currentColor 22%,transparent 74%);box-shadow:inset -7px -9px 16px #fff8,0 0 18px currentColor;animation:trailSwirl 1.45s cubic-bezier(.18,.9,.18,1) forwards}
.micro-pop{width:10px;height:10px;border-radius:50%;background:#fff;border:3px solid currentColor;box-shadow:0 0 12px currentColor,0 0 24px #fff;animation:microPop .82s ease-out forwards}
.rainbow-arc{width:180px;height:90px;border-radius:180px 180px 0 0;border-top:9px solid currentColor;border-left:9px solid transparent;border-right:9px solid transparent;filter:drop-shadow(0 0 14px currentColor);animation:arcFloat 1.3s ease-out forwards}
.lagoon-ripple{width:48px;height:20px;border:4px solid currentColor;border-radius:50%;animation:lagoonRipple 1.2s ease-out forwards}
.soda-stream{width:16px;height:90px;border-radius:999px;background:linear-gradient(to top,transparent,currentColor,#fff);box-shadow:0 0 18px currentColor;animation:sodaStream .95s ease-out forwards}
.foam-cloud{width:var(--s);height:calc(var(--s)*.62);border-radius:999px;background:radial-gradient(circle at 18% 50%,#fff 0 24%,currentColor 27% 44%,transparent 46%),radial-gradient(circle at 42% 38%,#fff 0 22%,currentColor 25% 46%,transparent 48%),radial-gradient(circle at 68% 52%,#fff 0 20%,currentColor 23% 44%,transparent 46%),radial-gradient(circle at 86% 48%,#fff 0 14%,currentColor 17% 34%,transparent 36%);filter:drop-shadow(0 0 18px currentColor);animation:cloudFloat 1.55s ease-out forwards}
.space-fountain{position:absolute;left:50%;bottom:clamp(120px,20vh,230px);width:clamp(210px,42vw,520px);height:clamp(120px,24vw,260px);transform:translateX(-50%);border-radius:50% 50% 0 0;background:radial-gradient(ellipse at 50% 100%,color-mix(in srgb,var(--accent2) 42%,transparent),transparent 66%),radial-gradient(circle at 30% 80%,color-mix(in srgb,var(--accent) 34%,transparent),transparent 30%),radial-gradient(circle at 70% 70%,color-mix(in srgb,var(--accent3) 36%,transparent),transparent 30%);filter:blur(.2px) drop-shadow(0 0 22px var(--accent2));animation:fountainRise 1.45s cubic-bezier(.18,.9,.2,1) forwards;pointer-events:none}
.space-fountain:before,.space-fountain:after{content:"";position:absolute;inset:18% 8%;border-radius:50% 50% 0 0;border-top:8px solid #fff9;animation:fountainRing 1.2s ease-out forwards}.space-fountain:after{inset:34% 18%;animation-delay:.08s;border-top-color:var(--accent)}
body.theme-bubblegum .space-key:after{content:"GUMDROP POP WAVE"}body.theme-ocean .space-key:after{content:"LAGOON SPLASH WAVE"}body.theme-foam .space-key:after{content:"RAINBOW FOAM WAVE"}body.theme-soda .space-key:after{content:"FIZZY SODA WAVE"}
@keyframes trailSwirl{0%{transform:translate(-50%,-50%) scale(.25);opacity:0}20%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot)) scale(.1);opacity:0}}
@keyframes microPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}20%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.8);opacity:0}}
@keyframes arcFloat{0%{transform:translate(-50%,-50%) scale(.45) rotate(var(--rot));opacity:0}20%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.3) rotate(var(--rot));opacity:0}}
@keyframes lagoonRipple{0%{transform:translate(-50%,-50%) scale(.25);opacity:0}25%{opacity:1}100%{transform:translate(-50%,-50%) scale(5.2);opacity:0}}
@keyframes sodaStream{0%{transform:translate(-50%,20px) scaleY(.15);opacity:0}20%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-120px + var(--dy))) scaleY(.1);opacity:0}}
@keyframes cloudFloat{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}20%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.18);opacity:0}}
@keyframes fountainRise{0%{opacity:0;transform:translateX(-50%) scale(.45,.2)}25%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1.25,1.15) translateY(-120px)}}
@keyframes fountainRing{to{transform:scale(1.45);opacity:0}}

</style>
</head>
<body class="theme-bubblegum">
<div class="app">
  <div class="bubble-world" aria-hidden="true"><i class="blob b1"></i><i class="blob b2"></i><i class="blob b3"></i><i class="blob b4"></i><i class="blob b5"></i><i class="blob b6"></i></div>
  <div class="fx-layer" id="fxLayer"></div><div class="letter-layer" id="letterLayer"></div>
  <section class="page" id="menuPage">
    <h1 class="title">Rainbow Bubble Keyboard</h1>
    <p class="subtitle">A soft, bubbly keyboard with wobbly round keys, splash rings, floating circles, and playful bubble sounds.</p>
    <div class="theme-grid">
      <button class="card" data-theme="bubblegum"><div class="preview"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div><h2>Bubblegum Pop</h2><p>Pink candy bubbles, soft pops, squishy round keys.</p></button>
      <button class="card" data-theme="ocean"><div class="preview"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div><h2>Ocean Bubbles</h2><p>Blue water drops, plinks, drifting lagoon bubbles.</p></button>
      <button class="card" data-theme="foam"><div class="preview"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div><h2>Rainbow Foam</h2><p>Rainbow suds, foam rings, soft magical bounce.</p></button>
      <button class="card" data-theme="soda"><div class="preview"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div><h2>Candy Soda</h2><p>Fizz bubbles, orange-pink soda pops, sweet sparkle.</p></button>
    </div>
    <button class="start" id="start">Open Keyboard</button>
  </section>
  <section class="page hidden" id="keyboardPage">
    <button class="back" id="back">Back</button>
    <div class="keyboard-wrap" id="keyboard"></div>
  </section>
</div>
<script>
const themes={
 bubblegum:{body:"theme-bubblegum",name:"Bubblegum Pop",waves:["sine","triangle","sine"],scale:[261.63,329.63,392,523.25,659.25]},
 ocean:{body:"theme-ocean",name:"Ocean Bubbles",waves:["sine","sine","triangle"],scale:[220,293.66,349.23,440,587.33]},
 foam:{body:"theme-foam",name:"Rainbow Foam",waves:["triangle","sine","triangle"],scale:[246.94,311.13,369.99,493.88,622.25]},
 soda:{body:"theme-soda",name:"Candy Soda",waves:["square","triangle","sine"],scale:[196,246.94,329.63,392,493.88]}
};
let current="bubblegum", audioCtx;
const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const rows=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];
const fxLayer=document.getElementById("fxLayer"), letterLayer=document.getElementById("letterLayer"), keyboard=document.getElementById("keyboard");
function buildKeyboard(){keyboard.innerHTML=""; rows.forEach(r=>{const row=document.createElement("div"); row.className="row"; [...r].forEach(ch=>{const b=document.createElement("button"); b.className="key"; b.textContent=ch; b.dataset.letter=ch; row.appendChild(b)}); keyboard.appendChild(row)}); const row=document.createElement("div"); row.className="row"; const sp=document.createElement("button"); sp.className="key space-key"; sp.textContent=""; sp.dataset.space="1"; row.appendChild(sp); keyboard.appendChild(row)}
buildKeyboard();
function setTheme(t){current=t; document.body.className=themes[t].body}
document.querySelectorAll(".card").forEach(c=>c.onclick=()=>{setTheme(c.dataset.theme); showKeyboard()});
document.getElementById("start").onclick=showKeyboard; document.getElementById("back").onclick=()=>{menuPage.classList.remove("hidden");keyboardPage.classList.add("hidden")};
function showKeyboard(){menuPage.classList.add("hidden");keyboardPage.classList.remove("hidden")}
keyboard.addEventListener("pointerdown",e=>{const k=e.target.closest(".key"); if(!k)return; if(k.dataset.letter) press(k.dataset.letter,k); else pressSpace(k)});
document.addEventListener("keydown",e=>{if(e.repeat)return; const ch=e.key.toUpperCase(); if(letters.includes(ch)){const k=document.querySelector(`[data-letter="${ch}"]`); press(ch,k)} else if(e.code==="Space"){e.preventDefault(); pressSpace(document.querySelector("[data-space]"))}});
function ensureAudio(){if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==="suspended") audioCtx.resume(); return audioCtx}
function tone(freq, start, dur, type, gain, pan=0, filt=2200, slide=1){const ctx=ensureAudio(), o=ctx.createOscillator(), g=ctx.createGain(), f=ctx.createBiquadFilter(), p=ctx.createStereoPanner?ctx.createStereoPanner():null; o.type=type; o.frequency.setValueAtTime(freq,start); o.frequency.exponentialRampToValueAtTime(Math.max(20,freq*slide),start+dur); f.type="lowpass"; f.frequency.value=filt; g.gain.setValueAtTime(gain,start); g.gain.exponentialRampToValueAtTime(.0001,start+dur); if(p){p.pan.value=pan;o.connect(f);f.connect(g);g.connect(p);p.connect(ctx.destination)}else{o.connect(f);f.connect(g);g.connect(ctx.destination)} o.start(start); o.stop(start+dur+.02)}
function noise(start,dur,gain,freq){const ctx=ensureAudio(), len=Math.max(1,ctx.sampleRate*dur), buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0); for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len); const s=ctx.createBufferSource(), g=ctx.createGain(), f=ctx.createBiquadFilter(); s.buffer=buf; f.type="bandpass"; f.frequency.value=freq; f.Q.value=5; g.gain.setValueAtTime(gain,start); g.gain.exponentialRampToValueAtTime(.0001,start+dur); s.connect(f);f.connect(g);g.connect(ctx.destination);s.start(start)}
function popNoise(start,dur,gain,freq){const ctx=ensureAudio(), len=Math.max(1,ctx.sampleRate*dur), buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0); for(let i=0;i<len;i++){const env=Math.pow(1-i/len,2.4); d[i]=(Math.random()*2-1)*env} const s=ctx.createBufferSource(), g=ctx.createGain(), f=ctx.createBiquadFilter(); s.buffer=buf; f.type="highpass"; f.frequency.setValueAtTime(freq,start); f.frequency.exponentialRampToValueAtTime(Math.max(80,freq*.35),start+dur); g.gain.setValueAtTime(gain,start); g.gain.exponentialRampToValueAtTime(.0001,start+dur); s.connect(f);f.connect(g);g.connect(ctx.destination);s.start(start)}
function plink(freq,start,pan=0){tone(freq,start,.055,"sine",.045,pan,5200,1.9); tone(freq*2.01,start+.018,.1,"triangle",.025,-pan*.5,6400,.78)}
function bubblyPop(freq,start,pan=0){popNoise(start,.045,.025,900+freq); tone(freq,start,.075,"sine",.055,pan,2600,1.75); tone(freq*1.5,start+.035,.09,"triangle",.032,-pan,3600,.72)}

function chord(freqs,start,dur,type,gain,pan=0,filt=4200,slide=1){freqs.forEach((f,i)=>tone(f,start+i*.012,dur,type,gain/(i+1.5),pan+(i-1)*.16,filt,slide))}
function waterySweep(freq,start,pan=0){noise(start,.11,.018,900); tone(freq*.55,start,.18,"sine",.045,pan,700,1.45); tone(freq*1.2,start+.045,.14,"triangle",.026,-pan,2600,.72); plink(freq*1.8,start+.09,pan*.4)}
function gumSqueak(freq,start,pan=0){popNoise(start,.05,.03,520); tone(freq*.7,start,.13,"sine",.055,pan,1400,2.2); tone(freq*1.42,start+.04,.11,"triangle",.034,-pan,2400,.62); popNoise(start+.075,.035,.014,1000)}
function foamChime(freq,start,pan=0){chord([freq,freq*1.25,freq*1.5],start,.18,"sine",.06,pan,5600,1.06); noise(start+.02,.08,.01,2200); tone(freq*2.05,start+.095,.16,"triangle",.024,-pan,6800,.82)}
function sodaFizzSound(freq,start,pan=0){for(let j=0;j<4;j++)popNoise(start+j*.018,.028,.016,1800+j*480); tone(freq*.82,start,.075,"square",.04,pan,1700,1.9); tone(freq*2.15,start+.045,.075,"triangle",.03,-pan,5200,.58); tone(freq*3.08,start+.085,.06,"sine",.018,pan*.5,7200,1.18)}

function playSound(i){const ctx=ensureAudio(), now=ctx.currentTime, th=themes[current], base=th.scale[i%th.scale.length]*(i%3===0?.72:i%3===1?1:1.48), pan=((i%7)-3)/4; if(current==="bubblegum"){gumSqueak(base,now,pan); if(i%3===0) tone(base*2.52,now+.1,.08,"sine",.018,-pan,4200,.88)} else if(current==="ocean"){waterySweep(base*.9,now,pan); if(i%2===0) noise(now+.06,.12,.012,580)} else if(current==="foam"){foamChime(base,now,pan); if(i%4===1) popNoise(now+.12,.055,.012,2600)} else {sodaFizzSound(base,now,pan); if(i%3===2) tone(base*.46,now+.02,.13,"sawtooth",.018,0,900,1.25)}}
function playSpace(){const ctx=ensureAudio(), now=ctx.currentTime; if(current==="ocean"){noise(now,.32,.06,520); [98,130.81,196,261.63,329.63,392,523.25,659.25].forEach((f,i)=>{waterySweep(f,now+i*.045,(i-3.5)/5)}); tone(65.41,now,.55,"sine",.06,0,420,1.18)} else if(current==="soda"){for(let i=0;i<16;i++)popNoise(now+i*.018,.03,.02,1400+i*260); [164.81,246.94,329.63,493.88,659.25,987.77,1318.51].forEach((f,i)=>sodaFizzSound(f,now+i*.035,(i-3)/4))} else if(current==="foam"){noise(now,.24,.025,2400); [196,246.94,311.13,392,493.88,622.25,783.99,987.77].forEach((f,i)=>foamChime(f,now+i*.04,(i-3.5)/5))} else {[130.81,196,261.63,329.63,392,523.25,659.25,783.99].forEach((f,i)=>gumSqueak(f,now+i*.036,(i-3.5)/5)); tone(98,now,.38,"triangle",.06,0,700,1.38)}}
function press(ch,k){if(k){k.classList.add("active");setTimeout(()=>k.classList.remove("active"),150)} const i=letters.indexOf(ch); playSound(i); giant(ch); effects(i,k)}
function pressSpace(k){if(k){k.classList.add("active");setTimeout(()=>k.classList.remove("active"),260)} playSpace(); spaceWord(); giant(current==="ocean"?"💧":current==="soda"?"✦":current==="foam"?"☁":"○"); spaceFountain(); for(let i=0;i<58;i++) bubble(innerWidth*(.04+Math.random()*.92),innerHeight*(.78+Math.random()*.18),i,true); for(let i=0;i<20;i++) splash(innerWidth*(.06+i*.047),innerHeight*(.76+Math.random()*.12),i); for(let i=0;i<22;i++) ribbon(innerWidth*(.08+Math.random()*.84),innerHeight*(.72+Math.random()*.18),i); for(let i=0;i<28;i++) micro(innerWidth*(.06+Math.random()*.88),innerHeight*(.82+Math.random()*.16),i); if(current==="bubblegum") for(let i=0;i<18;i++) arc(innerWidth*(.1+Math.random()*.8),innerHeight*(.64+Math.random()*.18),i); if(current==="ocean") for(let i=0;i<18;i++) ripple(innerWidth*(.06+Math.random()*.88),innerHeight*(.68+Math.random()*.22),i); if(current==="soda") for(let i=0;i<42;i++) sodaStream(innerWidth*(.05+Math.random()*.9),innerHeight*(.88+Math.random()*.08),i); if(current==="foam") for(let i=0;i<28;i++) foamCloud(innerWidth*(.05+Math.random()*.9),innerHeight*(.72+Math.random()*.2),i)}
function giant(ch){const el=document.createElement("div"); el.className="giant-letter"; el.textContent=ch; el.style.left=rand(12,88)+"vw"; el.style.top=rand(8,42)+"vh"; el.style.setProperty("--float-x",rand(-45,45)+"px"); el.style.setProperty("--float-y",rand(-28,48)+"px"); letterLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function effects(i,k){const r=k?k.getBoundingClientRect():{left:innerWidth/2,top:innerHeight/2,width:1,height:1}; const x=r.left+r.width/2,y=r.top+r.height/2; splash(x,y,i); for(let n=0;n<10;n++) bubble(x,y,i+n); for(let n=0;n<6;n++) trail(x,y,i+n); for(let n=0;n<8;n++) micro(x,y,i+n); if(current==="bubblegum"){for(let n=0;n<3;n++) arc(x,y,i+n); for(let n=0;n<4;n++) bubble(x+rand(-60,60),y+rand(-20,40),i+n,true)} if(current==="ocean"){for(let n=0;n<5;n++) drop(x,y,i+n,"drop"); for(let n=0;n<3;n++) ripple(x+rand(-32,32),y+rand(-20,20),i+n)} if(current==="foam"){for(let n=0;n<6;n++) drop(x,y,i+n,"star"); for(let n=0;n<4;n++) foamCloud(x+rand(-45,45),y+rand(-30,30),i+n)} if(current==="soda"){for(let n=0;n<12;n++) fizz(x+rand(-24,24),y+rand(-16,24),i+n); for(let n=0;n<5;n++) sodaStream(x+rand(-55,55),y+rand(12,42),i+n)}}
function cssVar(name){return getComputedStyle(document.body).getPropertyValue(name).trim()}
function bubble(x,y,i,big=false){const el=document.createElement("i"); el.className="fx bubble"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--s",(big?rand(36,88):rand(18,48))+"px"); el.style.setProperty("--dx",rand(-110,110)+"px"); el.style.setProperty("--dy",rand(-190,-45)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function splash(x,y,i){const el=document.createElement("i"); el.className="fx splash"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.transform="translate(-50%,-50%)"; fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function drop(x,y,i,cls){const el=document.createElement("i"); el.className="fx "+cls; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-150,150)+"px"); el.style.setProperty("--dy",rand(-160,80)+"px"); el.style.setProperty("--rot",rand(-180,180)+"deg"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function fizz(x,y,i){const el=document.createElement("i"); el.className="fx fizz"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-90,90)+"px"); el.style.setProperty("--dy",rand(-220,-80)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function foam(x,y,i){const el=document.createElement("i"); el.className="fx foam-puff"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--s",rand(38,90)+"px"); el.style.setProperty("--dx",rand(-130,130)+"px"); el.style.setProperty("--dy",rand(-200,-55)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function ribbon(x,y,i){const el=document.createElement("i"); el.className="fx wave-ribbon"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-80,80)+"px"); el.style.setProperty("--dy",rand(-140,-30)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}

function trail(x,y,i){const el=document.createElement("i"); el.className="fx bubble-trail"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--s",rand(14,34)+"px"); el.style.setProperty("--dx",rand(-170,170)+"px"); el.style.setProperty("--dy",rand(-190,-40)+"px"); el.style.setProperty("--rot",rand(-240,240)+"deg"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function micro(x,y,i){const el=document.createElement("i"); el.className="fx micro-pop"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-140,140)+"px"); el.style.setProperty("--dy",rand(-130,70)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function arc(x,y,i){const el=document.createElement("i"); el.className="fx rainbow-arc"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-90,90)+"px"); el.style.setProperty("--dy",rand(-170,-40)+"px"); el.style.setProperty("--rot",rand(-24,24)+"deg"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function ripple(x,y,i){const el=document.createElement("i"); el.className="fx lagoon-ripple"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function sodaStream(x,y,i){const el=document.createElement("i"); el.className="fx soda-stream"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--dx",rand(-90,90)+"px"); el.style.setProperty("--dy",rand(-90,30)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function foamCloud(x,y,i){const el=document.createElement("i"); el.className="fx foam-cloud"; el.style.left=x+"px"; el.style.top=y+"px"; el.style.color=[cssVar("--accent"),cssVar("--accent2"),cssVar("--accent3"),cssVar("--accent4")][i%4]; el.style.setProperty("--s",rand(48,110)+"px"); el.style.setProperty("--dx",rand(-140,140)+"px"); el.style.setProperty("--dy",rand(-180,-35)+"px"); fxLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function spaceFountain(){const el=document.createElement("div"); el.className="space-fountain"; letterLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}

function spaceWord(){const el=document.createElement("div"); el.className="space-splash-word"; el.textContent=current==="ocean"?"LAGOON SPLASH!":current==="soda"?"FIZZ ROCKET!":current==="foam"?"FOAM CLOUD!":"GUMDROP POP!"; letterLayer.appendChild(el); el.addEventListener("animationend",()=>el.remove(),{once:true})}
function rand(a,b){return a+Math.random()*(b-a)}
</script>
