<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Bangers&family=Black+Ops+One&family=Bungee+Inline&family=Caveat+Brush&family=Cinzel+Decorative:wght@700;900&family=Monoton&family=Orbitron:wght@700;900&family=Outfit:wght@500;700;900&family=Permanent+Marker&family=Press+Start+2P&family=Rajdhani:wght@600;700&family=Righteous&family=Rubik+Glitch&family=Rye&family=Special+Elite&display=swap');

    *, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg0: #05050a;
      --bg1: #071629;
      --bg2: #102a52;
      --hot: #00f0ff;
      --hot2: #ff3df2;
      --hot3: #ffe066;
      --hot4: #78ff9a;
      --panel: rgba(3, 7, 16, .74);
      --panel2: rgba(255,255,255,.075);
      --ink: #f7fbff;
      --muted: rgba(245,250,255,.76);
      --keyTop: #142037;
      --keyBottom: #070a14;
      --glow: rgba(0, 240, 255, .66);
      --good: #65ffb5;
    }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #030307;
      color: var(--ink);
      overflow: hidden;
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    button { font: inherit; color: inherit; }

    #studioStage {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 13% 16%, color-mix(in srgb, var(--hot2) 24%, transparent), transparent 26%),
        radial-gradient(circle at 78% 18%, color-mix(in srgb, var(--hot) 22%, transparent), transparent 25%),
        radial-gradient(circle at 48% 86%, color-mix(in srgb, var(--hot3) 14%, transparent), transparent 34%),
        linear-gradient(155deg, var(--bg0), var(--bg1) 44%, var(--bg2));
      transition: background 650ms ease;
    }
    #waveCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    #studioStage::before {
      content: '';
      position: absolute;
      inset: -20%;
      z-index: 2;
      pointer-events: none;
      opacity: .26;
      background:
        linear-gradient(90deg, transparent, color-mix(in srgb, var(--hot) 30%, transparent), transparent),
        repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 6px),
        repeating-linear-gradient(90deg, transparent 0 58px, rgba(255,255,255,.05) 59px 60px, transparent 61px 120px);
      animation: gridSlide 18s linear infinite;
      transform: perspective(600px) rotateX(52deg) translateY(22%);
      transform-origin: bottom;
    }
    #studioStage::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: .18;
      background: radial-gradient(ellipse at 50% 65%, transparent 0 44%, rgba(0,0,0,.75) 100%);
    }
    @keyframes gridSlide { to { background-position: 900px 0, 0 96px, 120px 0; } }

    #fxLayer, #instrumentLayer {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: hidden;
    }
    #instrumentLayer { z-index: 4; }
    /* Dedicated pop-up letter layer.
       Letters are no longer inserted into the old effects layer.
       This layer sits above the keyboard and clips anything that tries to fall into the keyboard area. */
    #letterStage {
      position: fixed;
      left: 50%;
      top: 72px;
      width: min(1040px, 96vw);
      height: 36vh;
      z-index: 2147483000;
      pointer-events: none;
      overflow: hidden;
      transform: translateX(-50%);
      border-radius: 30px;
      isolation: isolate;
      contain: layout paint;
      display: none;
    }
    body.keyboardMode #letterStage { display: block; }

    .page {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      pointer-events: auto;
      overflow: hidden;
    }
    .page.active { display: block; }

    #menuPage {
      padding: clamp(12px, 2vw, 26px);
      overflow-y: auto;
    }
    #menuPage::-webkit-scrollbar { width: 10px; }
    #menuPage::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--hot) 48%, transparent); border-radius: 999px; }

    .menuShell {
      width: min(1240px, 98vw);
      min-height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(310px, .8fr) minmax(360px, 1.2fr);
      grid-template-rows: auto 1fr;
      gap: clamp(12px, 2vw, 20px);
      padding-bottom: 22px;
    }
    .panel {
      border-radius: 34px;
      border: 1.8px solid color-mix(in srgb, var(--hot) 42%, transparent);
      background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.035)), var(--panel);
      box-shadow:
        0 24px 74px rgba(0,0,0,.48),
        0 0 46px color-mix(in srgb, var(--hot) 16%, transparent),
        inset 0 1px 0 rgba(255,255,255,.17);
      backdrop-filter: blur(15px);
    }
    .heroPanel {
      grid-column: 1 / 3;
      position: relative;
      overflow: hidden;
      min-height: 260px;
      padding: clamp(18px, 3vw, 34px);
    }
    .heroPanel::before {
      content: '';
      position: absolute;
      inset: auto -5% -44px -5%;
      height: 150px;
      background:
        linear-gradient(90deg, transparent, color-mix(in srgb, var(--hot2) 60%, transparent), color-mix(in srgb, var(--hot) 70%, transparent), color-mix(in srgb, var(--hot3) 60%, transparent), transparent),
        repeating-linear-gradient(90deg, transparent 0 16px, rgba(255,255,255,.14) 17px 19px, transparent 20px 31px);
      clip-path: polygon(0 92%, 4% 60%, 7% 78%, 11% 22%, 16% 80%, 21% 35%, 26% 65%, 31% 12%, 36% 82%, 41% 48%, 47% 65%, 53% 18%, 58% 83%, 63% 38%, 69% 58%, 74% 10%, 78% 75%, 83% 44%, 88% 69%, 93% 28%, 100% 88%, 100% 100%, 0 100%);
      opacity: .42;
      filter: drop-shadow(0 0 20px var(--hot));
      animation: equalizerWave 1.5s ease-in-out infinite alternate;
    }
    .heroPanel::after {
      content: 'Music Studio';
      position: absolute;
      right: -18px;
      top: 28px;
      font-family: 'Bungee Inline', cursive;
      font-size: clamp(28px, 5vw, 86px);
      letter-spacing: .08em;
      color: rgba(255,255,255,.05);
      transform: rotate(-4deg);
      white-space: nowrap;
    }
    @keyframes equalizerWave {
      from { transform: translateY(0) scaleY(.88); opacity: .32; }
      to { transform: translateY(-14px) scaleY(1.18); opacity: .56; }
    }
    .heroInner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(260px, .72fr);
      gap: 20px;
      align-items: center;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.13);
      color: var(--hot3);
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 700;
    }
    h1 {
      margin: 12px 0 8px;
      font-family: 'Bungee Inline', cursive;
      font-size: clamp(42px, 7vw, 88px);
      line-height: .9;
      letter-spacing: .015em;
      text-shadow: 0 0 18px var(--hot), 0 0 38px color-mix(in srgb, var(--hot2) 42%, transparent), 0 7px 0 rgba(0,0,0,.32);
    }
    .heroText {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.32;
    }
    .heroActions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 17px;
    }
    .launchButton, .toggleButton, .genreCard, .backButton {
      border: 0;
      cursor: pointer;
      font-weight: 900;
      color: #061018;
      background: linear-gradient(135deg, color-mix(in srgb, var(--hot) 82%, white 10%), color-mix(in srgb, var(--hot2) 76%, white 8%));
      box-shadow: 0 12px 30px rgba(0,0,0,.42), 0 0 28px color-mix(in srgb, var(--hot) 32%, transparent), inset 0 2px 0 rgba(255,255,255,.45);
      transition: transform .13s ease, filter .13s ease, box-shadow .13s ease;
    }
    .launchButton { min-height: 58px; padding: 15px 24px; border-radius: 999px; font-size: clamp(17px, 2vw, 22px); }
    .toggleButton { min-height: 48px; padding: 12px 18px; border-radius: 999px; font-size: 16px; }
    .ghost { background: rgba(255,255,255,.1); color: #fff; border: 2px solid color-mix(in srgb, var(--hot3) 55%, transparent); }
    .launchButton:hover, .toggleButton:hover, .genreCard:hover, .backButton:hover { transform: translateY(-3px) scale(1.025); filter: brightness(1.08); }
    .launchButton:active, .toggleButton:active, .genreCard:active, .backButton:active { transform: translateY(1px) scale(.98); }

    .visualPreview {
      min-height: 214px;
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 70%, color-mix(in srgb, var(--hot2) 26%, transparent), transparent 35%),
        rgba(0,0,0,.22);
    }
    .previewWave {
      position: absolute;
      left: -12%;
      right: -12%;
      top: 50%;
      height: 130px;
      transform: translateY(-50%);
      opacity: .82;
      background:
        linear-gradient(90deg, transparent, var(--hot), var(--hot2), var(--hot3), var(--hot4), transparent);
      clip-path: polygon(0 50%, 5% 45%, 9% 55%, 14% 20%, 20% 62%, 25% 35%, 31% 50%, 36% 12%, 42% 58%, 48% 46%, 54% 66%, 60% 19%, 66% 52%, 72% 41%, 78% 70%, 85% 28%, 91% 54%, 96% 46%, 100% 50%, 100% 55%, 96% 55%, 91% 62%, 85% 34%, 78% 74%, 72% 46%, 66% 58%, 60% 24%, 54% 70%, 48% 51%, 42% 63%, 36% 18%, 31% 55%, 25% 40%, 20% 66%, 14% 24%, 9% 60%, 5% 50%, 0 55%);
      filter: blur(.4px) drop-shadow(0 0 20px var(--hot));
      animation: previewWaveMove 3.2s ease-in-out infinite alternate;
    }
    .previewWave.two {
      top: 64%;
      opacity: .54;
      transform: translateY(-50%) scaleY(.55);
      animation-duration: 4.8s;
      animation-direction: alternate-reverse;
      filter: blur(1px) drop-shadow(0 0 26px var(--hot2));
    }
    @keyframes previewWaveMove {
      from { transform: translate(-7%, -50%) scaleY(.74); }
      to { transform: translate(7%, -50%) scaleY(1.08); }
    }
    .previewOrb {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      left: 17%;
      top: 30%;
      background: radial-gradient(circle at 35% 28%, #fff, var(--hot3) 22%, var(--hot2) 62%, transparent 72%);
      box-shadow: 0 0 30px var(--hot2);
      animation: previewBall 1.1s ease-in-out infinite alternate;
    }
    .previewOrb.second { left: 68%; top: 52%; background: radial-gradient(circle at 35% 28%, #fff, var(--hot) 22%, var(--hot4) 62%, transparent 72%); animation-delay: .22s; }
    @keyframes previewBall { to { transform: translateY(-48px) scale(1.1); } }

    .sidePanel {
      padding: clamp(16px, 2vw, 24px);
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .sectionTitle {
      margin: 0;
      font-family: 'Bungee Inline', cursive;
      font-size: clamp(24px, 3.4vw, 42px);
      letter-spacing: .02em;
      line-height: 1;
    }
    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 16px;
    }
    .genreGrid {
      grid-column: 2;
      grid-row: 2;
      padding: clamp(16px, 2vw, 24px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }
    .genreGridHeader {
      grid-column: 1 / -1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
    }
    .genreGridHeader p { margin: 0; color: var(--muted); max-width: 620px; }
    .genreCard {
      position: relative;
      min-height: 145px;
      border-radius: 26px;
      padding: 14px;
      text-align: left;
      overflow: hidden;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at var(--gx, 26%) var(--gy, 24%), color-mix(in srgb, var(--hot3) 42%, transparent), transparent 25%),
        linear-gradient(135deg, color-mix(in srgb, var(--hot) 22%, transparent), color-mix(in srgb, var(--hot2) 20%, transparent)),
        rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 12px 26px rgba(0,0,0,.22);
    }
    .genreCard::before {
      content: '';
      position: absolute;
      left: -12%; right: -12%; bottom: 8px;
      height: 50px;
      opacity: .48;
      background: linear-gradient(90deg, transparent, var(--cardA, var(--hot)), var(--cardB, var(--hot2)), transparent);
      clip-path: polygon(0 50%, 6% 30%, 12% 72%, 18% 36%, 24% 60%, 30% 18%, 37% 70%, 44% 34%, 51% 54%, 58% 12%, 65% 70%, 72% 40%, 80% 58%, 88% 22%, 94% 68%, 100% 50%, 100% 100%, 0 100%);
      animation: cardPulse 1.6s ease-in-out infinite alternate;
    }
    .genreCard::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 14px;
      width: 56px;
      height: 56px;
      border-radius: var(--shapeRadius, 50%);
      border: 3px solid color-mix(in srgb, var(--cardA, var(--hot)) 72%, white 10%);
      box-shadow: 0 0 24px var(--cardA, var(--hot)), inset 0 0 15px color-mix(in srgb, var(--cardB, var(--hot2)) 30%, transparent);
      transform: rotate(var(--shapeRot, -8deg));
    }
    @keyframes cardPulse { to { transform: translateX(24px) scaleY(1.12); opacity: .7; } }
    .genreCard.active {
      outline: 3px solid color-mix(in srgb, var(--hot3) 68%, white 8%);
      box-shadow: 0 0 0 2px rgba(255,255,255,.2), 0 0 34px color-mix(in srgb, var(--hot) 32%, transparent), inset 0 1px 0 rgba(255,255,255,.22);
    }
    .genreCard strong {
      position: relative;
      z-index: 1;
      display: block;
      width: calc(100% - 62px);
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      line-height: .94;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .genreCard span {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 8px;
      color: rgba(255,255,255,.78);
      font-size: 14px;
      line-height: 1.25;
      max-width: 210px;
    }

    .instrumentPanel {
      min-height: 310px;
      overflow: hidden;
      position: relative;
    }
    .instrumentPanel::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 28px;
      background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--hot) 24%, transparent), transparent 32%), rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
    }
    .instrumentName {
      position: relative;
      z-index: 2;
      margin: 0 0 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--hot3);
    }
    .instrumentDemo {
      position: relative;
      z-index: 2;
      height: 212px;
      border-radius: 25px;
      overflow: hidden;
      background: rgba(0,0,0,.18);
    }

    .miniDrumSet { position: absolute; inset: 0; }
    .miniDrumSet .drum {
      position: absolute;
      bottom: 22px;
      width: 86px;
      height: 48px;
      border-radius: 50% 50% 28% 28%;
      background: linear-gradient(180deg, color-mix(in srgb, var(--hot) 65%, white 8%), color-mix(in srgb, var(--hot2) 64%, black 10%));
      border: 3px solid rgba(255,255,255,.58);
      box-shadow: 0 0 28px var(--hot), inset 0 2px 0 rgba(255,255,255,.38);
    }
    .miniDrumSet .drum.one { left: 13%; }
    .miniDrumSet .drum.two { left: calc(50% - 43px); width: 104px; height: 60px; }
    .miniDrumSet .drum.three { right: 13%; }
    .miniDrumBall {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 96px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 24%, #fff 0 10%, var(--hot3) 11% 34%, var(--hot2) 66%, var(--hot) 100%);
      box-shadow: 0 0 22px var(--hot3), 0 0 48px var(--hot2), 0 0 78px var(--hot);
      animation: demoDrumHop .82s cubic-bezier(.2,.75,.25,1) infinite;
    }
    .miniDrumBall::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 88%;
      width: 92px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid var(--hot);
      transform: translateX(-50%);
      opacity: .62;
      box-shadow: 0 0 20px var(--hot);
      animation: demoDrumRing .82s ease-in-out infinite;
    }
    @keyframes demoDrumHop {
      0%, 100% { transform: translate(-50%, 40px) scale(1.18,.72); }
      48% { transform: translate(-50%, -72px) scale(.86,1.18); }
    }
    @keyframes demoDrumRing {
      0%, 100% { transform: translateX(-50%) scaleX(1.15); opacity: .84; }
      48% { transform: translateX(-50%) scaleX(.58); opacity: .18; }
    }
    .miniPiano { position: absolute; left: 9%; right: 9%; bottom: 30px; height: 76px; display: flex; gap: 4px; }
    .miniPiano i { flex: 1; border-radius: 10px; background: linear-gradient(180deg, #fff, color-mix(in srgb, var(--hot) 20%, #cddcff)); box-shadow: 0 0 16px color-mix(in srgb, var(--hot) 34%, transparent); animation: pianoGlow 1.1s ease-in-out infinite alternate; animation-delay: calc(var(--i) * .09s); }
    @keyframes pianoGlow { to { transform: translateY(-12px); filter: brightness(1.25); } }
    .miniSpeaker { position: absolute; left: 12%; top: 30px; width: 92px; height: 128px; border-radius: 24px; border: 2px solid rgba(255,255,255,.22); background: rgba(255,255,255,.08); box-shadow: 0 0 28px color-mix(in srgb, var(--hot) 35%, transparent); }
    .miniSpeaker::before, .miniSpeaker::after { content:''; position:absolute; border-radius:50%; left:50%; transform:translateX(-50%); background: radial-gradient(circle, #fff 0 8%, var(--hot) 9% 31%, rgba(0,0,0,.35) 32% 50%, transparent 51%); box-shadow: 0 0 22px var(--hot); animation: speakerPulse .52s ease-in-out infinite alternate; }
    .miniSpeaker::before { top: 14px; width: 44px; height: 44px; }
    .miniSpeaker::after { bottom: 14px; width: 60px; height: 60px; }
    @keyframes speakerPulse { to { transform: translateX(-50%) scale(1.12); } }
    .miniStrings { position: absolute; inset: 38px 30px; }
    .miniStrings i { position: absolute; left: 0; right: 0; top: calc(18px * var(--i)); height: 3px; border-radius: 99px; background: linear-gradient(90deg, transparent, var(--hot3), var(--hot), transparent); box-shadow: 0 0 16px var(--hot); animation: stringVibe .52s ease-in-out infinite alternate; animation-delay: calc(var(--i) * .06s); }
    @keyframes stringVibe { to { transform: translateY(4px) scaleX(.94); filter: brightness(1.28); } }

    #keyboardPage { padding: clamp(10px, 1.7vw, 22px); }
    .keyboardShell {
      height: 100%;
      width: min(1120px, 99vw);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(10px, 2vh, 22px);
      align-items: stretch;
    }
    .topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .backButton {
      min-width: 112px;
      min-height: 50px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: #fff;
      border: 2px solid color-mix(in srgb, var(--hot3) 72%, transparent);
    }
    .nowPlaying {
      margin-left: auto;
      min-width: 0;
      max-width: 66vw;
      text-align: right;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .keyboardArea {
      display: grid;
      align-content: end;
      justify-items: center;
      min-height: 0;
    }
    #keyboard {
      position: relative;
      z-index: 30;
      width: min(1020px, 98vw);
      padding: clamp(12px, 1.7vw, 20px);
      border-radius: 30px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--bg1) 70%, black 18%), rgba(0,0,0,.78)),
        radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--hot) 20%, transparent), transparent 30%);
      border: 2px solid color-mix(in srgb, var(--hot) 38%, transparent);
      box-shadow:
        0 0 0 2px rgba(0,0,0,.7),
        0 -10px 56px color-mix(in srgb, var(--hot) 15%, transparent),
        0 32px 84px rgba(0,0,0,.85),
        inset 0 1px 0 rgba(255,255,255,.12);
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: clamp(6px, .95vw, 11px);
      margin-bottom: clamp(7px, .95vw, 12px);
    }
    .kb-row:last-child { margin-bottom: 0; }
    .homeLetters { transform: translateX(3.4%); }
    .bottomLetters { transform: translateX(-.8%); }
    .key {
      position: relative;
      display: grid;
      place-items: center;
      min-width: clamp(44px, 7vw, 74px);
      height: clamp(50px, 7vw, 74px);
      padding: 0 6px;
      border: 0;
      border-radius: 18px;
      color: rgba(248,252,255,.95);
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--hot) 24%, transparent), transparent 48%),
        linear-gradient(155deg, var(--keyTop), var(--keyBottom));
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(22px, 2.7vw, 32px);
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      text-transform: uppercase;

    const genreOrder = ['drums','piano','hiphop','synth','jazz','rock','reggae','strings','lofi','chiptune','ocean','cosmic'];
    const LETTER_THEMES = {
      drums: { cls: 'letterDrums', life: 1650, min: 118, vw: 17, max: 242, jitterX: 12, jitterY: 8 },
      piano: { cls: 'letterPiano', life: 2050, min: 112, vw: 15, max: 220, jitterX: 8, jitterY: 6 },

      reggae: { cls: 'letterReggae', life: 1900, min: 110, vw: 15, max: 216, jitterX: 10, jitterY: 8 },

    let currentGenre = 'drums';
    let randomSpace = true;

    let master = null;
    let pressEnergy = 0;
    let particles = [];

    function setVars(g) {
      const v = GENRES[g].vars;
      root.style.setProperty('--bg0', v[0]);
      root.style.setProperty('--bg1', v[1]);
      root.style.setProperty('--bg2', v[2]);
      root.style.setProperty('--hot', v[3]);
      root.style.setProperty('--hot2', v[4]);
      root.style.setProperty('--hot3', v[5]);
      root.style.setProperty('--hot4', v[6]);
      root.style.setProperty('--glow', hexToRgba(v[3], .66));
      body.dataset.genre = g;
    }

    function hexToRgba(hex, alpha) {
      const n = hex.replace('#','');
      const r = parseInt(n.substring(0,2), 16);
      const g = parseInt(n.substring(2,4), 16);
      const b = parseInt(n.substring(4,6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function buildGenreCards() {
      genreOrder.forEach((key, i) => {
        const g = GENRES[key];
        const btn = document.createElement('button');
        btn.className = 'genreCard';
        btn.dataset.genre = key;
        btn.style.setProperty('--gx', `${20 + (i % 3) * 22}%`);
        btn.style.setProperty('--gy', `${18 + (i % 2) * 14}%`);
        btn.style.setProperty('--shapeRadius', g.shapeRadius);
        btn.style.setProperty('--shapeRot', g.shapeRot);
        btn.style.setProperty('--cardA', g.card[0]);
        btn.style.setProperty('--cardB', g.card[1]);
        btn.innerHTML = `<strong>${g.label}</strong>`;
        btn.addEventListener('click', () => selectGenre(key, true));
        genreGrid.appendChild(btn);
      });
    }

    function selectGenre(key, playPreview) {
      currentGenre = key;
      const g = GENRES[key];
      setVars(key);
      instrumentName.textContent = g.label;
      instrumentHint.textContent = '';
      if (nowPlaying) nowPlaying.textContent = '';
      document.querySelectorAll('.genreCard').forEach(card => card.classList.toggle('active', card.dataset.genre === key));
      renderInstrumentDemo(g.instrument);
      renderStageInstruments(g.instrument);
      renderKeyboardTheme(key);
      if (playPreview) {
        playGenrePreview(key);
        menuPulse();
      }
    }

    function renderInstrumentDemo(type) {
      instrumentDemo.innerHTML = '';
      if (type === 'drums') {
        const set = document.createElement('div');
        set.className = 'miniDrumSet';
        set.innerHTML = '<div class="drum one"></div><div class="drum two"></div><div class="drum three"></div><div class="miniDrumBall"></div>';
        instrumentDemo.appendChild(set);
      } else if (type === 'piano') {
        const p = document.createElement('div');
        p.className = 'miniPiano';
        for (let i = 0; i < 10; i++) {
          const k = document.createElement('i');
          k.style.setProperty('--i', i);
          p.appendChild(k);
        }
        instrumentDemo.appendChild(p);
      } else if (type === 'speakers') {
        const one = document.createElement('div');
        const two = document.createElement('div');
        one.className = two.className = 'miniSpeaker';
        two.style.left = 'auto';
        two.style.right = '12%';
        instrumentDemo.append(one, two);
      } else if (type === 'strings') {
        const s = document.createElement('div');
        s.className = 'miniStrings';
        for (let i = 1; i <= 7; i++) {
          const line = document.createElement('i');
          line.style.setProperty('--i', i);
          s.appendChild(line);
        }
        instrumentDemo.appendChild(s);
      } else if (type === 'disc') {
        const disc = document.createElement('div');
        disc.className = 'stageInstrument glyphDisc';
        disc.style.cssText = 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:150px;height:150px;opacity:.9;animation:none;';
        instrumentDemo.appendChild(disc);
      } else {
        const wave = document.createElement('div');
        wave.className = 'stageInstrument glyphWave';
        wave.style.cssText = 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:260px;height:110px;opacity:.85;animation:driftInstrument 1.5s ease-in-out infinite alternate;';

      }

    function renderStageInstruments(type) {
      instrumentLayer.innerHTML = '';

        type === 'piano' ? ['glyphWave','glyphPad','glyphDisc'] :
        type === 'speakers' ? ['glyphSpeaker','glyphSpeaker','glyphWave','glyphPad'] :
        type === 'strings' ? ['glyphWave','glyphPad','glyphDisc'] : ['glyphDisc','glyphWave','glyphPad','glyphSpeaker'];

        const el = document.createElement('div');
        el.className = `stageInstrument ${types[i % types.length]}`;

    function renderKeyboardTheme(key) {
      if (!themeStage) return;
      themeStage.className = `themeStage ${key}`;

        themeStage.innerHTML = `

            <div class="beatPadRail">${Array.from({length:4},(_,i)=>`<i style="--i:${i}"></i>`).join('')}</div>

      } else if (key === 'rock') {
        themeStage.innerHTML = `<div class="themeVisual themeRock">${Array.from({length:7},(_,i)=>`<i class="rockString" style="--i:${i}"></i>`).join('')}<div class="rockPick"></div></div>`;
      } else if (key === 'reggae') {
        themeStage.innerHTML = `<div class="themeVisual themeReggae"><div class="sunDisc"></div>${Array.from({length:7},(_,i)=>`<i class="skankBar" style="--i:${i}"></i>`).join('')}</div>`;
      } else if (key === 'strings') {
        themeStage.innerHTML = `<div class="themeVisual themeStrings"><div class="bowRibbon"></div>${Array.from({length:7},(_,i)=>`<i class="stringLine" style="--i:${i}"></i>`).join('')}</div>`;
      } else if (key === 'lofi') {
        themeStage.innerHTML = `<div class="themeVisual themeLofi"><div class="vinylDisc"></div><div class="cloud"></div></div>`;
      } else if (key === 'chiptune') {
        themeStage.innerHTML = `<div class="themeVisual themeChip"><div class="pixelGrid">${Array.from({length:48},(_,i)=>`<i style="--i:${i}"></i>`).join('')}</div></div>`;

      } else {
        themeStage.innerHTML = `<div class="themeVisual themeSynth"><i class="laserLine" style="--i:0"></i><i class="laserLine" style="--i:1"></i><div class="synthOrb"></div></div>`;

    function pulseKeyboardTheme(key) {
      if (!themeStage || !keyboardPage.classList.contains('active')) return;
      themeStage.classList.remove('hit');
      void themeStage.offsetWidth;
      themeStage.classList.add('hit');

      const idx = keyIndex(key === 'space' ? 'm' : key);
      const x = 10 + ((idx * 17) % 80);

      if (currentGenre === 'drums') return;

      if (currentGenre === 'piano') {
        const tiles = themeStage.querySelectorAll('.pianoTile');
        const tile = tiles[idx % Math.max(1, tiles.length)];
        if (tile) {
          tile.classList.remove('active');
          void tile.offsetWidth;
          tile.classList.add('active');
          setTimeout(() => tile.classList.remove('active'), 360);
        }
        const blacks = themeStage.querySelectorAll('.pianoBlackRail i');
        if (idx % 4 === 0 && blacks.length) {
          const black = blacks[idx % blacks.length];
          black.classList.remove('active');
          void black.offsetWidth;
          black.classList.add('active');
          setTimeout(() => black.classList.remove('active'), 320);
        }
        createThemePop('pianoFinger', x, 28);
        return;
      }

      if (currentGenre === 'hiphop') {
        const pads = themeStage.querySelectorAll('.beatPadRail i');
        if (pads.length) {
          const pad = pads[idx % pads.length];
          pad.classList.remove('active');
          void pad.offsetWidth;
          pad.classList.add('active');
          setTimeout(() => pad.classList.remove('active'), 340);
        }
        createThemePop('hiphopBlock', x, 32);
        return;
      }

      if (currentGenre === 'synth') {
        const lines = themeStage.querySelectorAll('.laserLine');
        if (lines.length) {
          const line = lines[idx % lines.length];
          line.classList.remove('active');
          void line.offsetWidth;
          line.classList.add('active');
          setTimeout(() => line.classList.remove('active'), 380);
        }
        createThemePop('synthSlice', x, 80);
      } else if (currentGenre === 'jazz') {
        createThemePop('jazzCard', x, 44);
      } else if (currentGenre === 'rock') {
        createThemePop('rockBolt', x, 30);
      } else if (currentGenre === 'reggae') {
        createThemePop('reggaeStripe', x, 52);
      } else if (currentGenre === 'strings') {
        createThemePop('stringRibbon', x, 56);
      } else if (currentGenre === 'lofi') {
        createThemePop('lofiTape', x, 54);
      } else if (currentGenre === 'chiptune') {
        createThemePop('pixelCube', x, 42);
      } else if (currentGenre === 'ocean') {
        createThemePop('oceanSplash', x, 34);
      } else if (currentGenre === 'cosmic') {
        createThemePop('cosmicStar', x, 50);
      }
    }

    function createThemePop(kind, xPercent, yPx) {
      if (!themeStage) return;
      const el = document.createElement('div');
      el.className = `themePop ${kind}`;
      el.style.setProperty('--x', `${xPercent}%`);
      el.style.setProperty('--y', `${yPx}px`);
      themeStage.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', () => {
      if (!resizeQueued) {
        resizeQueued = true;
        requestAnimationFrame(() => { resizeQueued = false; resizeCanvas(); syncLetterStage(); });
      }
    });

    function seedParticles() {
      particles = [];
      for (let i = 0; i < 82; i++) {
        particles.push({
          x: Math.random() * innerWidth,
          y: Math.random() * innerHeight,
          vx: -0.28 + Math.random() * .56,
          vy: -0.18 + Math.random() * .36,
          s: .6 + Math.random() * 2.6,
          a: .12 + Math.random() * .42,
          p: Math.random() * Math.PI * 2
        });
      }
    }

    function drawCanvas(t) {
      const w = innerWidth;
      const h = innerHeight;
      const g = GENRES[currentGenre];
      const time = t * .001;
      ctx.clearRect(0,0,w,h);

      const colors = g.vars;
      drawGlowBands(w, h, colors, time);
      if (g.wave === 'bars') drawBars(w, h, colors, time);
      else if (g.wave === 'spikes' || g.wave === 'jagged') drawSpikeWave(w, h, colors, time, g.wave === 'jagged');
      else if (g.wave === 'bubbles') drawBubbles(w, h, colors, time);
      else drawRibbonWaves(w, h, colors, time, g.wave === 'smooth');
      drawParticles(w, h, colors, time);

      pressEnergy *= .94;
      requestAnimationFrame(drawCanvas);
    }

    function drawGlowBands(w, h, colors, time) {
      const grad = ctx.createRadialGradient(w*.5, h*.5, 0, w*.5, h*.5, Math.max(w,h)*.7);
      grad.addColorStop(0, hexToRgba(colors[3], .08 + pressEnergy*.08));
      grad.addColorStop(.45, hexToRgba(colors[4], .05));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,w,h);
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.strokeStyle = hexToRgba(colors[3 + i], .12);
        ctx.lineWidth = 2 + i;
        const y = h * (.2 + i * .23) + Math.sin(time * .7 + i) * 28;
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(w*.25, y - 80, w*.5, y + 80, w, y - 20);
        ctx.stroke();
      }
    }

    function drawRibbonWaves(w, h, colors, time, smooth) {
      const layers = smooth ? 5 : 7;
      for (let l = 0; l < layers; l++) {
        const yBase = h * (.38 + l * .075);
        const amp = (smooth ? 22 : 36) + l * 8 + pressEnergy * 38;
        const freq = smooth ? .009 + l * .002 : .012 + l * .003;
        ctx.beginPath();
        for (let x = -20; x <= w + 20; x += 8) {
          const y = yBase
            + Math.sin(x * freq + time * (1.2 + l*.12)) * amp
            + Math.sin(x * freq * 2.4 - time * (1.8 + l*.2)) * amp * .38;
          if (x === -20) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        const grad = ctx.createLinearGradient(0,0,w,0);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(.25, hexToRgba(colors[3], .18 + pressEnergy*.12));
        grad.addColorStop(.5, hexToRgba(colors[4], .28));
        grad.addColorStop(.75, hexToRgba(colors[5], .18));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.4 + l * .6;
        ctx.shadowColor = colors[3 + (l % 4)];
        ctx.shadowBlur = 14 + pressEnergy * 22;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawSpikeWave(w, h, colors, time, jagged) {
      const center = h * .48;
      const grad = ctx.createLinearGradient(0,0,w,0);
      grad.addColorStop(0, colors[4]);
      grad.addColorStop(.25, colors[3]);
      grad.addColorStop(.5, colors[5]);
      grad.addColorStop(.75, colors[6]);
      grad.addColorStop(1, colors[3]);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.6;
      ctx.shadowColor = colors[3];
      ctx.shadowBlur = 22 + pressEnergy * 36;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 3) {
        const beat = Math.sin(x * .045 + time * 4) * Math.sin(x * .008 - time * 1.2);
        const spike = Math.abs(Math.sin(x * (jagged ? .12 : .07) + time * 7));
        const amp = (14 + spike * 74 + pressEnergy * 85) * (jagged ? (Math.random()*.12+.95) : 1);
        const y = center + beat * amp;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = hexToRgba(colors[3], .055 + pressEnergy*.04);
      for (let x = 0; x < w; x += 13) {
        const bar = Math.abs(Math.sin(x*.035 + time*2.4)) * (70 + pressEnergy*120);
        ctx.fillRect(x, center - bar/2, 3, bar);
      }
    }

    function drawBars(w, h, colors, time) {
      const center = h * .55;
      const barW = Math.max(4, w / 130);
      for (let x = 0, i = 0; x < w; x += barW * 2, i++) {
        const v = Math.abs(Math.sin(i*.42 + time*3.2)) * Math.abs(Math.cos(i*.19 - time*1.5));
        const height = 18 + v * (h*.28) + pressEnergy * (30 + v*80);
        const grad = ctx.createLinearGradient(x, center-height, x, center+height);
        grad.addColorStop(0, hexToRgba(colors[4], .12));
        grad.addColorStop(.5, colors[3 + (i % 4)]);
        grad.addColorStop(1, hexToRgba(colors[5], .12));
        ctx.fillStyle = grad;
        ctx.shadowColor = colors[3 + (i % 4)];
        ctx.shadowBlur = 12 + pressEnergy * 18;
        ctx.fillRect(x, center - height/2, barW, height);
      }
      ctx.shadowBlur = 0;
    }

    function drawBubbles(w, h, colors, time) {
      drawRibbonWaves(w, h, colors, time, true);
      for (let i = 0; i < 44; i++) {
        const x = ((i * 97 + time * 25) % (w + 100)) - 50;
        const y = h * (.18 + ((i * 47) % 70) / 100) + Math.sin(time + i) * 18;
        const r = 4 + (i % 6) * 2 + pressEnergy * 8;
        ctx.beginPath();
        ctx.strokeStyle = hexToRgba(colors[3 + (i % 4)], .18 + pressEnergy*.2);
        ctx.lineWidth = 1.5;
        ctx.shadowColor = colors[3 + (i % 4)];
        ctx.shadowBlur = 12;
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }

    function drawParticles(w, h, colors, time) {
      for (const p of particles) {
        p.x += p.vx + Math.sin(time + p.p) * .04;
        p.y += p.vy + Math.cos(time * .8 + p.p) * .04;
        if (p.x < -20) p.x = w + 20;
        if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20;
        if (p.y > h + 20) p.y = -20;
        ctx.beginPath();
        ctx.fillStyle = hexToRgba(colors[3 + Math.floor(p.p * 10) % 4], p.a + pressEnergy*.12);
        ctx.shadowColor = colors[3];
        ctx.shadowBlur = 8;
        if (Math.floor(p.p * 10) % 3 === 0) {
          ctx.rect(p.x, p.y, p.s * 3, p.s);
        } else {
          ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
        }
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        master = audioCtx.createGain();
        master.gain.value = .38;
        master.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function envGain(start, attack, decay, peak, end) {
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(peak, .0002), start + attack);
      gain.gain.exponentialRampToValueAtTime(Math.max(end, .0002), start + attack + decay);
      return gain;
    }

    function osc(type, freq, start, dur, peak, dest, bend) {
      const o = audioCtx.createOscillator();
      const g = envGain(start, .012, Math.max(.04, dur - .012), peak, .0001);
      o.type = type;
      o.frequency.setValueAtTime(freq, start);
      if (bend) o.frequency.exponentialRampToValueAtTime(Math.max(24, freq * bend), start + dur);
      o.connect(g);
      g.connect(dest || master);
      o.start(start);
      o.stop(start + dur + .03);
      return o;
    }

    function noiseBurst(start, dur, peak, filterFreq, type) {
      const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(audioCtx.sampleRate * dur)), audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.2);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = type || 'bandpass';
      filter.frequency.value = filterFreq;
      filter.Q.value = .9;
      const g = envGain(start, .008, dur, peak, .0001);
      src.connect(filter);
      filter.connect(g);
      g.connect(master);
      src.start(start);
      src.stop(start + dur + .02);
    }

    function chord(freqs, start, dur, peak, wave) {
      const bus = audioCtx.createGain();
      bus.gain.value = 1;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1700, start);
      filter.frequency.exponentialRampToValueAtTime(620, start + dur);
      bus.connect(filter);
      filter.connect(master);
      freqs.forEach((f, i) => osc(wave || 'triangle', f, start + i*.012, dur, peak / freqs.length, bus, .985));
    }

    function keyIndex(key) {
      const alphabet = 'abcdefghijklmnopqrstuvwxyz0123456789';
      return Math.max(0, alphabet.indexOf(String(key).toLowerCase()));
    }

    function playLetterSound(key, genreKey = currentGenre) {
      ensureAudio();
      const now = audioCtx.currentTime;
      const idx = keyIndex(key);
      const base = 164.81 * Math.pow(2, (idx % 12) / 12);
      switch (genreKey) {
        case 'drums':
          osc('sine', 92 + (idx % 5) * 11, now, .12, .28, master, .52);
          noiseBurst(now + .015, .08, .09, 900 + idx * 35, idx % 2 ? 'highpass' : 'bandpass');
          if (idx % 3 === 0) osc('triangle', 150 + idx * 3, now + .035, .09, .09, master, .78);
          break;
        case 'piano':
          osc('triangle', base * 1.5, now, .24, .17, master, .995);
          osc('sine', base * 3, now + .01, .18, .055, master, .992);
          break;
        case 'hiphop':
          osc('sine', 58 + (idx % 7) * 4, now, .18, .28, master, .62);
          noiseBurst(now + .012, .055, .075, 4800, 'highpass');
          if (idx % 4 === 0) osc('square', base * .75, now + .04, .08, .045, master, .96);
          break;
        case 'synth':
          osc('sawtooth', base, now, .2, .10, master, 1.025);
          osc('triangle', base * 2.01, now + .008, .22, .065, master, .995);
          noiseBurst(now, .05, .025, 3500, 'bandpass');
          break;
        case 'jazz':
          chord([base, base * 1.25, base * 1.5], now, .28, .18, 'triangle');
          break;
        case 'rock':
          osc('sawtooth', base * .74, now, .16, .13, master, .97);
          osc('square', base * 1.01, now, .105, .07, master, .94);
          noiseBurst(now + .015, .04, .055, 1800, 'bandpass');
          break;
        case 'reggae':
          chord([base * .75, base, base * 1.25], now, .18, .14, 'triangle');
          osc('sine', 65 + (idx % 5)*6, now + .04, .14, .12, master, .9);
          break;
        case 'strings':
          osc('sine', base, now, .34, .09, master, 1.01);
          osc('triangle', base * 1.5, now + .018, .32, .08, master, 1.008);
          break;
        case 'lofi':
          osc('triangle', base * .72, now, .28, .12, master, .985);
          osc('sine', base * 1.44, now + .018, .2, .04, master, .98);
          noiseBurst(now, .055, .018, 1200, 'lowpass');
          break;
        case 'chiptune':
          osc('square', base * 1.25, now, .13, .12, master, 1.01);
          osc('triangle', base * 2, now + .018, .12, .055, master, .99);
          if (idx % 4 === 0) noiseBurst(now + .01, .035, .025, 3200, 'highpass');
          break;
        case 'ocean':
          osc('sine', base * 1.5, now, .36, .09, master, 1.008);
          osc('triangle', base * 2.25, now + .025, .32, .055, master, .995);
          noiseBurst(now, .09, .018, 980, 'lowpass');
          break;
        case 'cosmic':
          chord([base * .75, base * 1.12, base * 1.5], now, .46, .18, 'sine');
          osc('sawtooth', base * 2.02, now + .04, .18, .035, master, 1.02);
          break;
      }
    }

    function playSpaceSound() {
      const key = randomSpace ? genreOrder[Math.floor(Math.random() * genreOrder.length)] : currentGenre;
      ensureAudio();
      const now = audioCtx.currentTime;
      if (key === 'drums' || key === 'hiphop') {
        osc('sine', key === 'drums' ? 72 : 52, now, .32, .38, master, .35);
        noiseBurst(now + .025, .16, .13, 720, 'bandpass');
        noiseBurst(now + .12, .09, .08, 5200, 'highpass');
      } else if (key === 'piano' || key === 'jazz') {
        chord([196, 246.94, 293.66, 392], now, .55, .28, 'triangle');
      } else if (key === 'rock') {
        osc('sawtooth', 98, now, .34, .22, master, .55);
        osc('square', 196, now + .02, .22, .10, master, .78);
        noiseBurst(now + .05, .16, .12, 1600, 'bandpass');
      } else if (key === 'reggae') {
        chord([130.81, 164.81, 196], now, .26, .22, 'triangle');
        osc('sine', 55, now + .04, .3, .22, master, .7);
      } else if (key === 'strings') {
        chord([174.61, 220, 261.63, 329.63], now, .68, .26, 'sine');
      } else if (key === 'lofi') {
        chord([146.83, 185, 220, 277.18], now, .62, .22, 'triangle');
        noiseBurst(now, .22, .05, 900, 'lowpass');
      } else if (key === 'chiptune') {
        chord([220, 277.18, 329.63, 440], now, .32, .24, 'square');
        noiseBurst(now + .03, .08, .04, 4200, 'highpass');
      } else if (key === 'ocean') {
        chord([174.61, 261.63, 349.23, 523.25], now, .7, .24, 'sine');
        noiseBurst(now, .24, .05, 740, 'lowpass');
      } else if (key === 'cosmic') {
        chord([196, 246.94, 293.66, 392, 493.88], now, .72, .3, 'sine');
      } else {
        chord([130.81, 196, 261.63, 392], now, .48, .24, 'sawtooth');
        noiseBurst(now + .04, .12, .045, 2800, 'bandpass');
      }
    }

    function playGenrePreview(key) {
      ensureAudio();
      playLetterSound('c', key);
      setTimeout(() => playLetterSound('g', key), 90);
      setTimeout(() => playLetterSound('m', key), 180);
    }

    function menuPulse() {
      pressEnergy = Math.min(1.4, pressEnergy + .45);
      const x = innerWidth * (.25 + Math.random() * .5);
      const y = innerHeight * (.22 + Math.random() * .38);
      createWaveBurst(x, y, 360, 120);
      createRing(x, y, 'var(--hot3)', 32);
    }

    function handleInput(key, sourceEl) {
      if (!key) return;
      ensureAudio();
      const normalized = key === ' ' ? 'space' : key.toLowerCase();
      if (normalized !== 'space' && !/^[a-z]$/.test(normalized)) return;
      const keyEl = sourceEl || document.querySelector(`.key[data-key="${normalized}"]`);
      if (keyEl) flashKey(keyEl);
      pressEnergy = Math.min(1.8, pressEnergy + (normalized === 'space' ? .78 : .36));
      const rect = keyEl ? keyEl.getBoundingClientRect() : { left: innerWidth/2, top: innerHeight/2, width: 0, height: 0 };
      const x = normalized === 'space' ? innerWidth * (.35 + Math.random() * .3) : rect.left + rect.width/2;
      const y = normalized === 'space' ? innerHeight * (.36 + Math.random() * .2) : rect.top + rect.height/2;
      pulseKeyboardTheme(normalized);
      if (normalized === 'space') {
        playSpaceSound();
        createSpaceVisual();
      } else {
        playLetterSound(normalized);
        createLetterVisual(normalized.toUpperCase(), x, y);
      }
    }

    function flashKey(el) {
      el.classList.remove('active');
      void el.offsetWidth;
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 330);
    }

    function syncLetterStage() {
      if (!letterStage) return null;

      const keyboardRect = keyboard ? keyboard.getBoundingClientRect() : null;
      const topBarRect = topBar ? topBar.getBoundingClientRect() : null;
      const safeTop = Math.max(54, (topBarRect ? topBarRect.bottom : 58) + 8);

      // Keep the letter runway close to the keyboard but never over it.
      // This makes each typed letter feel connected to the exact key that was pressed.
      const keyboardTop = keyboardRect ? keyboardRect.top : innerHeight * .70;
      const keyboardGuardGap = Math.max(38, innerHeight * .055);
      const availableHeight = Math.max(110, keyboardTop - safeTop - keyboardGuardGap);
      const targetHeight = Math.min(availableHeight, innerHeight * .44, 460);
      const height = Math.max(110, targetHeight);

      letterStage.style.left = '50%';
      letterStage.style.top = `${safeTop}px`;
      letterStage.style.height = `${height}px`;
      letterStage.style.width = `${Math.min(1080, innerWidth * .96)}px`;
      letterStage.style.zIndex = '2147483000';
      return letterStage.getBoundingClientRect();
    }

    function getLetterStageSpot(centered = false, viewportX) {
      const rect = syncLetterStage() || { left: innerWidth * .02, top: 64, width: innerWidth * .96, height: innerHeight * .34 };
      const theme = LETTER_THEMES[currentGenre] || LETTER_THEMES.synth;
      const rawX = centered || !Number.isFinite(viewportX)
        ? rect.width * .5
        : viewportX - rect.left;
      const guard = centered
        ? Math.min(170, rect.width * .18)
        : Math.min(rect.width * .28, Math.max(158, (theme.max || 220) * .62));
      const jitterX = centered ? 0 : (-theme.jitterX + Math.random() * theme.jitterX * 2);
      const stageX = Math.max(guard, Math.min(rect.width - guard, rawX + jitterX));
      const baseY = centered ? rect.height * .48 : rect.height * (.58 + Math.random() * .10);
      const stageY = Math.max(48, Math.min(rect.height - 34, baseY + (-theme.jitterY + Math.random() * theme.jitterY * 2)));

      return {
        stageX,
        stageY,
        viewportX: rect.left + stageX,
        viewportY: rect.top + stageY,
        rect
      };
    }

    function createFloatingLetter(letter, spot, isSpace = false) {
      if (!letterStage) return;
      const theme = LETTER_THEMES[currentGenre] || LETTER_THEMES.synth;
      const el = document.createElement('div');
      el.className = `floatingLetter ${theme.cls}${isSpace ? ' spaceWord' : ''}`;
      el.textContent = letter;
      el.dataset.letter = letter;
      el.style.setProperty('--x', `${spot.stageX}px`);
      el.style.setProperty('--y', `${spot.stageY}px`);
      el.style.setProperty('--dx', `${-42 + Math.random() * 84}px`);
      el.style.setProperty('--dy', `${-84 - Math.random() * 90}px`);
      el.style.setProperty('--rot', `${-9 + Math.random() * 18}deg`);
      el.style.setProperty('--letterLife', `${theme.life}ms`);
      el.style.setProperty('--size', isSpace ? `clamp(48px, 8vw, ${Math.max(118, Math.floor(theme.max * .62))}px)` : `clamp(${theme.min}px, ${theme.vw}vw, ${theme.max}px)`);
      letterStage.appendChild(el);
      setTimeout(() => { if (el.isConnected) el.remove(); }, theme.life + 260);
    }

    function createLetterVisual(letter, x, y) {
      const spot = getLetterStageSpot(false, x);
      const cx = spot.viewportX;
      const cy = spot.viewportY;
      createFloatingLetter(letter, spot, false);

      const sparkCounts = {
        drums: 4, piano: 3, hiphop: 5, synth: 4, jazz: 3, rock: 5,
        reggae: 3, strings: 3, lofi: 2, chiptune: 7, ocean: 4, cosmic: 5
      };

      if (currentGenre === 'drums') {
        createWaveBurst(cx, cy + 8, 190, 54);
        triggerDrumStageHit();
      } else if (currentGenre === 'piano') {
        createRing(cx, cy + 8, 'rgba(255,255,255,.92)', 18);
      } else if (currentGenre === 'hiphop') {
        createRing(cx - 62, cy + 12, 'var(--hot2)', 16);
        createRing(cx + 62, cy + 12, 'var(--hot3)', 16);
      } else if (currentGenre === 'synth') {
        createWaveBurst(cx, cy, 260, 44);
      } else if (currentGenre === 'jazz') {
        createRing(cx, cy + 6, 'var(--hot3)', 24);
      } else if (currentGenre === 'rock') {
        createWaveBurst(cx, cy + 4, 240, 64);
      } else if (currentGenre === 'reggae') {
        createWaveBurst(cx, cy + 12, 210, 42);
      } else if (currentGenre === 'strings') {
        createWaveBurst(cx, cy + 4, 250, 38);
      } else if (currentGenre === 'lofi') {
        createRing(cx, cy + 4, 'rgba(255,235,185,.72)', 20);
      } else if (currentGenre === 'chiptune') {
        createWaveBurst(cx, cy, 180, 50);
      } else if (currentGenre === 'ocean') {
        createRing(cx, cy + 8, 'var(--hot)', 20);
      } else if (currentGenre === 'cosmic') {
        createRing(cx, cy, 'var(--hot3)', 28);
        createRing(cx, cy, 'var(--hot2)', 15);
      }

      const sparks = sparkCounts[currentGenre] || 3;
      for (let i = 0; i < sparks; i++) createShapeSpark(cx, cy, false);
    }

    function createSpaceVisual() {
      const spot = getLetterStageSpot(true, innerWidth * .5);
      const cx = spot.viewportX;
      const cy = spot.viewportY;
      createFloatingLetter('SPACE', spot, true);
      createWaveBurst(cx, cy, Math.min(680, innerWidth*.72), 118);
      for (let i = 0; i < 2; i++) createRing(cx, cy, i % 2 ? 'var(--hot2)' : 'var(--hot3)', 34 + i*14);
      for (let i = 0; i < 10; i++) createShapeSpark(cx, cy, true);

      if (GENRES[currentGenre].instrument === 'drums') {
        triggerDrumStageHit(0);
        setTimeout(() => triggerDrumStageHit(1), 100);
        setTimeout(() => triggerDrumStageHit(2), 200);
      } else {
        for (let i = 0; i < 2; i++) setTimeout(() => pulseKeyboardTheme(String.fromCharCode(97 + Math.floor(Math.random()*26))), i * 95);
      }
    }

    function createShapeSpark(x, y, big) {
      const el = document.createElement('div');
      el.className = 'shapeSpark';
      const colors = ['var(--hot)', 'var(--hot2)', 'var(--hot3)', 'var(--hot4)', '#ffffff'];
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.style.setProperty('--dx', `${-170 + Math.random()*340}px`);
      el.style.setProperty('--dy', `${-150 + Math.random()*130}px`);
      el.style.setProperty('--s', `${big ? 7 + Math.random()*15 : 5 + Math.random()*10}px`);
      el.style.setProperty('--c', colors[Math.floor(Math.random()*colors.length)]);
      const radiusByTheme = {
        hiphop: '5px', chiptune: '3px', rock: '2px', synth: '2px 12px 2px 12px',
        reggae: '999px', strings: '2px', ocean: '60% 60% 60% 8px', jazz: '50% 12% 50% 12%',
        lofi: '10px', cosmic: '2px'
      };
      el.style.setProperty('--r', radiusByTheme[currentGenre] || '6px');
      if (currentGenre === 'rock') el.style.clipPath = 'polygon(50% 0,62% 38%,100% 38%,68% 60%,80% 100%,50% 75%,20% 100%,32% 60%,0 38%,38% 38%)';
      if (currentGenre === 'strings') {
        el.style.width = `${big ? 34 : 22}px`;
        el.style.height = `${big ? 8 : 5}px`;
      }
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function createWaveBurst(x, y, w, h) {
      const el = document.createElement('div');
      el.className = 'waveBurst';
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.style.setProperty('--w', `${w}px`);
      el.style.setProperty('--h', `${h}px`);
      el.style.setProperty('--dx', `${-30 + Math.random()*60}px`);
      el.style.setProperty('--dy', `${-20 + Math.random()*40}px`);
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function createRing(x, y, color, size) {
      const el = document.createElement('div');
      el.className = 'soundRing';
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.style.setProperty('--ring', color);
      el.style.setProperty('--s', `${size}px`);
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function createNoteDot(x, y, big) {
      const el = document.createElement('div');
      el.className = 'noteDot';
      const colors = ['var(--hot)', 'var(--hot2)', 'var(--hot3)', 'var(--hot4)', '#ffffff'];
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.style.setProperty('--dx', `${-180 + Math.random()*360}px`);
      el.style.setProperty('--dy', `${-170 + Math.random()*140}px`);
      el.style.setProperty('--s', `${big ? 8 + Math.random()*16 : 5 + Math.random()*11}px`);
      el.style.setProperty('--r', Math.random() > .55 ? '4px' : '50%');
      el.style.setProperty('--c', colors[Math.floor(Math.random()*colors.length)]);
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function createDrumHop(x, y) {
      const el = document.createElement('div');
      el.className = 'drumHopFx';
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function triggerDrumStageHit(which) {
      if (!drumStage || GENRES[currentGenre].instrument !== 'drums' || !keyboardPage.classList.contains('active')) return;
      const hitPoints = ['19%', '50%', '81%'];
      const pick = typeof which === 'number' ? which % hitPoints.length : Math.floor(Math.random() * hitPoints.length);
      const impact = document.createElement('div');
      impact.className = 'drumStageImpact';
      impact.style.setProperty('--hitX', hitPoints[pick]);
      impact.style.setProperty('--hitY', pick === 1 ? '68px' : '58px');
      const stick = document.createElement('div');
      stick.className = 'drumHitStick';
      stick.style.setProperty('--hitX', hitPoints[pick]);
      stick.style.setProperty('--hitY', pick === 1 ? '82px' : '72px');
      stick.style.setProperty('--stickRot', pick === 0 ? '-24deg' : pick === 1 ? '0deg' : '24deg');
      drumStage.append(impact, stick);
      impact.addEventListener('animationend', () => impact.remove());
      stick.addEventListener('animationend', () => stick.remove());
    }

    document.getElementById('startKeyboard').addEventListener('click', () => {
      ensureAudio();
      menuPage.classList.remove('active');
      keyboardPage.classList.add('active');
      body.classList.add('keyboardMode');
      renderKeyboardTheme(currentGenre);
      syncLetterStage();
      pulseKeyboardTheme('space');
    });
    document.getElementById('backMenu').addEventListener('click', () => {
      keyboardPage.classList.remove('active');
      menuPage.classList.add('active');
      body.classList.remove('keyboardMode');
      if (letterStage) letterStage.replaceChildren();
      menuPulse();
    });
    spaceToggle.addEventListener('click', () => {
      randomSpace = !randomSpace;
      spaceToggle.textContent = `Random Spacebar Sounds: ${randomSpace ? 'ON' : 'OFF'}`;
      playSpaceSound();
      menuPulse();
    });
    document.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        handleInput(btn.dataset.key, btn);
      });
    });
    window.addEventListener('keydown', e => {
      if (keyboardPage.classList.contains('active')) {
        const k = e.key === ' ' ? 'space' : e.key.toLowerCase();
        if (k === 'space' || /^[a-z]$/.test(k)) {
          e.preventDefault();
          handleInput(k);
        }
      }
    });

    buildGenreCards();
    resizeCanvas();
    syncLetterStage();
    seedParticles();
    selectGenre('drums', false);
    requestAnimationFrame(drawCanvas);
  </script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
