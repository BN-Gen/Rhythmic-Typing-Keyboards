<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bass Guitar Sound Wave Keyboard - FIXED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: white;
    font-family: "Rajdhani", Arial, sans-serif;
  }

  body:focus { outline: none; }

  #focusCatcher {
    position: fixed;
    left: -9999px;
    top: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
  }

  #stage {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 35%, rgba(255, 88, 12, 0.18), transparent 28%),
      radial-gradient(circle at 24% 70%, rgba(0, 224, 255, 0.16), transparent 34%),
      radial-gradient(circle at 78% 72%, rgba(255, 0, 190, 0.15), transparent 36%),
      linear-gradient(180deg, #050505 0%, #000 100%);
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .fretboard {
    position: fixed;
    left: -8vw;
    right: -8vw;
    top: 34vh;
    height: 21vh;
    transform: rotate(-7deg);
    z-index: 2;
    opacity: 0.7;
    pointer-events: none;
    background:
      repeating-linear-gradient(90deg,
        transparent 0 8vw,
        rgba(255, 218, 150, 0.48) 8vw 8.12vw,
        transparent 8.12vw 16vw),
      linear-gradient(180deg,
        transparent 0 12%,
        rgba(255,255,255,0.18) 12% 13%,
        transparent 13% 28%,
        rgba(255,255,255,0.16) 28% 29%,
        transparent 29% 44%,
        rgba(255,255,255,0.15) 44% 45%,
        transparent 45% 60%,
        rgba(255,255,255,0.15) 60% 61%,
        transparent 61% 76%,
        rgba(255,255,255,0.15) 76% 77%,
        transparent 77% 100%),
      linear-gradient(90deg, rgba(45,20,8,0), rgba(105,55,18,0.34), rgba(45,20,8,0));
    box-shadow: 0 0 70px rgba(255, 110, 0, 0.14);
  }

  #popupLayer {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    overflow: hidden;
  }

  .popupLetter {
    position: absolute;
    left: 50%;
    top: 18vh;
    min-width: clamp(96px, 13vw, 170px);
    height: clamp(96px, 13vw, 170px);
    display: grid;
    place-items: center;
    border-radius: 26px;
    font-family: "Orbitron", Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(46px, 8vw, 96px);
    color: white;
    background:
      radial-gradient(circle at 45% 18%, rgba(255,255,255,.36), transparent 33%),
      linear-gradient(145deg, hsl(var(--hue),100%,54%), rgba(15,15,15,.94) 72%);
    border: 2px solid hsla(var(--hue),100%,72%,.92);
    box-shadow:
      0 0 28px hsla(var(--hue),100%,58%,.95),
      0 0 76px hsla(calc(var(--hue) + 42),100%,58%,.52),
      inset 0 2px 0 rgba(255,255,255,.26);
    text-shadow: 0 0 14px rgba(255,255,255,.85);
    transform: translate(-50%, -50%) scale(.4);
    animation: popupOut 780ms cubic-bezier(.12,1.25,.23,1) forwards;
  }

  @keyframes popupOut {
    0% { opacity: 0; transform: translate(-50%, -10%) scale(.35); filter: blur(8px); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); filter: blur(0); }
    45% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -118%) scale(.7); filter: blur(2px); }
  }

  .ripple {
    position: absolute;
    left: 50%;
    top: 42vh;
    border-radius: 50%;
    width: 12px;
    height: 12px;
    transform: translate(-50%, -50%);
    border: 2px solid hsla(var(--hue),100%,63%,.85);
    box-shadow: 0 0 22px hsla(var(--hue),100%,58%,.8);
    animation: rippleOut 850ms ease-out forwards;
  }

  @keyframes rippleOut {
    0% { opacity: .95; width: 12px; height: 12px; }
    100% { opacity: 0; width: 84vw; height: 30vh; }
  }

  #keyboard {
    position: fixed;
    z-index: 30;
    left: 50%;
    bottom: clamp(10px, 2.2vh, 24px);
    transform: translateX(-50%);
    width: min(1130px, 97vw);
    padding: clamp(12px, 1.6vw, 18px);
    border-radius: 24px;
    background:
      linear-gradient(180deg, #151515 0%, #050505 74%, #010101 100%);
    border: 1px solid rgba(255, 187, 86, 0.38);
    box-shadow:
      0 -20px 80px rgba(0,0,0,.92),
      0 0 46px rgba(255, 115, 0, .16),
      0 0 0 2px rgba(255,255,255,.035),
      inset 0 1px 0 rgba(255,255,255,.08);
    overflow: hidden;
  }

  #keyboard::before {
    content: "";
    position: absolute;
    left: 14px;
    right: 14px;
    top: 10px;
    height: 5px;
    border-radius: 99px;
    background: linear-gradient(90deg, transparent, #ff4a18, #ffe36c, #2cff8f, #00eaff, #b63dff, #ff2bd6, transparent);
    filter: blur(.7px);
    opacity: .85;
  }

  #keyboard::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: .18;
    background:
      linear-gradient(180deg, transparent 0 33%, rgba(255,255,255,.22) 33.5% 34.3%, transparent 35% 49%,
      rgba(255,255,255,.18) 49.5% 50.3%, transparent 51% 65%, rgba(255,255,255,.16) 65.5% 66.3%, transparent 67% 100%);
  }

  .row {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: clamp(4px, .58vw, 8px);
    margin-bottom: clamp(5px, .72vw, 9px);
  }

  .row:last-child { margin-bottom: 0; }

  .key {
    height: clamp(42px, 5.5vw, 62px);
    min-width: clamp(32px, 5.4vw, 63px);
    padding: 0 8px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    font-family: "Orbitron", Arial, sans-serif;
    font-size: clamp(12px, 1.5vw, 18px);
    font-weight: 900;
    color: rgba(255, 244, 222, .86);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.12), transparent 38%),
      linear-gradient(145deg, #323232 0%, #090909 66%);
    border: 1px solid rgba(255, 226, 170, .14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.1),
      inset 0 -3px 0 rgba(0,0,0,.75),
      0 8px 18px rgba(0,0,0,.68);
    text-shadow: 0 0 9px rgba(255,180,70,.28);
    transition: transform 70ms ease, box-shadow 70ms ease, background 70ms ease, border-color 70ms ease;
  }

  .key::after {
    content: "";
    position: absolute;
    left: 12%;
    right: 12%;
    bottom: 8px;
    height: 2px;
    border-radius: 99px;
    background: hsl(var(--hue),100%,58%);
    box-shadow: 0 0 13px hsl(var(--hue),100%,58%);
    opacity: .75;
  }

  .key.active {
    transform: translateY(-8px) scale(1.08);
    color: #fff;
    border-color: hsla(var(--hue),100%,76%,.92);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.34), transparent 38%),
      linear-gradient(145deg, hsl(var(--hue),100%,42%) 0%, #080808 68%);
    box-shadow:
      0 0 24px hsla(var(--hue),100%,58%,.95),
      0 0 58px hsla(var(--hue),100%,58%,.36),
      0 14px 24px rgba(0,0,0,.76),
      inset 0 2px 0 rgba(255,255,255,.25);
  }

  .key.active::after { height: 5px; opacity: 1; }

  .wide { min-width: clamp(64px, 8vw, 110px); font-size: clamp(10px, 1.1vw, 14px); }
  .wider { min-width: clamp(84px, 10vw, 135px); font-size: clamp(10px, 1.1vw, 14px); }
  .space { min-width: clamp(220px, 34vw, 430px); font-size: clamp(10px, 1.1vw, 14px); }

  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    opacity: .16;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, transparent 1px 5px);
    mix-blend-mode: screen;
  }

  @media (max-width: 760px) {
    #keyboard { bottom: 8px; padding: 10px 6px; border-radius: 18px; }
    .row { gap: 3px; margin-bottom: 5px; }
    .key { border-radius: 9px; padding: 0 4px; }
    .wide { min-width: 48px; }
    .wider { min-width: 58px; }
    .space { min-width: 160px; }
  }
</style>
</head>

<body tabindex="0">
<input id="focusCatcher" aria-hidden="true" autocomplete="off" />

<div id="stage">
  <canvas id="waveCanvas"></canvas>
</div>
<div class="fretboard"></div>
<div id="popupLayer"></div>
<div class="scanlines"></div>

<section id="keyboard" aria-label="Bass guitar sound wave keyboard">
  <div class="row">
    <div class="key" data-key="backtick" style="--hue:25">`</div>
    <div class="key" data-key="1" style="--hue:345">1</div>
    <div class="key" data-key="2" style="--hue:25">2</div>
    <div class="key" data-key="3" style="--hue:50">3</div>
    <div class="key" data-key="4" style="--hue:130">4</div>
    <div class="key" data-key="5" style="--hue:185">5</div>
    <div class="key" data-key="6" style="--hue:215">6</div>
    <div class="key" data-key="7" style="--hue:270">7</div>
    <div class="key" data-key="8" style="--hue:310">8</div>
    <div class="key" data-key="9" style="--hue:345">9</div>
    <div class="key" data-key="0" style="--hue:25">0</div>
    <div class="key wide" data-key="backspace" style="--hue:310">⌫</div>
  </div>

  <div class="row">
    <div class="key wide" data-key="tab" style="--hue:185">TAB</div>
    <div class="key" data-key="q" style="--hue:345">Q</div>
    <div class="key" data-key="w" style="--hue:25">W</div>
    <div class="key" data-key="e" style="--hue:50">E</div>
    <div class="key" data-key="r" style="--hue:130">R</div>
    <div class="key" data-key="t" style="--hue:185">T</div>
    <div class="key" data-key="y" style="--hue:215">Y</div>
    <div class="key" data-key="u" style="--hue:270">U</div>
    <div class="key" data-key="i" style="--hue:310">I</div>
    <div class="key" data-key="o" style="--hue:345">O</div>
    <div class="key" data-key="p" style="--hue:25">P</div>
    <div class="key wide" data-key="enter" style="--hue:130">↵</div>
  </div>

  <div class="row">
    <div class="key wider" data-key="caps" style="--hue:50">CAPS</div>
    <div class="key" data-key="a" style="--hue:345">A</div>
    <div class="key" data-key="s" style="--hue:25">S</div>
    <div class="key" data-key="d" style="--hue:50">D</div>
    <div class="key" data-key="f" style="--hue:130">F</div>
    <div class="key" data-key="g" style="--hue:185">G</div>
    <div class="key" data-key="h" style="--hue:215">H</div>
    <div class="key" data-key="j" style="--hue:270">J</div>
    <div class="key" data-key="k" style="--hue:310">K</div>
    <div class="key" data-key="l" style="--hue:345">L</div>
    <div class="key" data-key="semicolon" style="--hue:25">;</div>
  </div>

  <div class="row">
    <div class="key wider" data-key="shift-l" style="--hue:270">SHIFT</div>
    <div class="key" data-key="z" style="--hue:345">Z</div>
    <div class="key" data-key="x" style="--hue:25">X</div>
    <div class="key" data-key="c" style="--hue:50">C</div>
    <div class="key" data-key="v" style="--hue:130">V</div>
    <div class="key" data-key="b" style="--hue:185">B</div>
    <div class="key" data-key="n" style="--hue:215">N</div>
    <div class="key" data-key="m" style="--hue:270">M</div>
    <div class="key" data-key="comma" style="--hue:310">,</div>
    <div class="key" data-key="period" style="--hue:345">.</div>
    <div class="key wider" data-key="shift-r" style="--hue:310">SHIFT</div>
  </div>

  <div class="row">
    <div class="key wide" data-key="ctrl-l" style="--hue:215">CTRL</div>
    <div class="key wide" data-key="alt-l" style="--hue:270">ALT</div>
    <div class="key space" data-key="space" style="--hue:25">BASS SPACE</div>
    <div class="key wide" data-key="alt-r" style="--hue:270">ALT</div>
    <div class="key wide" data-key="ctrl-r" style="--hue:215">CTRL</div>
  </div>
</section>

<script>
(function () {
  const canvas = document.getElementById("waveCanvas");
  const ctx = canvas.getContext("2d");
  const popupLayer = document.getElementById("popupLayer");
  const focusCatcher = document.getElementById("focusCatcher");

  const keyEls = {};
  document.querySelectorAll(".key").forEach(function (el) {
    keyEls[el.dataset.key] = el;
    el.addEventListener("pointerdown", function (ev) {
      ev.preventDefault();
      trigger(el.dataset.key, el.textContent.trim(), el);
    });
  });

  let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let energy = 0.12;
  let lastHue = 25;
  let pulses = [];
  let sparks = [];
  let audioCtx = null;

  function refocus() {
    try { focusCatcher.focus({ preventScroll: true }); } catch(e) {}
    try { document.body.focus({ preventScroll: true }); } catch(e) {}
  }

  window.addEventListener("load", refocus);
  window.addEventListener("pointerdown", refocus);
  window.addEventListener("click", refocus);

  function resize() {
    canvas.width = Math.floor(innerWidth * DPR);
    canvas.height = Math.floor(innerHeight * DPR);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  resize();
  window.addEventListener("resize", resize);

  function eventToKey(e) {
    if (e.code === "Space") return "space";
    if (e.code === "Backspace") return "backspace";
    if (e.code === "Enter") return "enter";
    if (e.code === "Tab") return "tab";
    if (e.code === "CapsLock") return "caps";
    if (e.code === "ShiftLeft") return "shift-l";
    if (e.code === "ShiftRight") return "shift-r";
    if (e.code === "ControlLeft") return "ctrl-l";
    if (e.code === "ControlRight") return "ctrl-r";
    if (e.code === "AltLeft") return "alt-l";
    if (e.code === "AltRight") return "alt-r";
    if (e.code === "Backquote") return "backtick";
    if (e.code === "Semicolon") return "semicolon";
    if (e.code === "Comma") return "comma";
    if (e.code === "Period") return "period";
    if (e.key && e.key.length === 1) return e.key.toLowerCase();
    return "";
  }

  function eventLabel(e) {
    if (e.code === "Space") return "SPACE";
    if (e.code === "Backspace") return "⌫";
    if (e.code === "Enter") return "↵";
    if (e.code === "Tab") return "TAB";
    if (e.code === "CapsLock") return "CAPS";
    if (e.code.indexOf("Shift") === 0) return "⇧";
    if (e.code.indexOf("Control") === 0) return "CTRL";
    if (e.code.indexOf("Alt") === 0) return "ALT";
    return (e.key || "").toUpperCase().slice(0, 3);
  }

  function getHue(el) {
    const raw = (el.getAttribute("style") || "").match(/--hue:\s*([0-9.]+)/);
    return raw ? Number(raw[1]) : 25;
  }

  function makeAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playBass(keyName) {
    const ac = makeAudio();
    const now = ac.currentTime;
    const letters = "abcdefghijklmnopqrstuvwxyz";
    const idx = Math.max(0, letters.indexOf((keyName || "a")[0]));
    const base = 43 + (idx % 12) * 3.25;

    const master = ac.createGain();
    master.gain.setValueAtTime(0.001, now);
    master.gain.exponentialRampToValueAtTime(0.62, now + 0.018);
    master.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    master.connect(ac.destination);

    const filter = ac.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(820, now);
    filter.frequency.exponentialRampToValueAtTime(135, now + 0.42);
    filter.Q.value = 4;

    const drive = ac.createWaveShaper();
    const curve = new Float32Array(1024);
    for (let i = 0; i < curve.length; i++) {
      const x = i * 2 / curve.length - 1;
      curve[i] = Math.tanh(x * 2.7);
    }
    drive.curve = curve;

    const sub = ac.createOscillator();
    sub.type = "sine";
    sub.frequency.setValueAtTime(base * 1.7, now);
    sub.frequency.exponentialRampToValueAtTime(base, now + 0.1);

    const string = ac.createOscillator();
    string.type = "sawtooth";
    string.frequency.setValueAtTime(base * 2.02, now);

    sub.connect(drive);
    string.connect(drive);
    drive.connect(filter);
    filter.connect(master);

    sub.start(now);
    string.start(now);
    sub.stop(now + 0.52);
    string.stop(now + 0.46);
  }

  function showPopup(label, hue) {
    const pop = document.createElement("div");
    pop.className = "popupLetter";
    pop.textContent = label || "?";
    pop.style.setProperty("--hue", hue);
    popupLayer.appendChild(pop);
    pop.addEventListener("animationend", function () { pop.remove(); }, { once: true });

    const ripple = document.createElement("div");
    ripple.className = "ripple";
    ripple.style.setProperty("--hue", hue);
    popupLayer.appendChild(ripple);
    ripple.addEventListener("animationend", function () { ripple.remove(); }, { once: true });
  }

  function trigger(keyName, label, el) {
    if (!el) el = keyEls[keyName];
    if (!el) return;

    const hue = getHue(el);
    lastHue = hue;
    energy = Math.min(1.5, energy + 0.38);

    el.classList.add("active");
    window.setTimeout(function () { el.classList.remove("active"); }, 150);

    showPopup(label || el.textContent.trim(), hue);
    playBass(keyName);

    const r = el.getBoundingClientRect();
    pulses.push({ x: r.left + r.width / 2, y: r.top + r.height / 2, hue: hue, life: 1 });

    for (let i = 0; i < 26; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 7;
      sparks.push({
        x: r.left + r.width / 2,
        y: r.top + r.height / 2,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 2,
        hue: hue,
        life: 1,
        rad: 1 + Math.random() * 2.8
      });
    }
  }

  window.addEventListener("keydown", function (e) {
    const keyName = eventToKey(e);
    const el = keyEls[keyName];
    if (!el) return;
    e.preventDefault();
    if (e.repeat) return;
    trigger(keyName, eventLabel(e), el);
  }, true);

  window.addEventListener("keyup", function (e) {
    const keyName = eventToKey(e);
    const el = keyEls[keyName];
    if (el) el.classList.remove("active");
  }, true);

  function drawWave(t, base, amp, hue, offset, width, alpha) {
    ctx.beginPath();
    for (let x = 0; x <= innerWidth; x += 4) {
      let y = base;
      y += Math.sin(x * 0.012 + t * 0.004 + offset) * amp;
      y += Math.sin(x * 0.031 - t * 0.006 + offset * 1.6) * amp * 0.42;
      y += Math.sin(x * 0.075 + t * 0.008) * amp * 0.18;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "hsla(" + hue + ",100%,62%," + alpha + ")";
    ctx.lineWidth = width;
    ctx.shadowColor = "hsla(" + hue + ",100%,56%," + alpha + ")";
    ctx.shadowBlur = 22 + amp * 0.35;
    ctx.stroke();
  }

  function drawEqualizer(t) {
    const bars = 78;
    const start = innerWidth * 0.055;
    const space = innerWidth * 0.89 / bars;
    const base = innerHeight * 0.64;
    const maxH = innerHeight * 0.34;

    for (let i = 0; i < bars; i++) {
      const x = start + i * space;
      const beat = Math.abs(Math.sin(t * 0.003 + i * 0.38));
      const h = (0.08 + beat * beat * 0.62 + energy * 0.52) * maxH;
      const hue = (lastHue + i * 4.6 + t * 0.015) % 360;

      const g = ctx.createLinearGradient(x, base - h, x, base + h * 0.45);
      g.addColorStop(0, "hsla(" + hue + ",100%,65%,.68)");
      g.addColorStop(0.52, "hsla(" + (hue + 34) + ",100%,54%,.22)");
      g.addColorStop(1, "hsla(" + (hue + 60) + ",100%,54%,0)");

      ctx.fillStyle = g;
      ctx.shadowColor = "hsla(" + hue + ",100%,56%,.42)";
      ctx.shadowBlur = 16;
      ctx.fillRect(x, base - h, Math.max(2, space * 0.38), h * 1.45);
    }
  }

  function loop(t) {
    requestAnimationFrame(loop);
    energy *= 0.94;

    ctx.clearRect(0, 0, innerWidth, innerHeight);

    const bg = ctx.createRadialGradient(innerWidth / 2, innerHeight * 0.42, 0, innerWidth / 2, innerHeight * 0.42, innerWidth * 0.75);
    bg.addColorStop(0, "hsla(" + lastHue + ",100%,26%," + (0.12 + energy * 0.18) + ")");
    bg.addColorStop(0.42, "rgba(0,0,0,.15)");
    bg.addColorStop(1, "rgba(0,0,0,.88)");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    drawEqualizer(t);

    const base = innerHeight * 0.42;
    drawWave(t, base, 26 + energy * 72, lastHue, 0, 4.2 + energy * 3.5, 0.94);
    drawWave(t, base + 34, 17 + energy * 42, (lastHue + 55) % 360, 1.3, 2.1 + energy * 2, 0.62);
    drawWave(t, base - 40, 13 + energy * 32, (lastHue + 180) % 360, 2.4, 1.7 + energy * 1.5, 0.46);

    pulses = pulses.filter(function (p) { return p.life > 0.025; });
    pulses.forEach(function (p) {
      p.life *= 0.9;
      const rad = (1 - p.life) * 620;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, rad, rad * 0.28, 0, 0, Math.PI * 2);
      ctx.strokeStyle = "hsla(" + p.hue + ",100%,64%," + (p.life * 0.76) + ")";
      ctx.lineWidth = 3;
      ctx.shadowColor = "hsla(" + p.hue + ",100%,60%," + p.life + ")";
      ctx.shadowBlur = 24;
      ctx.stroke();
    });

    sparks = sparks.filter(function (s) { return s.life > 0.025; });
    sparks.forEach(function (s) {
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.12;
      s.life *= 0.91;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.rad, 0, Math.PI * 2);
      ctx.fillStyle = "hsla(" + s.hue + ",100%,65%," + s.life + ")";
      ctx.shadowColor = "hsla(" + s.hue + ",100%,60%," + s.life + ")";
      ctx.shadowBlur = 14;
      ctx.fill();
    });
  }

  requestAnimationFrame(loop);
})();
</script>
