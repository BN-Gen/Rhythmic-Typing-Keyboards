<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Robot_Factory_keyboard_V5</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg0:#050708; --bg1:#0c161a; --bg2:#172931; --steel:#26343b; --steel2:#11191d;
      --panel:rgba(9,14,17,.88); --panel2:rgba(27,39,46,.78);
      --accent:#5ef7ff; --accent2:#ffb648; --accent3:#9cff6d; --danger:#ff6658;
      --soft:rgba(240,250,255,.78); --keyTop:#33454e; --keyBase:#11191d;
      --glow:rgba(94,247,255,.54); --gearColor:rgba(94,247,255,.5);
      --screenShakeX:0px; --screenShakeY:0px;
    }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#050708; color:white; font-family:"Arial Rounded MT Bold", "Trebuchet MS", system-ui, sans-serif; }
    button, select { font:inherit; color:inherit; }
    button { cursor:pointer; }

    #stage { position:fixed; inset:0; overflow:hidden; z-index:0; background:
      radial-gradient(circle at 16% 18%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 22%),
      radial-gradient(circle at 83% 16%, color-mix(in srgb, var(--accent2) 18%, transparent), transparent 22%),
      radial-gradient(circle at 58% 82%, color-mix(in srgb, var(--accent3) 14%, transparent), transparent 30%),
      linear-gradient(138deg, var(--bg2), var(--bg1) 48%, var(--bg0)); transition:background 450ms ease; transform:translate(var(--screenShakeX), var(--screenShakeY)); }
    #stage::before { content:""; position:absolute; inset:-22%; opacity:.65; background:
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0 / 46px 46px,
      linear-gradient(0deg, rgba(255,255,255,.04) 1px, transparent 1px) 0 0 / 46px 46px,
      repeating-linear-gradient(115deg, transparent 0 72px, rgba(255,255,255,.055) 73px 76px, transparent 77px 148px); animation:gridDrift 20s linear infinite; }
    #stage::after { content:""; position:absolute; inset:0; opacity:.32; pointer-events:none; background:
      linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 24%, transparent), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,.055) 0 1px, transparent 1px 7px); background-size:40vw 100%, auto; animation:idleScanner 3.4s ease-in-out infinite; }
    @keyframes gridDrift { to { transform:translate3d(-46px,46px,0); } }
    @keyframes idleScanner { 0%,100%{background-position:-45vw 0, 0 0;} 50%{background-position:105vw 0, 0 12px;} }

    #factoryDecor, #fxLayer { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    #factoryDecor { z-index:2; } #fxLayer { z-index:36; }
    .ambientGear { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:var(--s); border-radius:50%; opacity:.36; background:repeating-conic-gradient(var(--gearColor) 0 9deg, transparent 9deg 18deg); filter:drop-shadow(0 0 18px var(--accent)); animation:spin var(--dur, 12s) linear infinite; }
    .ambientGear::before { content:""; position:absolute; inset:18%; border-radius:50%; background:var(--bg0); border:3px solid color-mix(in srgb, var(--accent) 52%, transparent); }
    .ambientGear.rev { animation-direction:reverse; }
    .ambientPipe { position:absolute; left:var(--x); top:var(--y); width:var(--w); height:var(--h); transform:rotate(var(--r)); border-radius:999px; opacity:.48; background:linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 55%, transparent), transparent); box-shadow:0 0 18px color-mix(in srgb, var(--accent) 40%, transparent); animation:pipePulse 2.6s ease-in-out infinite alternate; }
    .ambientSteam { position:absolute; left:var(--x); top:var(--y); width:80px; height:120px; opacity:.18; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.7), transparent 62%); filter:blur(14px); animation:steamRise var(--dur, 5s) ease-in-out infinite; }
    .warningLight { position:absolute; left:var(--x); top:var(--y); width:18px; height:18px; border-radius:50%; background:var(--accent2); box-shadow:0 0 20px var(--accent2); animation:blink .8s ease-in-out infinite alternate; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pipePulse { to { opacity:.9; filter:brightness(1.28); } }
    @keyframes steamRise { 0%{transform:translateY(30px) scale(.55); opacity:0;} 35%{opacity:.22;} 100%{transform:translateY(-90px) scale(1.4); opacity:0;} }
    @keyframes blink { to { background:var(--accent3); box-shadow:0 0 28px var(--accent3); } }

    .ambientWire { position:absolute; left:var(--x); top:var(--y); width:var(--w); height:6px; border-radius:999px; background:linear-gradient(90deg, transparent, var(--accent3), white, var(--accent), transparent); box-shadow:0 0 18px var(--accent3); transform:rotate(var(--r)); animation:ambientWirePulse 1.8s ease-in-out infinite alternate; }
    .ambientScan { position:absolute; left:var(--x); top:-10vh; width:9px; height:120vh; background:linear-gradient(180deg, transparent, white, var(--accent), transparent); box-shadow:0 0 28px var(--accent),0 0 70px var(--accent); opacity:.54; animation:ambientScanSweep var(--dur,3s) ease-in-out infinite; }
    .ambientLaser { position:absolute; left:-10vw; top:var(--y); width:120vw; height:4px; border-radius:999px; background:linear-gradient(90deg, transparent, white, var(--accent2), var(--accent), transparent); box-shadow:0 0 24px var(--accent2); transform:rotate(var(--r)); animation:ambientLaserBlink var(--dur,2.2s) ease-in-out infinite; }
    .ambientBox { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:var(--s); border-radius:12px; background:linear-gradient(145deg,var(--accent2),#513018); border:2px solid rgba(255,255,255,.28); box-shadow:0 0 18px var(--accent2); animation:ambientBoxRide var(--dur,5s) linear infinite; }
    .ambientDrone { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:calc(var(--s)*.62); border-radius:18px; background:linear-gradient(145deg,white,var(--accent),var(--accent2)); box-shadow:0 0 24px var(--accent); animation:ambientDroneFloat var(--dur,4s) ease-in-out infinite alternate; }
    .ambientClaw { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:var(--s); animation:ambientClawDrop var(--dur,3s) ease-in-out infinite alternate; }
    .ambientClaw::before { content:""; position:absolute; left:46%; top:-40%; width:8%; height:86%; background:var(--accent); box-shadow:0 0 14px var(--accent); }
    .ambientClaw::after { content:""; position:absolute; left:20%; bottom:5%; width:60%; height:42%; border:9px solid var(--accent2); border-top:0; border-radius:0 0 30px 30px; filter:drop-shadow(0 0 16px var(--accent2)); }
    .ambientPowerRing { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:var(--s); border-radius:50%; border:4px solid var(--accent3); box-shadow:0 0 22px var(--accent3), inset 0 0 18px var(--accent); animation:ambientPowerPulse var(--dur,2.4s) ease-in-out infinite; }
    .ambientMagnet { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:calc(var(--s)*.8); border:12px solid var(--accent2); border-top:0; border-radius:0 0 999px 999px; filter:drop-shadow(0 0 18px var(--accent2)); animation:ambientMagnetPull var(--dur,3.2s) ease-in-out infinite alternate; }
    .ambientPiston { position:absolute; left:var(--x); top:var(--y); width:var(--s); height:calc(var(--s)*1.35); border-radius:999px; background:linear-gradient(180deg,var(--accent),var(--accent3),var(--accent)); box-shadow:0 0 20px var(--accent); animation:ambientPistonPump var(--dur,1.4s) ease-in-out infinite alternate; }
    @keyframes ambientWirePulse { to { opacity:.35; filter:brightness(1.4); } }
    @keyframes ambientScanSweep { 0%{transform:translateX(-10vw);opacity:.14} 45%,65%{opacity:.8} 100%{transform:translateX(115vw);opacity:.14} }
    @keyframes ambientLaserBlink { 0%,100%{opacity:.08} 50%{opacity:.72} }
    @keyframes ambientBoxRide { from{transform:translateX(-22vw) rotate(-5deg)} to{transform:translateX(118vw) rotate(12deg)} }
    @keyframes ambientDroneFloat { to{transform:translate(44px,-24px) rotate(7deg)} }
    @keyframes ambientClawDrop { to{transform:translateY(42px) scale(1.08)} }
    @keyframes ambientPowerPulse { 0%,100%{opacity:.2; transform:scale(.55)} 50%{opacity:.82; transform:scale(1.15)} }
    @keyframes ambientMagnetPull { to{transform:translate(-35px,18px) rotate(-8deg)} }
    @keyframes ambientPistonPump { to{transform:translateY(38px)} }


    .page { position:fixed; inset:0; display:none; z-index:10; overflow:hidden; }
    .page.active { display:block; }

    #homePage { overflow:auto; padding:clamp(10px,2vw,24px); }
    #homePage::-webkit-scrollbar { width:10px; } #homePage::-webkit-scrollbar-thumb { background:color-mix(in srgb, var(--accent) 45%, transparent); border-radius:999px; }
    .homeShell { width:min(1220px,98vw); min-height:100%; margin:0 auto; display:grid; grid-template-columns:minmax(0,1.05fr) minmax(280px,.72fr); gap:clamp(12px,2vw,20px); align-content:center; padding-bottom:18px; }
    .panel { position:relative; overflow:hidden; border:2px solid color-mix(in srgb, var(--accent) 35%, transparent); border-radius:30px; background:linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.035)), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 34px 34px, var(--panel); box-shadow:0 22px 70px rgba(0,0,0,.55), 0 0 44px color-mix(in srgb, var(--accent) 18%, transparent), inset 0 1px 0 rgba(255,255,255,.18); backdrop-filter:blur(14px); }
    .heroPanel { grid-column:1/3; padding:clamp(18px,3vw,34px); }
    .heroPanel::before { content:"BUILD TYPE SPARK GEAR WIRE PANEL ROBOT SCAN BOLT PISTON LASER"; position:absolute; left:-2%; bottom:-18px; font-size:clamp(34px,7vw,84px); font-weight:1000; letter-spacing:.16em; white-space:nowrap; color:rgba(255,255,255,.055); animation:beltText 17s linear infinite; }
    @keyframes beltText { to { transform:translateX(-35%); } }
    .heroInner { position:relative; z-index:2; display:grid; grid-template-columns:minmax(0,1.1fr) minmax(220px,.55fr); gap:20px; align-items:center; }
    .kicker { display:inline-flex; align-items:center; gap:10px; color:var(--accent2); font-weight:1000; letter-spacing:.09em; text-transform:uppercase; }
    .kicker::before { content:""; width:16px; height:16px; border-radius:4px; background:var(--accent2); box-shadow:0 0 18px var(--accent2); animation:blink 1s ease-in-out infinite alternate; }
    h1 { margin:8px 0 10px; font-size:clamp(36px,6vw,76px); line-height:.95; letter-spacing:-.04em; text-shadow:0 0 28px var(--glow), 0 8px 0 rgba(0,0,0,.34); }
    .heroText { max-width:790px; margin:0; color:var(--soft); font-size:clamp(16px,2vw,22px); line-height:1.34; }
    .heroActions, .controlGrid { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    .bigButton, .toggleButton, .toolButton, .themeCard, .backButton, .dashButton { border:0; border-radius:999px; font-weight:1000; transition:transform .14s ease, filter .14s ease, box-shadow .14s ease; }
    .bigButton, .toggleButton, .toolButton { min-height:54px; padding:12px 18px; background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 88%, white 8%), color-mix(in srgb, var(--accent2) 84%, white 8%)); color:#071013; box-shadow:0 12px 28px rgba(0,0,0,.4), 0 0 24px color-mix(in srgb, var(--accent) 36%, transparent), inset 0 2px 0 rgba(255,255,255,.44); }
    .toggleButton.off, .toolButton.muted { background:linear-gradient(135deg,#2b3438,#11181b); color:white; border:2px solid color-mix(in srgb, var(--accent) 35%, transparent); }
    .bigButton:hover, .toggleButton:hover, .toolButton:hover, .themeCard:hover, .backButton:hover, .dashButton:hover { transform:translateY(-3px) scale(1.02); filter:brightness(1.08); }
    .bigButton:active, .toggleButton:active, .toolButton:active, .themeCard:active, .backButton:active, .dashButton:active { transform:translateY(1px) scale(.98); }
    .robotPreview { min-height:224px; border-radius:28px; position:relative; overflow:hidden; background:radial-gradient(circle at 50% 46%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 38%), linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.03)); border:1.5px solid rgba(255,255,255,.16); }
    .robotPreview::before { content:""; position:absolute; left:0; right:0; bottom:18px; height:54px; background:repeating-linear-gradient(90deg, rgba(255,255,255,.2) 0 28px, rgba(0,0,0,.24) 28px 56px); border-top:3px solid color-mix(in srgb, var(--accent) 50%, transparent); animation:conveyorRun 1.2s linear infinite; }
    @keyframes conveyorRun { to { background-position:56px 0; } }
    .previewGear { position:absolute; width:62px; height:62px; border-radius:50%; background:repeating-conic-gradient(var(--accent2) 0 12deg, transparent 12deg 24deg); filter:drop-shadow(0 0 14px var(--accent2)); animation:spin 5s linear infinite; }
    .previewGear.one { left:12%; top:18%; } .previewGear.two { right:12%; top:64%; animation-direction:reverse; }
    .robotHead { position:absolute; left:50%; top:45%; width:min(132px,38vw); height:min(112px,32vw); transform:translate(-50%,-50%); border-radius:24px; background:linear-gradient(145deg,#51636b,#152026 65%); border:4px solid rgba(255,255,255,.22); box-shadow:0 0 34px var(--glow), inset 0 2px 0 rgba(255,255,255,.22), inset 0 -10px 18px rgba(0,0,0,.38); animation:robotBob 1.7s ease-in-out infinite alternate; }
    .robotHead::before { content:""; position:absolute; left:18%; right:18%; top:30%; height:28px; border-radius:999px; background:radial-gradient(circle at 25% 50%, white 0 5px, var(--accent) 6px 10px, transparent 11px), radial-gradient(circle at 75% 50%, white 0 5px, var(--accent2) 6px 10px, transparent 11px), rgba(0,0,0,.45); box-shadow:inset 0 0 16px rgba(0,0,0,.6), 0 0 20px var(--accent); }
    .robotHead::after { content:""; position:absolute; left:32%; right:32%; bottom:22%; height:8px; border-radius:999px; background:linear-gradient(90deg,var(--accent3),var(--accent)); box-shadow:0 0 12px var(--accent3); }
    .antenna { position:absolute; left:50%; top:calc(45% - 84px); width:5px; height:42px; transform:translateX(-50%); background:var(--accent); box-shadow:0 0 14px var(--accent); }
    .antenna::before { content:""; position:absolute; left:50%; top:-14px; width:26px; height:26px; border-radius:50%; transform:translateX(-50%); background:var(--accent2); box-shadow:0 0 22px var(--accent2); }
    @keyframes robotBob { to { transform:translate(-50%,calc(-50% - 12px)) rotate(2deg); } }
    .themeDock { grid-column:1/3; padding:clamp(16px,2.4vw,26px); }
    .controlDock { padding:clamp(16px,2.4vw,26px); align-self:start; }
    .sectionTitle { margin:0 0 8px; font-size:clamp(20px,2.5vw,30px); letter-spacing:-.02em; }
    .hint { margin:0 0 14px; color:var(--soft); line-height:1.35; font-size:clamp(15px,1.8vw,18px); }
    .themeGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; }
    .themeCard { min-height:122px; border-radius:24px; padding:14px; text-align:left; color:white; background:linear-gradient(145deg, color-mix(in srgb, var(--cardA) 30%, rgba(255,255,255,.06)), rgba(0,0,0,.2)), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0 / 18px 18px, rgba(255,255,255,.07); border:2px solid color-mix(in srgb, var(--cardA) 50%, transparent); box-shadow:0 12px 30px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.15); position:relative; overflow:hidden; }
    .themeCard.active { outline:4px solid rgba(255,255,255,.22); box-shadow:0 0 0 2px color-mix(in srgb, var(--cardB) 84%, white 8%), 0 0 34px color-mix(in srgb, var(--cardA) 45%, transparent), inset 0 1px 0 rgba(255,255,255,.22); }
    .themeCard::before { content:""; position:absolute; right:-28px; top:-28px; width:110px; height:110px; border-radius:50%; background:repeating-conic-gradient(var(--cardB) 0 12deg, transparent 12deg 24deg); opacity:.36; animation:spin 7s linear infinite; }
    .themeIcon { width:44px; height:44px; position:relative; color:var(--cardA); filter:drop-shadow(0 0 12px var(--cardA)); margin-bottom:9px; }
    .themeIcon::before, .themeIcon::after { content:""; position:absolute; }
    .themeIcon.gear::before { inset:4%; border-radius:50%; background:repeating-conic-gradient(currentColor 0 10deg, transparent 10deg 20deg); }
    .themeIcon.gear::after { inset:32%; border-radius:50%; background:#050708; border:3px solid var(--cardB); }
    .themeIcon.robot::before { left:15%; top:20%; width:70%; height:62%; border-radius:16px; background:linear-gradient(145deg, white, currentColor 40%, var(--cardB)); }
    .themeIcon.robot::after { left:28%; top:38%; width:44%; height:12%; border-radius:999px; background:radial-gradient(circle at 25% 50%, white 0 10%, transparent 12%), radial-gradient(circle at 75% 50%, white 0 10%, transparent 12%), var(--cardB); }
    .themeIcon.spark::before { inset:8%; background:linear-gradient(135deg, white, var(--cardB), currentColor); clip-path:polygon(50% 0,62% 38%,100% 50%,62% 62%,50% 100%,38% 62%,0 50%,38% 38%); }
    .themeIcon.wire::before { left:5%; top:45%; width:90%; height:16%; border-radius:999px; border:4px solid currentColor; border-top-color:transparent; border-right-color:var(--cardB); transform:rotate(-18deg); }
    .themeIcon.scan::before { inset:12%; border-radius:12px; border:3px solid currentColor; background:linear-gradient(90deg, transparent 0 44%, white 45% 48%, var(--cardB) 49% 54%, transparent 55%); }
    .themeIcon.power::before { inset:6%; border-radius:50%; background:radial-gradient(circle, white 0 9%, var(--cardB) 10% 24%, transparent 25% 38%, currentColor 39% 50%, transparent 51%), repeating-conic-gradient(currentColor 0 12deg, transparent 12deg 24deg); animation:spin 3s linear infinite; }
    .themeIcon.laser::before { left:5%; top:44%; width:90%; height:9%; border-radius:999px; background:linear-gradient(90deg, transparent, white, var(--cardB), currentColor); box-shadow:0 0 16px currentColor; }
    .themeIcon.pipe::before { left:8%; top:42%; width:84%; height:18%; border-radius:999px; background:linear-gradient(90deg,currentColor,var(--cardB),currentColor); }
    .themeIcon.claw::before { left:42%; top:6%; width:16%; height:66%; background:currentColor; border-radius:999px; }
    .themeIcon.claw::after { left:22%; bottom:8%; width:56%; height:34%; border:7px solid var(--cardB); border-top:0; border-radius:0 0 24px 24px; }

    .themeIcon.box::before { inset:13%; border-radius:10px; background:linear-gradient(145deg, white, currentColor 42%, var(--cardB)); box-shadow:inset 0 -8px 12px rgba(0,0,0,.25), 0 0 18px currentColor; }
    .themeIcon.box::after { left:22%; right:22%; top:45%; height:10%; border-radius:999px; background:rgba(0,0,0,.28); }
    .themeIcon.magnet::before { left:17%; top:18%; width:66%; height:64%; border:8px solid currentColor; border-top:0; border-radius:0 0 50% 50%; box-shadow:0 0 18px currentColor; }
    .themeIcon.magnet::after { left:17%; top:12%; width:66%; height:12%; border-radius:999px; background:linear-gradient(90deg,var(--cardB),white,var(--cardB)); box-shadow:0 0 14px var(--cardB); }
    .themeIcon.drone::before { left:18%; top:32%; width:64%; height:38%; border-radius:18px; background:linear-gradient(145deg,white,currentColor,var(--cardB)); box-shadow:0 0 20px currentColor; }
    .themeIcon.drone::after { left:-2%; top:43%; width:104%; height:9px; border-radius:999px; background:linear-gradient(90deg,white,currentColor 18%,transparent 19% 42%,var(--cardB) 43% 58%,transparent 59% 82%,currentColor 83%,white); box-shadow:0 0 14px currentColor; }
    .themeIcon.piston::before { left:42%; top:8%; width:16%; height:80%; border-radius:999px; background:linear-gradient(180deg,currentColor,var(--cardB),currentColor); box-shadow:0 0 18px currentColor; }
    .themeIcon.piston::after { left:18%; top:55%; width:64%; height:18%; border-radius:9px; background:linear-gradient(90deg,var(--cardB),white,currentColor); box-shadow:0 0 15px var(--cardB); }
    .themeIcon.bolt::before { inset:5% 24%; background:linear-gradient(180deg,white,var(--cardB),currentColor); clip-path:polygon(46% 0,82% 0,58% 40%,88% 40%,24% 100%,43% 55%,12% 55%); filter:drop-shadow(0 0 14px currentColor); }

    /* Distinct factory-room menu cards. Each room now has a unique mini machine/preview instead of repeated buttons. */
    .themeCard {
      --machineShade: color-mix(in srgb, var(--cardA) 18%, rgba(0,0,0,.18));
      isolation:isolate;
      min-height:132px;
      border-radius:var(--roomRadius,24px);
      display:grid;
      place-items:center;
      align-content:center;
      gap:4px;
      text-align:center;
      background:
        radial-gradient(circle at var(--hotX,28%) var(--hotY,24%), color-mix(in srgb, var(--cardB) 34%, transparent), transparent 30%),
        linear-gradient(var(--roomAngle,145deg), color-mix(in srgb, var(--cardA) 28%, rgba(255,255,255,.06)), rgba(0,0,0,.22)),
        var(--roomPattern, linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0 / 18px 18px),
        rgba(255,255,255,.07);
    }
    .themeCard::before,
    .themeCard::after { content:""; position:absolute; pointer-events:none; z-index:0; }
    .themeCard::before { inset:auto; right:-24px; top:-24px; width:112px; height:112px; opacity:.42; }
    .themeCard::after { left:10px; right:10px; bottom:10px; height:12px; border-radius:999px; opacity:.72; background:linear-gradient(90deg, transparent, var(--cardA), var(--cardB), transparent); box-shadow:0 0 16px var(--cardA); }
    .themeCard .themeIcon, .themeCard strong { position:relative; z-index:2; }
    .themeCard strong { text-shadow:0 2px 0 rgba(0,0,0,.45), 0 0 12px color-mix(in srgb, var(--cardA) 45%, transparent); }
    .themeCard:hover::after { animation:cardBeam .85s ease-in-out infinite alternate; }
    @keyframes cardBeam { to { transform:scaleX(.72); opacity:1; filter:brightness(1.25); } }

    .themeCard[data-theme="assembly"] { --roomRadius:28px 14px 28px 14px; --roomAngle:135deg; --roomPattern:repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, transparent 1px 18px); }
    .themeCard[data-theme="assembly"]::before { left:13px; top:14px; width:46px; height:46px; border-radius:12px; background:linear-gradient(145deg,white,var(--cardA),var(--cardB)); box-shadow:70px 56px 0 -12px color-mix(in srgb, var(--cardB) 75%, transparent), 0 0 18px var(--cardA); animation:cardBoxDrop 1.8s ease-in-out infinite alternate; }
    @keyframes cardBoxDrop { to { transform:translate(24px,14px) rotate(6deg); } }

    /* QUALITY CHECKLIST FIX
       Future themed keyboards should keep the final keyboard page clean when requested.
       This page now shows only the Back button, the A-Z keyboard, the spacebar, and popup/effect layers. */
    #keyboardPage .keyboardShell {
      grid-template-rows: auto 1fr;
      align-items: end;
      min-height: calc(100dvh - clamp(16px, 2.8vw, 36px));
    }
    #keyboardPage .topBar {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }
    #keyboardPage .statusPanel,
    #keyboardPage .dashButtons,
    #keyboardPage .machineStage {
      display: none !important;
    }
    #keyboardPage #keyboard {
      align-self: end;
      margin-bottom: 0;
    }

    /* CALM BACKGROUND UPDATE
       Removes busy ambient background effects while keeping keyboard popups and key effects. */
    #stage {
      background:
        radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 24%),
        radial-gradient(circle at 82% 18%, color-mix(in srgb, var(--accent2) 7%, transparent), transparent 24%),
        linear-gradient(138deg, color-mix(in srgb, var(--bg2) 70%, black 30%), var(--bg1) 50%, var(--bg0)) !important;
    }
    #stage::before {
      opacity: .16 !important;
      animation: none !important;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 54px 54px,
        linear-gradient(0deg, rgba(255,255,255,.028) 1px, transparent 1px) 0 0 / 54px 54px !important;
      transform: none !important;
    }
    #stage::after {
      display: none !important;
    }
    #factoryDecor {
      display: none !important;
    }
    .heroPanel::before {
      opacity: .18 !important;
      animation: none !important;
    }
    .panel {
      box-shadow: 0 18px 54px rgba(0,0,0,.52), 0 0 18px color-mix(in srgb, var(--accent) 10%, transparent), inset 0 1px 0 rgba(255,255,255,.16) !important;
    }



    /* ROBOT FACTORY KEYBOARD V5
       Distinct subtheme overhaul: each room now gets its own keyboard case, key shape,
       font, popup motion, and single clean signature effect. The old unaligned dot/ball
       markers are removed so the keyboard stays realistic and uncluttered. */
    :root {
      --themeFont: "Arial Black", Impact, system-ui, sans-serif;
      --keyText: #ffffff;
      --keySize: clamp(54px, 7.35vw, 82px);
      --keyHeight: clamp(60px, 7.65vw, 86px);
      --keyFont: clamp(30px, 4.35vw, 52px);
      --keyRadius: 18px;
      --keyBorder: 2px solid rgba(255,255,255,.28);
      --keyBg: linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.04) 34%), linear-gradient(160deg, var(--keyTop), var(--keyBase));
      --keyShadow: inset 0 4px 0 rgba(255,255,255,.18), inset 0 -7px 0 rgba(0,0,0,.45), 0 10px 18px rgba(0,0,0,.55);
      --keyAccentBar: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      --caseRadius: 34px;
      --caseBg: linear-gradient(180deg, color-mix(in srgb, var(--steel) 85%, white 5%), var(--steel2));
      --caseBorder: 4px solid rgba(255,255,255,.20);
      --caseShadow: 0 0 0 2px rgba(0,0,0,.75), 0 28px 90px rgba(0,0,0,.88), inset 0 3px 0 rgba(255,255,255,.18), inset 0 -12px 24px rgba(0,0,0,.42);
      --activeLift: -9px;
    }

    #keyboardPage { background: transparent; }
    #keyboardPage #keyboard {
      width: min(1120px, 98vw) !important;
      padding: clamp(14px, 2vw, 28px) !important;
      border-radius: var(--caseRadius) !important;
      background: var(--caseBg) !important;
      border: var(--caseBorder) !important;
      box-shadow: var(--caseShadow) !important;
      transform-origin: bottom center;
      backdrop-filter: blur(8px);
    }
    #keyboardPage .kb-row { gap: clamp(7px, 1.05vw, 14px) !important; margin-bottom: clamp(8px, 1.1vw, 14px) !important; }
    #keyboardPage .key {
      min-width: var(--keySize) !important;
      height: var(--keyHeight) !important;
      border-radius: var(--keyRadius) !important;
      border: var(--keyBorder) !important;
      background: var(--keyBg) !important;
      box-shadow: var(--keyShadow) !important;
      color: var(--keyText) !important;
      font-family: var(--themeFont) !important;
      font-size: var(--keyFont) !important;
      line-height: 1 !important;
      letter-spacing: .015em !important;
      text-shadow: 0 2px 0 rgba(0,0,0,.8), 0 0 12px color-mix(in srgb, var(--accent) 48%, transparent) !important;
      overflow: hidden;
      isolation: isolate;
      transition: transform 170ms ease, box-shadow 240ms ease, filter 240ms ease, border-color 240ms ease !important;
    }
    #keyboardPage .key::after { display: none !important; }
    #keyboardPage .key::before {
      content: "";
      position: absolute;
      left: 13%; right: 13%; bottom: 8px;
      height: var(--keyBarHeight, 6px);
      border-radius: 999px;
      background: var(--keyAccentBar);
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 62%, transparent);
      opacity: var(--keyBarOpacity, .82);
      z-index: -1;
    }
    #keyboardPage .key[data-key="space"] {
      min-width: min(620px, 76vw) !important;
      font-size: clamp(24px, 3.5vw, 42px) !important;
      letter-spacing: .13em !important;
    }
    #keyboardPage .key.active {
      transform: translateY(var(--activeLift)) scale(1.08) !important;
      border-color: color-mix(in srgb, white 72%, var(--accent) 28%) !important;
      filter: brightness(1.16) contrast(1.08) !important;
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 62%, transparent), 0 0 58px color-mix(in srgb, var(--accent2) 32%, transparent), inset 0 4px 0 rgba(255,255,255,.32), 0 16px 30px rgba(0,0,0,.62) !important;
    }

    /* 01 Assembly Line: brushed steel production keys */
    body[data-theme="assembly"] { --themeFont:"Arial Black", Impact, system-ui, sans-serif; --caseRadius: 32px 32px 22px 22px; --caseBg: linear-gradient(180deg,#4d5b62 0%,#1d282d 46%,#0a0f12 100%), repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 2px, transparent 2px 18px); --keyRadius: 14px; --keyBorder: 2px solid rgba(215,230,235,.42); --keyBg: linear-gradient(145deg,#70818a 0%,#2d3b41 48%,#10171a 100%); --keyAccentBar: repeating-linear-gradient(135deg,#111 0 9px,var(--accent2) 9px 18px); --keyText:#f7fdff; }
    body[data-theme="assembly"] #keyboard { border-bottom: 10px solid #090d0f !important; }
    body[data-theme="assembly"] .key { text-transform: uppercase; }

    /* 02 Gear Workshop: round brass cog keys */
    body[data-theme="gears"] { --themeFont: Georgia, "Times New Roman", serif; --caseRadius: 44px; --caseBg: radial-gradient(circle at 50% 8%, rgba(255,209,102,.26), transparent 30%), linear-gradient(180deg,#3b2d13,#130d05); --keySize: clamp(56px,7.25vw,82px); --keyHeight: clamp(56px,7.25vw,82px); --keyRadius: 50%; --keyBorder: 4px double rgba(255,238,173,.78); --keyBg: radial-gradient(circle at 35% 26%,#fff1b7 0 7%,#d29d27 22%,#5a3508 100%); --keyShadow: inset 0 6px 0 rgba(255,255,255,.2), inset 0 -8px 0 rgba(54,31,5,.75), 0 10px 20px rgba(0,0,0,.65); --keyAccentBar: radial-gradient(circle,var(--accent2),transparent 58%); --keyBarHeight: 10px; --keyBarOpacity:.42; --keyText:#fff9d5; }
    body[data-theme="gears"] .key[data-key="space"] { border-radius: 999px !important; }
    body[data-theme="gears"] .key::before { left: 37%; right:37%; bottom: 9px; }

    /* 03 Welding Sparks: scorched angular heat plates */
    body[data-theme="welding"] { --themeFont: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif; --caseRadius: 16px 46px 16px 46px; --caseBg: linear-gradient(135deg,#210b04,#070403 45%,#381205), repeating-linear-gradient(135deg, rgba(255,157,34,.12) 0 2px, transparent 2px 20px); --keyRadius: 7px 24px 7px 24px; --keyBorder: 2px solid rgba(255,191,89,.55); --keyBg: linear-gradient(135deg,#fff06d 0 4%,#8c3509 6% 46%,#1b0803 100%); --keyAccentBar: linear-gradient(90deg,transparent,#fff,var(--accent2),#ff5a1a,transparent); --keyText:#fff6df; --activeLift:-11px; }
    body[data-theme="welding"] .key { clip-path: polygon(10% 0,100% 0,90% 100%,0 100%); }
    body[data-theme="welding"] .key[data-key="space"] { clip-path: polygon(4% 0,100% 0,96% 100%,0 100%); }

    /* 04 Circuit Lab: flat PCB chip keys */

    .motion-assemblyStamp{animation:keyAssemblyStamp .82s ease}.motion-gearClick{animation:keyGearClick .84s ease}.motion-weldKick{animation:keyWeldKick .78s ease}.motion-circuitBlink{animation:keyCircuitBlink .86s steps(4,end)}.motion-scannerSweep{animation:keyScannerSweep .88s ease}.motion-powerThrob{animation:keyPowerThrob .9s ease}.motion-conveyorRoll{animation:keyConveyorRoll .84s linear}.motion-magnetPull{animation:keyMagnetPull .86s ease}.motion-laserAim{animation:keyLaserAim .78s ease}.motion-steamPress{animation:keySteamPress .92s ease}.motion-droneHover{animation:keyDroneHover .88s ease}.motion-clawGrab{animation:keyClawGrab .86s ease}

    /* Clean non-clutter signature FX. Each room has one unique effect family. */

    .fxCircuitTrace{width:var(--w,220px);height:92px;border:4px solid var(--accent3);border-top:0;border-right:0;filter:drop-shadow(0 0 18px var(--accent3));animation:fxCircuitTrace 1.35s steps(5,end) forwards}.fxCircuitTrace::before{content:"";position:absolute;right:-14px;top:-14px;width:28px;height:28px;background:var(--accent);box-shadow:-92px 78px 0 -5px var(--accent3),0 0 18px var(--accent)}

  <div id="factoryDecor" aria-hidden="true"></div>
  <div id="fxLayer" aria-hidden="true"></div>

  <main id="homePage" class="page active" aria-label="Robot factory keyboard menu">
    <div class="homeShell">
      <section class="panel heroPanel">
        <div class="heroInner">
          <div>
            <div class="kicker">ROBOT FACTORY KEYBOARD V5</div>
            <div class="heroActions">
              <button class="bigButton" id="launchKeyboard">Start Robot Factory</button>
            </div>
          </div>
          <div class="robotPreview" aria-hidden="true">
            <div class="previewGear one"></div><div class="previewGear two"></div><div class="antenna"></div><div class="robotHead"></div>
          </div>
        </div>
      </section>

      <section class="panel themeDock" aria-label="Factory room themes">
        <h2 class="sectionTitle">Factory rooms</h2>
        
        <div class="themeGrid" id="themeGrid"></div>
      </section>
    </div>
  </main>

  <main id="keyboardPage" class="page" aria-label="Robot factory keyboard page">
    <div class="keyboardShell">
      <div class="topBar">
        <button class="backButton" id="backHome">Back</button>
        <div class="statusPanel">
          <div class="statusLine"><strong id="statusTitle">ASSEMBLY LINE READY</strong><span id="statusSub">Press a letter or spacebar to power the machines.</span></div>
        </div>
        <div class="dashButtons" aria-hidden="true"></div>
      </div>

      <section class="machineStage" id="machineStage" aria-label="Robot factory animation area">
        <div class="conveyorBelt"></div>
        <div class="factoryOutput">
          <div class="challengePanel">
            <div class="challengeLabel" id="challengeLabel">FREE BUILD</div>
            <div class="challengeText" id="challengeText">Type any letters</div>
            <div class="slots" id="slots"></div>
          </div>
          <div class="typedLog" id="typedLog">Factory log ready...</div>
        </div>
        <aside class="robotConsole" id="robotConsole" aria-label="Robot helper panel">
          <div class="robotBuddy" id="robotBuddy"></div>
          <div class="robotSpeech" id="robotSpeech">Hello builder. I will cheer when you press the keys.</div>
          <div class="statsGrid">
            <div class="stat"><span>Keys</span><strong id="keyCount">0</strong></div>
            <div class="stat"><span>Combo</span><strong id="comboCount">0</strong></div>
            <div class="stat"><span>Hits</span><strong id="hitCount">0</strong></div>
            <div class="stat"><span>Mode</span><strong id="modeStat">FREE</strong></div>
            <div class="energyBar"><div id="energyFill"></div></div>
          </div>
        </aside>
      </section>

      <section id="keyboard" aria-label="On-screen keyboard">
        <div class="kb-row topLetters">
          <button class="key" data-key="q" data-f="lp">Q</button><button class="key" data-key="w" data-f="lr">W</button><button class="key" data-key="e" data-f="lm">E</button><button class="key" data-key="r" data-f="li">R</button><button class="key" data-key="t" data-f="li">T</button><button class="key" data-key="y" data-f="ri">Y</button><button class="key" data-key="u" data-f="ri">U</button><button class="key" data-key="i" data-f="rm">I</button><button class="key" data-key="o" data-f="rr">O</button><button class="key" data-key="p" data-f="rp">P</button>
        </div>
        <div class="kb-row homeLetters">
          <button class="key" data-key="a" data-f="lp">A</button><button class="key" data-key="s" data-f="lr">S</button><button class="key" data-key="d" data-f="lm">D</button><button class="key" data-key="f" data-f="li">F</button><button class="key" data-key="g" data-f="li">G</button><button class="key" data-key="h" data-f="ri">H</button><button class="key" data-key="j" data-f="ri">J</button><button class="key" data-key="k" data-f="rm">K</button><button class="key" data-key="l" data-f="rr">L</button>
        </div>
        <div class="kb-row bottomLetters">
          <button class="key" data-key="z" data-f="lp">Z</button><button class="key" data-key="x" data-f="lr">X</button><button class="key" data-key="c" data-f="lm">C</button><button class="key" data-key="v" data-f="li">V</button><button class="key" data-key="b" data-f="li">B</button><button class="key" data-key="n" data-f="ri">N</button><button class="key" data-key="m" data-f="rm">M</button>
        </div>
        <div class="kb-row spaceOnlyRow"><button class="key" data-key="space" data-f="">SPACE</button></div>
      </section>
    </div>
  </main>

  <script>
    const root = document.documentElement;
    const body = document.body;
    const homePage = document.getElementById('homePage');
    const keyboardPage = document.getElementById('keyboardPage');
    const factoryDecor = document.getElementById('factoryDecor');
    const fxLayer = document.getElementById('fxLayer');
    const themeGrid = document.getElementById('themeGrid');
    const randomSpaceToggle = document.getElementById('randomSpaceToggle');
    const soundToggle = document.getElementById('soundToggle');
    const helperToggle = document.getElementById('helperToggle');
    const intensityToggle = document.getElementById('intensityToggle');
    const modeSelect = document.getElementById('modeSelect');
    const statusTitle = document.getElementById('statusTitle');
    const statusSub = document.getElementById('statusSub');
    const challengeLabel = document.getElementById('challengeLabel');
    const challengeText = document.getElementById('challengeText');
    const typedLog = document.getElementById('typedLog');
    const slots = document.getElementById('slots');
    const robotBuddy = document.getElementById('robotBuddy');
    const robotSpeech = document.getElementById('robotSpeech');
    const robotConsole = document.getElementById('robotConsole');
    const keyCountEl = document.getElementById('keyCount');
    const comboCountEl = document.getElementById('comboCount');
    const hitCountEl = document.getElementById('hitCount');
    const modeStat = document.getElementById('modeStat');
    const energyFill = document.getElementById('energyFill');
    const keyboard = document.getElementById('keyboard');

    const THEMES = {
      assembly:{label:'Assembly Line',short:'',icon:'robot',vars:['#050708','#10171a','#24333a','#5ef7ff','#ffb648','#9cff6d','#33424a'],cardA:'#5ef7ff',cardB:'#ffb648',effect:'assemblerPlate',effects:['assemblerPlate'],spaceEffects:['assemblerPlate'],sound:'clank',status:'ASSEMBLY LINE READY',ambient:'assembly',motion:'assemblyStamp',burst:'assemblyStamp'},
      gears:{label:'Gear Workshop',short:'',icon:'gear',vars:['#070604','#19140d','#3c2d10','#ffd166','#65eaff','#ff8a4c','#4c3712'],cardA:'#ffd166',cardB:'#65eaff',effect:'cogWave',effects:['cogWave'],spaceEffects:['cogWave'],sound:'gear',status:'GEAR WORKSHOP READY',ambient:'gears',motion:'gearClick',burst:'gearOrbit'},
      welding:{label:'Welding Sparks',short:'',icon:'bolt',vars:['#070403','#221006','#572006','#ff9d22','#5ef7ff','#fff06d','#401505'],cardA:'#ff9d22',cardB:'#fff06d',effect:'weldArc',effects:['weldArc'],spaceEffects:['weldArc'],sound:'spark',status:'WELDING SPARKS READY',ambient:'welding',motion:'weldKick',burst:'weldFlash'},
      circuit:{label:'Circuit Lab',short:'',icon:'wire',vars:['#020609','#061c20','#0f454b','#69ffd9','#9cff6d','#fff06d','#082f35'],cardA:'#69ffd9',cardB:'#9cff6d',effect:'circuitTrace',effects:['circuitTrace'],spaceEffects:['circuitTrace'],sound:'beep',status:'CIRCUIT LAB READY',ambient:'circuit',motion:'circuitBlink',burst:'circuitSnap'},
      scanner:{label:'Scanner Bay',short:'',icon:'scan',vars:['#02050b','#071933','#113a66','#7ee8ff','#9fb4ff','#ffffff','#092848'],cardA:'#7ee8ff',cardB:'#9fb4ff',effect:'scannerFrame',effects:['scannerFrame'],spaceEffects:['scannerFrame'],sound:'scan',status:'SCANNER BAY READY',ambient:'scanner',motion:'scannerSweep',burst:'scannerHold'},
      power:{label:'Power Core',short:'',icon:'power',vars:['#030208','#12051d','#2e0753','#c77dff','#7ee8ff','#ffe66d','#1b0c34'],cardA:'#c77dff',cardB:'#ffe66d',effect:'coreHex',effects:['coreHex'],spaceEffects:['coreHex'],sound:'bass',status:'POWER CORE READY',ambient:'power',motion:'powerThrob',burst:'powerPulse'},
      conveyor:{label:'Conveyor Belt',short:'',icon:'box',vars:['#030706','#0c2420','#154238','#67ffd0','#ffbf4d','#ffffff','#12342f'],cardA:'#67ffd0',cardB:'#ffbf4d',effect:'conveyorSlab',effects:['conveyorSlab'],spaceEffects:['conveyorSlab'],sound:'belt',status:'CONVEYOR BELT READY',ambient:'conveyor',motion:'conveyorRoll',burst:'conveyorSlide'},
      magnet:{label:'Magnet Bay',short:'',icon:'magnet',vars:['#05040a','#141d31','#273f62','#ff6bc8','#7ee8ff','#fff06d','#1b2c4a'],cardA:'#ff6bc8',cardB:'#7ee8ff',effect:'magnetField',effects:['magnetField'],spaceEffects:['magnetField'],sound:'magnet',status:'MAGNET BAY READY',ambient:'magnet',motion:'magnetPull',burst:'magnetPullText'},
      laser:{label:'Laser Alignment',short:'',icon:'laser',vars:['#030509','#08152b','#1b2c55','#7ee8ff','#ff5df0','#fff06d','#101f44'],cardA:'#7ee8ff',cardB:'#ff5df0',effect:'laserSight',effects:['laserSight'],spaceEffects:['laserSight'],sound:'laser',status:'LASER ALIGNMENT READY',ambient:'laser',motion:'laserAim',burst:'laserFocus'},
      steam:{label:'Steam Lab',short:'',icon:'piston',vars:['#050707','#101919','#2b3232','#d8fff8','#8dffba','#ffb648','#2c3636'],cardA:'#d8fff8',cardB:'#8dffba',effect:'steamGauge',effects:['steamGauge'],spaceEffects:['steamGauge'],sound:'steam',status:'STEAM LAB READY',ambient:'steam',motion:'steamPress',burst:'steamRiseText'},
      drone:{label:'Drone Dock',short:'',icon:'drone',vars:['#060411','#18133b','#352365','#b78cff','#5ef7ff','#fff06d','#21184b'],cardA:'#b78cff',cardB:'#5ef7ff',effect:'droneHUD',effects:['droneHUD'],spaceEffects:['droneHUD'],sound:'servo',status:'DRONE DOCK READY',ambient:'drone',motion:'droneHover',burst:'droneHoverText'},
      claw:{label:'Claw Crane',short:'',icon:'claw',vars:['#070504','#211407','#553309','#ffca55','#67ffd0','#ff7058','#3c250a'],cardA:'#ffca55',cardB:'#67ffd0',effect:'clawHook',effects:['clawHook'],spaceEffects:['clawHook'],sound:'claw',status:'CLAW CRANE READY',ambient:'claw',motion:'clawGrab',burst:'clawDropText'}
    };
    const themeOrder = Object.keys(THEMES);
    const motions = ['pop','slide','jump','wiggle','spin','float'];
    const KEY_HOLD_MS = 860;
    const LETTER_HOLD_MS = 1850;
    const SCREEN_ELEMENT_MS = 2150;
    const SCREEN_WORDS = {
      assembly:['BUILD','RIVET','PLATE','ARM','BOLT'],
      gears:['RPM','TORQUE','COG','SYNC','MESH'],
      welding:['WELD','ARC','SPARK','SEAL','HOT'],
      circuit:['CHIP','TRACE','DATA','LINK','CODE'],
      scanner:['SCAN','LOCK','MAP','GRID','READ'],
      power:['CORE','VOLT','BOOST','CHARGE','AMP'],
      conveyor:['MOVE','LOAD','BELT','PACK','ROLL'],
      magnet:['PULL','FIELD','FLUX','METAL','SNAP'],
      laser:['AIM','FOCUS','BEAM','TRACE','CUT'],
      steam:['GAUGE','PRESS','VALVE','PUFF','PIPE'],
      drone:['HOVER','FLY','NAV','DOCK','PING'],
      claw:['GRAB','DROP','CRANE','HOOK','LIFT']
    };
    const words = ['BOT','GEAR','WIRE','BOLT','CHIP','ARM','CODE','LASER','DRONE','STEAM'];
    let currentTheme = 'assembly';
    let randomSpacebarSounds = false;
    let soundEnabled = true;
    let helperEnabled = true;
    let intensityLevel = 1;
    let mode = 'free';
    let audioCtx = null;
    let typed = '';
    let keys = 0, combo = 0, hits = 0, energy = 0;
    let huntTarget = randomLetter();
    let wordIndex = 0, wordPos = 0;
    let demoTimer = null;

    function buildThemeGrid(){
      themeGrid.innerHTML = '';
      themeOrder.forEach(name => {
        const t = THEMES[name];
        const b = document.createElement('button');
        b.className = 'themeCard'; b.dataset.theme = name;
        b.style.setProperty('--cardA', t.cardA); b.style.setProperty('--cardB', t.cardB);
        b.innerHTML = '<div class="themeIcon '+t.icon+'" aria-hidden="true"></div><strong>'+t.label+'</strong>'; 
        b.addEventListener('click', () => { unlockAudio(); applyTheme(name); smallClick(); });
        themeGrid.appendChild(b);
      });
    }
    function applyTheme(name){
      currentTheme = name;
      const t = THEMES[name];
      ['--bg0','--bg1','--bg2','--accent','--accent2','--accent3','--steel'].forEach((v,i)=>root.style.setProperty(v,t.vars[i]));
      root.style.setProperty('--keyTop', blend(t.vars[6], '#ffffff', .14));
      root.style.setProperty('--keyBase', blend(t.vars[1], '#000000', .2));
      root.style.setProperty('--gearColor', hexToRgba(t.cardA,.55));
      body.dataset.theme = name;
      statusTitle.textContent = t.status;
      document.querySelectorAll('.themeCard').forEach(c=>c.classList.toggle('active', c.dataset.theme === name));
      buildAmbientFactory();
    }
    function blend(a,b,m){const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16),br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);return '#'+[Math.round(ar+(br-ar)*m),Math.round(ag+(bg-ag)*m),Math.round(ab+(bb-ab)*m)].map(v=>v.toString(16).padStart(2,'0')).join('');}
    function hexToRgba(hex,a){return 'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a+')';}
    function buildAmbientFactory(){
      factoryDecor.innerHTML = '';
      const modeName = (THEMES[currentTheme] && THEMES[currentTheme].ambient) || 'assembly';
      const small = window.innerWidth < 650;
      const addGears = n => { for(let i=0;i<n;i++) addDecor('ambientGear'+(i%2?' rev':''), {'--s':rnd(70,190)+'px','--x':rnd(0,100)+'vw','--y':rnd(4,86)+'vh','--dur':rnd(6,18)+'s'}); };
      const addPipes = n => { for(let i=0;i<n;i++) addDecor('ambientPipe', {'--x':rnd(0,88)+'vw','--y':rnd(4,88)+'vh','--w':rnd(130,350)+'px','--h':rnd(4,9)+'px','--r':rnd(-32,32)+'deg'}); };
      const addSteam = n => { for(let i=0;i<n;i++) addDecor('ambientSteam', {'--x':rnd(4,92)+'vw','--y':rnd(62,96)+'vh','--dur':rnd(4,8)+'s'}); };
      const addLights = n => { for(let i=0;i<n;i++) addDecor('warningLight', {'--x':rnd(4,94)+'vw','--y':rnd(5,92)+'vh'}); };
      if(modeName === 'assembly'){ addGears(small?3:5); addPipes(4); addLights(6); for(let i=0;i<(small?2:5);i++) addDecor('ambientBox', {'--x':rnd(-20,80)+'vw','--y':rnd(64,88)+'vh','--s':rnd(34,64)+'px','--dur':rnd(5,9)+'s'}); }
      else if(modeName === 'gears'){ addGears(small?7:14); addLights(3); }
      else if(modeName === 'welding'){ addPipes(2); addSteam(5); addLights(9); for(let i=0;i<(small?2:5);i++) addDecor('ambientLaser', {'--y':rnd(12,78)+'vh','--r':rnd(-18,18)+'deg','--dur':rnd(1.6,3.2)+'s'}); }
      else if(modeName === 'circuit'){ addPipes(2); for(let i=0;i<(small?5:12);i++) addDecor('ambientWire', {'--x':rnd(2,90)+'vw','--y':rnd(8,88)+'vh','--w':rnd(110,300)+'px','--r':rnd(-45,45)+'deg'}); }
      else if(modeName === 'scanner'){ addGears(2); for(let i=0;i<(small?2:5);i++) addDecor('ambientScan', {'--x':rnd(0,90)+'vw','--dur':rnd(2.4,4.4)+'s'}); }
      else if(modeName === 'power'){ addGears(3); for(let i=0;i<(small?4:9);i++) addDecor('ambientPowerRing', {'--x':rnd(7,90)+'vw','--y':rnd(8,82)+'vh','--s':rnd(70,190)+'px','--dur':rnd(1.6,3.8)+'s'}); }
      else if(modeName === 'conveyor'){ addPipes(3); for(let i=0;i<(small?4:10);i++) addDecor('ambientBox', {'--x':rnd(-30,85)+'vw','--y':rnd(58,90)+'vh','--s':rnd(34,72)+'px','--dur':rnd(3.8,7.2)+'s'}); }
      else if(modeName === 'magnet'){ addGears(3); for(let i=0;i<(small?2:5);i++) addDecor('ambientMagnet', {'--x':rnd(8,86)+'vw','--y':rnd(12,78)+'vh','--s':rnd(70,130)+'px','--dur':rnd(2.4,4.2)+'s'}); }
      else if(modeName === 'laser'){ for(let i=0;i<(small?4:9);i++) addDecor('ambientLaser', {'--y':rnd(8,88)+'vh','--r':rnd(-28,28)+'deg','--dur':rnd(1.2,2.8)+'s'}); }
      else if(modeName === 'steam'){ addPipes(5); addSteam(small?7:14); for(let i=0;i<(small?2:5);i++) addDecor('ambientPiston', {'--x':rnd(8,90)+'vw','--y':rnd(8,62)+'vh','--s':rnd(34,58)+'px','--dur':rnd(1,2)+'s'}); }
      else if(modeName === 'drone'){ addPipes(2); for(let i=0;i<(small?3:8);i++) addDecor('ambientDrone', {'--x':rnd(4,88)+'vw','--y':rnd(8,72)+'vh','--s':rnd(54,94)+'px','--dur':rnd(2.4,5.2)+'s'}); }
      else if(modeName === 'claw'){ addPipes(2); for(let i=0;i<(small?3:7);i++) addDecor('ambientClaw', {'--x':rnd(8,88)+'vw','--y':rnd(8,70)+'vh','--s':rnd(64,112)+'px','--dur':rnd(2.2,4.2)+'s'}); }
    }
    function addDecor(cls, vars){const e=document.createElement('div'); e.className=cls; Object.entries(vars).forEach(([k,v])=>e.style.setProperty(k,v)); factoryDecor.appendChild(e);}

    function unlockAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
    function playTone(key, special, success=true){
      if(!soundEnabled) return; unlockAudio();
      const t = THEMES[currentTheme]; const now = audioCtx.currentTime;
      const keyCode = key === 'space' ? 33 : key.toUpperCase().charCodeAt(0) - 64;
      let base = 120 + keyCode * 10; let wave = 'sine'; let dur = special ? .45 : .22; let gainMax = special ? .18 : .12;
      if(t.sound === 'gear'){base*=.82; wave='square'} if(t.sound === 'spark'){base*=1.1; wave='triangle'} if(t.sound === 'beep'){base*=1.26; wave='sine'} if(t.sound === 'scan'){base*=.96; wave='sawtooth'} if(t.sound === 'bass'){base*=.62; wave='triangle'; dur=.55} if(t.sound === 'laser'){base*=1.18; wave='square'} if(t.sound === 'steam'){base*=.72; wave='sine'; dur=.34} if(t.sound === 'servo'){base*=1.04; wave='triangle'} if(!success){base*=.55; wave='sawtooth'; gainMax=.08; dur=.18}
      if(special) base *= .55;
      const out = audioCtx.createGain(); out.gain.setValueAtTime(.0001,now); out.gain.exponentialRampToValueAtTime(gainMax, now+.014); out.gain.exponentialRampToValueAtTime(.0001, now+dur); out.connect(audioCtx.destination);
      const filter = audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.setValueAtTime(success?1500:650,now); filter.Q.setValueAtTime(special?1.7:1,now);
      const osc = audioCtx.createOscillator(); osc.type=wave; osc.frequency.setValueAtTime(base,now); osc.frequency.exponentialRampToValueAtTime(success ? base*(special?1.8:1.25) : base*.7, now+(special?.18:.08)); osc.frequency.exponentialRampToValueAtTime(base*.9, now+dur*.86); osc.connect(filter); filter.connect(out); osc.start(now); osc.stop(now+dur+.04);
      const click = audioCtx.createOscillator(); const clickGain = audioCtx.createGain(); click.type='square'; click.frequency.setValueAtTime(special?70:110,now); clickGain.gain.setValueAtTime(special?.09:.045,now); clickGain.gain.exponentialRampToValueAtTime(.0001,now+.055); click.connect(clickGain); clickGain.connect(audioCtx.destination); click.start(now); click.stop(now+.06);
    }
    function smallClick(){ if(audioCtx && soundEnabled) playTone('c',false,true); }

    function normalizeKey(raw){ if(!raw) return null; const k=raw.toLowerCase(); if(k===' '||k==='spacebar'||k==='space') return 'space'; if(/^[a-z]$/.test(k)) return k; return null; }
    function pressKey(raw, button){
      const key = normalizeKey(raw); if(!key) return; unlockAudio();
      const btn = button || document.querySelector('.key[data-key="'+key+'"]'); if(!btn) return;
      let success = evaluateMode(key);
      keys++; if(success){combo++; hits++; energy = Math.min(100, energy + (key === 'space' ? 12 : 7));} else {combo = 0; energy = Math.max(0, energy - 8);}
      if(key === 'space' && randomSpacebarSounds){ const old=currentTheme; currentTheme=randomFrom(themeOrder); playTone(key,true,success); currentTheme=old; } else playTone(key,key==='space',success);
      animateButton(btn);
      const rect = btn.getBoundingClientRect();
      const displayLabel = key === 'space' ? 'SPACE' : key.toUpperCase();
      const burstMotion = (THEMES[currentTheme] && THEMES[currentTheme].burst) || motions[(Date.now()+key.charCodeAt(0))%motions.length];
      createLetterBurst(displayLabel, burstMotion, rect, success);
      createFactoryEffects(rect, key === 'space', success, displayLabel);
      updateLog(key, success); updateStats(); updateRobot(success, key); fitKeyboard();
    }
    function evaluateMode(key){
      if(mode === 'free') return true;
      if(key === 'space') return true;
      if(mode === 'hunt'){
        const ok = key.toUpperCase() === huntTarget;
        if(ok) { huntTarget = randomLetter(); renderChallenge(); }
        return ok;
      }
      if(mode === 'words'){
        const word = words[wordIndex]; const expected = word[wordPos].toLowerCase(); const ok = key === expected;
        if(ok){ wordPos++; if(wordPos >= word.length){ wordIndex = (wordIndex + 1) % words.length; wordPos = 0; setTimeout(()=>celebrateWord(word), 60); } renderChallenge(); }
        return ok;
      }
      return true;
    }
    function updateLog(key, success){
      if(key === 'space') typed += ' ';
      else typed += key.toUpperCase();
      typed = typed.slice(-80);
      if(typedLog) { typedLog.textContent = typed || 'Factory log ready...';
      if(!success) typedLog.textContent += '  [try target key]'; }
    }
    function animateButton(btn){
      const theme = THEMES[currentTheme] || {};
      const m = theme.motion || motions[Math.floor(Math.random()*motions.length)];
      btn.classList.remove('active');
      Array.from(btn.classList).filter(c => c.startsWith('motion-')).forEach(c => btn.classList.remove(c));
      void btn.offsetWidth;
      btn.classList.add('active','motion-'+m);
      setTimeout(()=>btn.classList.remove('active','motion-'+m), KEY_HOLD_MS);
    }
    function createLetterBurst(label, motion, rect, success){
      const p = randomScreenPoint(label === 'SPACE' ? 190 : 104, label === 'SPACE' ? 104 : 88);
      const el = document.createElement('div');
      el.className='letterBurst '+motion;
      if(label === 'SPACE') el.classList.add('spaceBurst');
      el.textContent=label;
      el.style.setProperty('--x',p.x+'px');
      el.style.setProperty('--y',p.y+'px');
      el.style.setProperty('--rot',rnd(-8,8)+'deg');
      if(!success){ el.style.borderColor='var(--danger)'; el.style.textShadow='0 0 18px var(--danger),0 0 38px var(--accent2)'; }
      fxLayer.appendChild(el); setTimeout(()=>el.remove(), LETTER_HOLD_MS + 260);
    }

    function getScreenPopupArea(padX=96, padY=84){
      const topBar = document.querySelector('.topBar');
      const topEdge = topBar ? topBar.getBoundingClientRect().bottom + 22 : 70;
      const kbRect = keyboard ? keyboard.getBoundingClientRect() : null;
      let bottomEdge = window.innerHeight - padY;
      if(kbRect && kbRect.top > topEdge + 150) bottomEdge = kbRect.top - 58;
      const minY = clamp(topEdge, padY, Math.max(padY, window.innerHeight - padY - 60));
      const maxY = Math.max(minY + 36, bottomEdge);
      return {
        xMin: Math.min(padX, window.innerWidth * .5),
        xMax: Math.max(window.innerWidth - padX, window.innerWidth * .5),
        yMin: minY,
        yMax: Math.min(maxY, window.innerHeight - padY)
      };
    }
    function randomScreenPoint(padX=96, padY=84){
      const a = getScreenPopupArea(padX, padY);
      return { x: rnd(a.xMin, a.xMax), y: rnd(a.yMin, a.yMax) };
    }
    function createScreenSignal(label, special=false, success=true){
      const words = SCREEN_WORDS[currentTheme] || ['TYPE'];
      const text = success ? (label === 'SPACE' ? randomFrom(['SPACE','BOOST',randomFrom(words)]) : (Math.random() < .52 ? label : randomFrom(words))) : 'TRY';
      const p = randomScreenPoint(special ? 175 : 112, special ? 98 : 84);
      const el = document.createElement('div');
      el.className = 'screenSignal signal-' + currentTheme + (special ? ' big' : '') + (success ? '' : ' error');
      el.textContent = text;
      el.style.setProperty('--x', p.x + 'px');
      el.style.setProperty('--y', p.y + 'px');
      el.style.setProperty('--rot', rnd(-10,10) + 'deg');
      el.style.setProperty('--driftX', rnd(-32,32) + 'px');
      el.style.setProperty('--driftY', rnd(-62,-24) + 'px');
      el.style.setProperty('--spin', rnd(-18,18) + 'deg');
      fxLayer.appendChild(el);
      setTimeout(()=>el.remove(), SCREEN_ELEMENT_MS);
    }
    function createScreenElement(special=false){
      const p = randomScreenPoint(special ? 150 : 98, special ? 96 : 78);
      const el = document.createElement('div');
      el.className = 'screenElement el-' + currentTheme;
      el.style.setProperty('--x', p.x + 'px');
      el.style.setProperty('--y', p.y + 'px');
      el.style.setProperty('--s', (special ? rnd(118,164) : rnd(74,122)) + 'px');
      el.style.setProperty('--rot', rnd(-18,18) + 'deg');
      el.style.setProperty('--driftX', rnd(-42,42) + 'px');
      el.style.setProperty('--driftY', rnd(-78,-26) + 'px');
      el.style.setProperty('--spin', rnd(-42,42) + 'deg');
      fxLayer.appendChild(el);
      setTimeout(()=>el.remove(), SCREEN_ELEMENT_MS + 120);
    }
    function createScreenThemeShowcase(label, special=false, success=true){
      createScreenSignal(label, special, success);
      if(success) createScreenElement(special);
      const t = THEMES[currentTheme] || THEMES.assembly;
      const main = (t.effects && t.effects[0]) || t.effect || 'assemblerPlate';
      if(success && (special || Math.random() < .58 || intensityLevel > 0)){
        const p = randomScreenPoint(special ? 155 : 98, special ? 98 : 80);
        createNamedEffect(main, p.x, p.y, special);
      }
      if(success && (special || combo % 4 === 0)){
        setTimeout(()=>createScreenElement(false), 130);
        setTimeout(()=>createScreenSignal(randomFrom(SCREEN_WORDS[currentTheme] || ['TYPE']), false, true), 180);
      }
    }
    function effectCount(base){ return intensityLevel === 0 ? Math.max(3, Math.floor(base*.45)) : intensityLevel === 2 ? Math.floor(base*1.8) : base; }
    function createFactoryEffects(rect, special, success, label){
      const x = rect.left+rect.width/2, y=rect.top+rect.height/2;
      const t=THEMES[currentTheme];
      const themeEffects = special ? (t.spaceEffects || t.effects || [t.effect]) : (t.effects || [t.effect]);
      const main = success ? (themeEffects[0] || t.effect) : 'errorStrike';
      createNamedEffect(main,x,y,special);
      createThemeSignature(x,y,special,success);
      createScreenThemeShowcase(label || "TYPE", special, success);
      if(special && success) setTimeout(()=>createNamedEffect(main, x, clamp(y-82,72,window.innerHeight-80), true), 120);
      if(intensityLevel===2 && success){
        setTimeout(()=>createNamedEffect(main, clamp(x+rnd(-160,160),80,window.innerWidth-80), clamp(y+rnd(-105,70),78,window.innerHeight-78), false), 160);
        screenShake(3);
      }
      createFlash(x,y,special,success);
    }
    function createThemeSignature(x,y,special,success){
      if(!success) { createNamedEffect('errorStrike', x, y-18, special); return; }
      const t = THEMES[currentTheme] || THEMES.assembly;
      const main = (t.effects && t.effects[0]) || t.effect || 'assemblerPlate';
      const keyboardTop = Math.max(78, y - 84);
      const centerX = clamp(x, 82, window.innerWidth - 82);
      switch(currentTheme){
        case 'assembly':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'gears':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'welding':
          createNamedEffect(main, centerX, keyboardTop + 10, special);
          break;
        case 'circuit':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'scanner':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'power':
          createNamedEffect(main, centerX, keyboardTop + 4, special);
          break;
        case 'conveyor':
          createNamedEffect(main, centerX, clamp(y + 42, 90, window.innerHeight-75), special);
          break;
        case 'magnet':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'laser':
          createNamedEffect(main, centerX, keyboardTop, special);
          break;
        case 'steam':
          createNamedEffect(main, centerX, keyboardTop + 6, special);
          break;
        case 'drone':
          createNamedEffect(main, centerX, clamp(y - 96, 80, window.innerHeight-84), special);
          break;
        case 'claw':
          createNamedEffect(main, centerX, clamp(y - 92, 80, window.innerHeight-80), special);
          break;
        default:
          createNamedEffect(main, centerX, keyboardTop, special);
      }
    }
    function createSpark(x,y,big,success){
      const s=document.createElement('div'); s.className='sparkDot'; s.style.setProperty('--x',x+'px'); s.style.setProperty('--y',y+'px'); s.style.setProperty('--dx',rnd(-105,105)+'px'); s.style.setProperty('--dy',rnd(big?-155:-90,big?55:34)+'px'); s.style.setProperty('--s',rnd(big?6:4,big?16:11)+'px'); s.style.setProperty('--c', success?randomFrom(['var(--accent)','var(--accent2)','var(--accent3)','var(--danger)']):'var(--danger)'); fxLayer.appendChild(s); setTimeout(()=>s.remove(),650);
    }
    function createNamedEffect(type,x,y,big){
      const map={gear:'fxGear',bolt:'fxBolt',wire:'fxWire',scan:'fxScan',panel:'fxPanel',magnet:'fxMagnet',laser:'fxLaser',piston:'fxPiston',pipe:'fxPiston',drone:'fxDrone',claw:'fxClaw',steam:'fxSteam',box:'fxBox',ring:'fxRing',assemblerPlate:'fxAssemblerPlate',cogWave:'fxCogWave',weldArc:'fxWeldArc',circuitTrace:'fxCircuitTrace',scannerFrame:'fxScannerFrame',coreHex:'fxCoreHex',conveyorSlab:'fxConveyorSlab',magnetField:'fxMagnetField',laserSight:'fxLaserSight',steamGauge:'fxSteamGauge',droneHUD:'fxDroneHUD',clawHook:'fxClawHook',errorStrike:'fxErrorStrike'};
      const e=document.createElement('div'); e.className=map[type]||'fxAssemblerPlate'; e.style.setProperty('--x',x+'px'); e.style.setProperty('--y',y+'px'); e.style.setProperty('--s',(big?128:rnd(76,112))+'px'); e.style.setProperty('--w',rnd(150,big?320:240)+'px'); e.style.setProperty('--h',rnd(130,big?260:190)+'px'); e.style.setProperty('--r',rnd(-38,38)+'deg'); e.style.setProperty('--dx',rnd(-90,90)+'px'); e.style.setProperty('--dy',rnd(-140,-50)+'px'); fxLayer.appendChild(e); setTimeout(()=>e.remove(),1750);
    }
    function createFlash(x,y,big,success){ const f=document.createElement('div'); f.className='screenFlash'; f.style.setProperty('--x',x+'px'); f.style.setProperty('--y',y+'px'); f.style.background = success ? '' : 'radial-gradient(circle at var(--x) var(--y), rgba(255,80,80,.34), transparent 34%)'; f.style.opacity=big?'.9':'.48'; fxLayer.appendChild(f); setTimeout(()=>f.remove(),460); }
    function screenShake(amount){ root.style.setProperty('--screenShakeX', rnd(-amount,amount)+'px'); root.style.setProperty('--screenShakeY', rnd(-amount,amount)+'px'); setTimeout(()=>{root.style.setProperty('--screenShakeX','0px');root.style.setProperty('--screenShakeY','0px');},80); }
    function updateStats(){ if(keyCountEl) keyCountEl.textContent=keys; if(comboCountEl) comboCountEl.textContent=combo; if(hitCountEl) hitCountEl.textContent=hits; if(energyFill) energyFill.style.width=energy+'%'; if(modeStat) if(modeStat) modeStat.textContent=mode.toUpperCase().slice(0,5); }
    function updateRobot(success,key){
      if(!helperEnabled) return;
      if(robotBuddy){ robotBuddy.classList.remove('happy','oops'); void robotBuddy.offsetWidth; robotBuddy.classList.add(success?'happy':'oops'); }
      if(robotSpeech){ robotSpeech.textContent = success ? randomFrom(['Nice build.','Great key press.','Machine power rising.','Gears are happy.','Robot approved.']) : 'Try the target key. You can do it.';
      if(key === 'space') robotSpeech.textContent = 'Spacebar boost activated.'; }
    }
    function renderChallenge(){
      if(slots) slots.innerHTML='';
      if(mode === 'free') { if(challengeLabel) challengeLabel.textContent='FREE BUILD'; if(challengeText) challengeText.textContent='Type any letters'; if(statusSub) statusSub.textContent='Press letters and space to power the machines.'; }
      if(mode === 'hunt') { if(challengeLabel) challengeLabel.textContent='LETTER HUNT'; if(challengeText) challengeText.textContent='Find: '+huntTarget; if(statusSub) statusSub.textContent='Press the target letter the robot asks for.'; }
      if(mode === 'words') { const word=words[wordIndex]; if(challengeLabel) challengeLabel.textContent='ROBOT WORDS'; if(challengeText) challengeText.textContent='Build: '+word; if(statusSub) statusSub.textContent='Type the glowing word one letter at a time.'; if(slots) for(let i=0;i<word.length;i++){ const sl=document.createElement('div'); sl.className='slot'+(i<wordPos?' filled':''); sl.textContent=i<wordPos?word[i]:''; slots.appendChild(sl);} }
      if(modeStat) modeStat.textContent=mode.toUpperCase().slice(0,5);
    }
    function celebrateWord(word){
      if(robotSpeech) robotSpeech.textContent = word + ' built. New robot word loaded.'; screenShake(7);
      const celebrateEffect = (THEMES[currentTheme] && THEMES[currentTheme].effect) || 'assemblerPlate';
      for(let i=0;i<4;i++) setTimeout(()=>createNamedEffect(celebrateEffect, rnd(100,window.innerWidth-100), rnd(100,window.innerHeight*.62), true), i*90);
    }
    function fitKeyboard(){ keyboard.style.transform='scale(1)'; const rect=keyboard.getBoundingClientRect(); if(!rect.width) return; const top=document.querySelector('.topBar').getBoundingClientRect(); const availW=Math.max(260,window.innerWidth-12); const availH=Math.max(170,window.innerHeight-top.bottom-12); const scale=Math.max(.42,Math.min(1,availW/rect.width,availH/rect.height)); keyboard.style.transform='scale('+(Math.floor(scale*1000)/1000)+')'; }
    function randomLetter(){ return 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random()*26)]; }
    function randomFrom(a){ return a[Math.floor(Math.random()*a.length)]; }
    function rnd(min,max){ return min + Math.random()*(max-min); }
    function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
    function clearAll(){ typed=''; keys=0; combo=0; hits=0; energy=0; wordPos=0; if(typedLog) typedLog.textContent='Factory log ready...'; updateStats(); renderChallenge(); if(robotSpeech) robotSpeech.textContent='Factory reset. Ready to build.'; }
    function toggleDemo(){
      const btn=document.getElementById('demoToggle');
      if(demoTimer){ clearInterval(demoTimer); demoTimer=null; if(btn){ btn.textContent='Demo: OFF'; btn.classList.remove('muted'); } return; }
      if(btn){ btn.textContent='Demo: ON'; btn.classList.add('muted'); } demoTimer=setInterval(()=>{ if(!keyboardPage.classList.contains('active')) return; const key = Math.random()<.14 ? 'space' : randomLetter().toLowerCase(); pressKey(key); }, 620);
    }

    document.getElementById('launchKeyboard').addEventListener('click',()=>{ unlockAudio(); homePage.classList.remove('active'); keyboardPage.classList.add('active'); renderChallenge(); setTimeout(fitKeyboard,60); setTimeout(fitKeyboard,250); });
    document.getElementById('backHome').addEventListener('click',()=>{ if(demoTimer) toggleDemo(); keyboardPage.classList.remove('active'); homePage.classList.add('active'); });
    if(randomSpaceToggle) randomSpaceToggle.addEventListener('click',()=>{ unlockAudio(); randomSpacebarSounds=!randomSpacebarSounds; randomSpaceToggle.textContent='Random Spacebar Sounds: '+(randomSpacebarSounds?'ON':'OFF'); randomSpaceToggle.classList.toggle('off',!randomSpacebarSounds); randomSpaceToggle.setAttribute('aria-pressed',String(randomSpacebarSounds)); playTone('space',true,true); });
    if(soundToggle) soundToggle.addEventListener('click',()=>{ soundEnabled=!soundEnabled; soundToggle.textContent='Sound: '+(soundEnabled?'ON':'OFF'); soundToggle.classList.toggle('muted',!soundEnabled); soundToggle.setAttribute('aria-pressed',String(soundEnabled)); if(soundEnabled) smallClick(); });
    if(helperToggle) helperToggle.addEventListener('click',()=>{ helperEnabled=!helperEnabled; helperToggle.textContent='Robot Helper: '+(helperEnabled?'ON':'OFF'); helperToggle.classList.toggle('muted',!helperEnabled); if(robotConsole) robotConsole.style.opacity=helperEnabled?'1':'.34'; helperToggle.setAttribute('aria-pressed',String(helperEnabled)); });
    if(intensityToggle) intensityToggle.addEventListener('click',()=>{ intensityLevel=(intensityLevel+1)%3; intensityToggle.textContent='Effects: '+(['CALM','NORMAL','TURBO'][intensityLevel]); smallClick(); });
    if(modeSelect) modeSelect.addEventListener('change',()=>{ mode=modeSelect.value; combo=0; wordPos=0; huntTarget=randomLetter(); renderChallenge(); updateStats(); smallClick(); });
    const demoToggle = document.getElementById('demoToggle'); if(demoToggle) demoToggle.addEventListener('click',toggleDemo);
    const clearButton = document.getElementById('clearButton'); if(clearButton) clearButton.addEventListener('click',clearAll);
    document.querySelectorAll('.key').forEach(btn=>btn.addEventListener('pointerdown',e=>{ e.preventDefault(); pressKey(btn.dataset.key, btn); }));
    document.addEventListener('keydown',e=>{ const key=normalizeKey(e.key); if(!key) return; e.preventDefault(); pressKey(key); });
    window.addEventListener('resize',()=>{ buildAmbientFactory(); fitKeyboard(); });
    window.addEventListener('orientationchange',()=>setTimeout(fitKeyboard,220));
    setInterval(()=>{
      if(!keyboardPage.classList.contains('active') || document.hidden) return;
      createScreenElement(false);
      if(Math.random() < .42) createScreenSignal(randomFrom(SCREEN_WORDS[currentTheme] || ['TYPE']), false, true);
    }, 3600);

    buildThemeGrid(); applyTheme(currentTheme); renderChallenge(); updateStats(); document.addEventListener('DOMContentLoaded',fitKeyboard);
  </script>
