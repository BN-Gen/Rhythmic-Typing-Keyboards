<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhythmic Typing Keyboard - Expanded Dark Theme Test</title>
<style>
  :root {
    --bg: #050816;
    --panel: rgba(15, 23, 42, 0.72);
    --text: #f8fafc;
    --muted: #cbd5e1;
    --active: #ffffff;
    --target-bg: rgba(255,255,255,0.1);
    --target-border: rgba(255,255,255,0.32);
    --key-border: rgba(255,255,255,0.28);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(59,130,246,0.28), transparent 30%),
      radial-gradient(circle at 80% 20%, rgba(236,72,153,0.24), transparent 32%),
      radial-gradient(circle at 50% 85%, rgba(34,197,94,0.18), transparent 35%),
      var(--bg);
    color: var(--text);
    text-align: center;
    overflow-x: hidden;
  }
  .fx-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .paint-orb {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 999px;
    opacity: 0.18;
    filter: blur(8px);
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { background: #22d3ee; left: -40px; top: 12%; }
  .orb2 { background: #f472b6; right: -70px; top: 18%; animation-delay: -3s; }
  .orb3 { background: #a78bfa; left: 30%; bottom: 4%; animation-delay: -5s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(40px,-35px) scale(1.18); }
  }
  .app {
    position: relative;
    z-index: 2;
    max-width: 1120px;
    margin: 0 auto;
    padding: 22px 14px 36px;
  }
  h1 { margin: 0; font-size: 28px; line-height: 1.15; }
  h2 { margin: 6px 0 16px; font-size: 16px; font-weight: 500; color: var(--muted); }
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  button {
    font-size: 16px;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.13);
    color: white;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.22); }
  .volume-wrap { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
  .pattern-label {
    display: inline-block;
    margin: 4px auto 12px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: #e0f2fe;
    font-size: 15px;
  }
  .stage {
    position: relative;
    z-index: 2;
    min-height: 150px;
    margin: 8px auto 22px;
    padding: 14px 8px 18px;
    border-radius: 22px;
    background: rgba(2, 6, 23, 0.36);
    border: 1px solid rgba(255,255,255,0.08);
    overflow: visible;
  }
  .sequence {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    min-height: 110px;
    flex-wrap: wrap;
    position: relative;
    z-index: 5;
  }
  .target {
    position: relative;
    min-width: 68px;
    padding: 15px 12px;
    border-radius: 16px;
    border: 2px solid var(--target-border);
    background: var(--target-bg);
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 0 14px rgba(255,255,255,0.55);
    box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }
  .target.space-target { min-width: 132px; font-size: 25px; }
  .target.active {
    border-color: var(--active);
    box-shadow: 0 0 0 5px rgba(255,255,255,0.18), 0 0 30px rgba(125,211,252,0.45);
    transform: translateY(-5px) scale(1.08);
  }
  .target.cleared { visibility: hidden; }
  .target.burst { animation: bigBurst 620ms ease forwards; z-index: 20; }
  .target.flyUp { animation: bigFlyUp 680ms ease forwards; z-index: 20; }
  .target.spinPop { animation: bigSpinPop 660ms ease forwards; z-index: 20; }
  .target.sparkleFade { animation: sparkleFade 680ms ease forwards; z-index: 20; }
  .target.dropAway { animation: dropAway 620ms ease forwards; z-index: 20; }
  @keyframes bigBurst {
    0% { transform: scale(1); opacity: 1; filter: brightness(1); }
    38% { transform: scale(2.35); opacity: 1; filter: brightness(1.7); }
    100% { transform: scale(3.15); opacity: 0; filter: blur(5px); }
  }
  @keyframes bigFlyUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    45% { transform: translateY(-62px) scale(1.85); opacity: .95; }
    100% { transform: translateY(-145px) scale(2.6); opacity: 0; }
  }
  @keyframes bigSpinPop {
    0% { transform: rotate(0deg) scale(1); opacity: 1; }
    42% { transform: rotate(22deg) scale(2.15); opacity: 1; }
    100% { transform: rotate(-28deg) scale(3); opacity: 0; }
  }
  @keyframes sparkleFade {
    0% { transform: scale(1); opacity: 1; text-shadow: 0 0 8px #fff; }
    45% { transform: scale(2.1); opacity: .95; text-shadow: 0 0 24px #f0abfc, 0 0 44px #67e8f9; }
    100% { transform: translateY(-45px) scale(2.8); opacity: 0; text-shadow: 0 0 50px #f0abfc; }
  }
  @keyframes dropAway {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    35% { transform: translateY(-25px) scale(1.8); opacity: 1; }
    100% { transform: translateY(105px) scale(2.6); opacity: 0; }
  }
  .keyboard-wrap {
    position: relative;
    z-index: 10;
    padding: 14px 8px;
    border-radius: 24px;
    background: rgba(2, 6, 23, 0.74);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 12px 38px rgba(0,0,0,0.35);
  }
  .keyboard { display: flex; flex-direction: column; gap: 10px; align-items: center; user-select: none; }
  .row { display: flex; gap: 8px; justify-content: center; }
  .key {
    width: 64px;
    height: 58px;
    border-radius: 14px;
    border: 2px solid var(--key-border);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    font-weight: 800;
    color: #07111f;
    box-shadow: 0 4px 0 rgba(0,0,0,0.38);
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 90ms ease, box-shadow 90ms ease, filter 90ms ease;
  }
  .key:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.38); }
  .key.glow { filter: brightness(1.28); box-shadow: 0 0 0 5px rgba(255,255,255,0.25), 0 0 26px rgba(255,255,255,0.48); }
  .spacebar { width: 360px; max-width: 80vw; font-size: 22px; }
  .left-pinky { background: #fb7185; }
  .left-ring { background: #fb923c; }
  .left-middle { background: #facc15; }
  .left-index { background: #4ade80; }
  .right-index { background: #38bdf8; }
  .right-middle { background: #a78bfa; }
  .right-ring { background: #e879f9; }
  .right-pinky { background: #f472b6; }
  .thumbs { background: #22d3ee; }
  .note { margin-top: 16px; font-size: 13px; color: var(--muted); }
  @media (max-width: 760px) {
    .app { padding: 16px 6px 24px; }
    h1 { font-size: 22px; }
    h2 { font-size: 14px; }
    .pattern-label { font-size: 13px; }
    .stage { min-height: 136px; }
    .sequence { gap: 6px; min-height: 96px; }
    .target { min-width: 38px; font-size: 22px; padding: 12px 7px; border-radius: 12px; }
    .target.space-target { min-width: 76px; font-size: 15px; }
    .keyboard-wrap { padding: 10px 4px; }
    .row { gap: 4px; }
    .key { width: 34px; height: 44px; font-size: 17px; border-radius: 9px; }
    .spacebar { width: 260px; font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="fx-layer" aria-hidden="true">
    <div class="paint-orb orb1"></div>
    <div class="paint-orb orb2"></div>
    <div class="paint-orb orb3"></div>
  </div>
  <div class="app">
    <h1>Rhythmic Typing Keyboard</h1>
    <h2>Expanded 8-Beat Pattern Testing</h2>
    <div class="controls">
      <button id="startButton">Start</button>
      <button id="muteButton">Mute</button>
      <div class="volume-wrap">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </div>
    <div id="patternLabel" class="pattern-label"></div>
    <div class="stage">
      <div id="sequence" class="sequence"></div>
    </div>
    <div class="keyboard-wrap">
      <div id="keyboard" class="keyboard"></div>
    </div>
    <div class="note">Testing version: physical keyboard plus touch/click. Each 8-beat set keeps its own sound and visual effect mapping, then changes on the next set.</div>
  </div>
<script>
const PATTERNS = [
  { name: "Left Index Home and Reach: F G", sequence: ["F", "G", "F", "G", "F", "G", "F", "SPACE"] },
  { name: "Left Index Upper Reach: R T", sequence: ["R", "T", "R", "T", "R", "T", "R", "SPACE"] },
  { name: "Left Index Lower Reach: V B", sequence: ["V", "B", "V", "B", "V", "B", "V", "SPACE"] },
  { name: "Left Index Mixed: F R G T", sequence: ["F", "R", "G", "T", "F", "G", "R", "SPACE"] },
  { name: "Left Index Mixed: F V G B", sequence: ["F", "V", "G", "B", "F", "G", "V", "SPACE"] }
];
const REPEATS_PER_PATTERN = 3;
const SOUND_SETS = [
  {
    F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/KICK1.mp3",
    G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/SNARE2.mp3",
    R: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/KICK1.mp3",
    T: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/SNARE2.mp3",
    V: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/KICK1.mp3",
    B: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/SNARE2.mp3",
    SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Splash%2012%203.mp3"
  },
  {
    F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Electro%20kick%2001.mp3",
    G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/FM%20snare.mp3",
    R: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Electro%20kick%2001.mp3",
    T: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/FM%20snare.mp3",
    V: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Electro%20kick%2001.mp3",
    B: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/FM%20snare.mp3",
    SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Chime%20percussion_BLASTWAVEFX_30615.mp3"
  },
  {
    F: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Fuzz%20Kick.mp3",
    G: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Smack%20Snare.mp3",
    R: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Fuzz%20Kick.mp3",
    T: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Smack%20Snare.mp3",
    V: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Fuzz%20Kick.mp3",
    B: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Smack%20Snare.mp3",
    SPACE: "https://pub-ced567e853f84a85b4139a379f79898b.r2.dev/Drum%20sounds/Maxi%20clap.mp3"
  }
];
const EFFECTS = ["burst", "flyUp", "spinPop", "sparkleFade", "dropAway"];
const FINGER_GROUPS = {
  Q: "left-pinky", A: "left-pinky", Z: "left-pinky",
  W: "left-ring", S: "left-ring", X: "left-ring",
  E: "left-middle", D: "left-middle", C: "left-middle",
  R: "left-index", F: "left-index", T: "left-index", G: "left-index", V: "left-index", B: "left-index",
  Y: "right-index", H: "right-index", U: "right-index", J: "right-index", N: "right-index", M: "right-index",
  I: "right-middle", K: "right-middle",
  O: "right-ring", L: "right-ring",
  P: "right-pinky",
  SPACE: "thumbs"
};
const KEY_ROWS = [
  ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
  ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
  ["Z", "X", "C", "V", "B", "N", "M"],
  ["SPACE"]
];
let started = false;
let muted = false;
let volume = 0.8;
let beatIndex = 0;
let globalSetIndex = 0;
let patternIndex = 0;
let repeatsOnCurrentPattern = 0;
let audioCache = {};
const sequenceEl = document.getElementById("sequence");
const keyboardEl = document.getElementById("keyboard");
const patternLabelEl = document.getElementById("patternLabel");
const startButton = document.getElementById("startButton");
const muteButton = document.getElementById("muteButton");
const volumeSlider = document.getElementById("volume");
function currentPattern() { return PATTERNS[patternIndex]; }
function buildSequence() {
  sequenceEl.innerHTML = "";
  patternLabelEl.textContent = currentPattern().name + " — repeat " + (repeatsOnCurrentPattern + 1) + " of " + REPEATS_PER_PATTERN;
  currentPattern().sequence.forEach((target, index) => {
    const el = document.createElement("div");
    el.className = "target" + (target === "SPACE" ? " space-target" : "");
    el.textContent = target;
    el.dataset.index = index;
    sequenceEl.appendChild(el);
  });
  updateActiveTarget();
}
function updateActiveTarget() {
  document.querySelectorAll(".target").forEach((el, index) => el.classList.toggle("active", index === beatIndex));
}
function buildKeyboard() {
  keyboardEl.innerHTML = "";
  KEY_ROWS.forEach(rowKeys => {
    const row = document.createElement("div");
    row.className = "row";
    rowKeys.forEach(key => {
      const keyEl = document.createElement("div");
      keyEl.className = "key " + FINGER_GROUPS[key] + (key === "SPACE" ? " spacebar" : "");
      keyEl.textContent = key;
      keyEl.dataset.key = key;
      keyEl.addEventListener("click", () => handleInput(key));
      keyEl.addEventListener("touchstart", event => { event.preventDefault(); handleInput(key); }, { passive: false });
      row.appendChild(keyEl);
    });
    keyboardEl.appendChild(row);
  });
}
function preloadAudio() {
  SOUND_SETS.forEach(set => Object.values(set).forEach(url => {
    if (!audioCache[url]) {
      const audio = new Audio(url);
      audio.preload = "auto";
      audioCache[url] = audio;
    }
  }));
}
function playSound(targetKey) {
  if (muted) return;
  const currentSoundSet = SOUND_SETS[globalSetIndex % SOUND_SETS.length];
  const url = currentSoundSet[targetKey];
  if (!url) return;
  const baseAudio = audioCache[url] || new Audio(url);
  const audio = baseAudio.cloneNode();
  audio.volume = volume;
  audio.currentTime = 0;
  audio.play().catch(() => {});
}
function highlightKey(targetKey) {
  const keyEl = document.querySelector(`.key[data-key="${targetKey}"]`);
  if (!keyEl) return;
  keyEl.classList.add("glow");
  setTimeout(() => keyEl.classList.remove("glow"), 160);
}
function animateTarget() {
  const targetEl = document.querySelector(`.target[data-index="${beatIndex}"]`);
  if (!targetEl) return;
  const effect = EFFECTS[globalSetIndex % EFFECTS.length];
  targetEl.classList.remove("active");
  targetEl.classList.add(effect);
  setTimeout(() => { targetEl.classList.add("cleared"); advanceBeat(); }, 650);
}
function advanceBeat() {
  beatIndex++;
  if (beatIndex >= currentPattern().sequence.length) {
    beatIndex = 0;
    globalSetIndex++;
    repeatsOnCurrentPattern++;
    if (repeatsOnCurrentPattern >= REPEATS_PER_PATTERN) {
      repeatsOnCurrentPattern = 0;
      patternIndex = (patternIndex + 1) % PATTERNS.length;
    }
    buildSequence();
  } else {
    updateActiveTarget();
  }
}
function normalizePhysicalKey(event) {
  if (event.code === "Space" || event.key === " ") { event.preventDefault(); return "SPACE"; }
  const key = event.key.toUpperCase();
  if (/^[A-Z]$/.test(key)) return key;
  return null;
}
function handleInput(inputKey) {
  if (!started) return;
  const expectedKey = currentPattern().sequence[beatIndex];
  if (inputKey !== expectedKey) return;
  playSound(expectedKey);
  highlightKey(expectedKey);
  animateTarget();
}
document.addEventListener("keydown", event => {
  const key = normalizePhysicalKey(event);
  if (!key) return;
  handleInput(key);
});
startButton.addEventListener("click", () => {
  started = true;
  preloadAudio();
  startButton.disabled = true;
  startButton.textContent = "Started";
});
muteButton.addEventListener("click", () => {
  muted = !muted;
  muteButton.textContent = muted ? "Unmute" : "Mute";
});
volumeSlider.addEventListener("input", event => { volume = Number(event.target.value); });
buildSequence();
buildKeyboard();
</script>
<script src="rhythmic-typing-lesson.js"></script>
<script src="rhythmic-typing-back.js"></script>
</body>
</html>
